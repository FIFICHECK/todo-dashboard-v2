<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona Team To-Do Dashboard v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
    h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 1.8rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.9rem; }
    .date-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-nav { display: flex; align-items: center; gap: 10px; }
    .date-nav button { background: #16213e; color: #fff; border: 1px solid #0f3460; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .date-nav button:hover { background: #0f3460; }
    .date-nav .current-date { color: #e94560; font-weight: bold; min-width: 200px; text-align: center; font-size: 1.1rem; }
    .week-chips { display: flex; gap: 5px; background: #16213e; border-radius: 6px; padding: 4px; }
    .week-chip { padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; color: #aaa; }
    .week-chip:hover { background: #0f3460; color: #fff; }
    .week-chip.active { background: #e94560; color: #fff; }

    .main-grid { display: grid; gap: 1px; background: #333; border-radius: 8px; overflow: hidden; max-width: 100%; overflow-x: auto; }
    
    .header-cell { background: #16213e; padding: 10px 8px; text-align: center; font-weight: bold; color: #fff; font-size: 0.85rem; min-width: 180px; }
    .header-cell.date-header { background: #0f3460; color: #e94560; }
    .header-cell .day-name { font-size: 0.7rem; color: #888; margin-top: 2px; }
    .header-cell.weekend { background: #1a1a2e; color: #666; }
    
    .rm-header { background: #16213e; padding: 8px; min-width: 60px; text-align: center; font-weight: bold; color: #fff; font-size: 0.8rem; }
    
    .date-cell { background: #1f1f3a; padding: 4px; min-width: 180px; vertical-align: top; }
    .date-cell.weekend { background: #181828; }
    
    .rm-row { 
      background: #252540; 
      border-radius: 6px; 
      margin-bottom: 4px; 
      border-left: 3px solid #555;
      padding: 4px 6px;
    }
    .rm-row.has-name { border-left-color: #e94560; }
    
    .rm-name { 
      font-weight: bold; 
      font-size: 0.75rem; 
      color: #e94560; 
      cursor: pointer;
      margin-bottom: 4px;
      display: block;
    }
    .rm-name:hover { text-decoration: underline; }
    .rm-name.empty { color: #888; font-style: italic; }
    
    .work-row { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; }
    
    .work-input {
      flex: 1;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 4px 6px;
      color: #fff;
      font-size: 0.75rem;
      font-family: inherit;
    }
    .work-input::placeholder { color: #555; }
    .work-input:focus { outline: none; border-color: #0f3460; }
    
    .btn-done { cursor: pointer; font-size: 0.85rem; padding: 2px 4px; }
    .btn-done:hover { transform: scale(1.2); }
    
    .btn-delete { cursor: pointer; color: #666; font-size: 0.75rem; padding: 2px; }
    .btn-delete:hover { color: #e94560; }
    
    .work-list { font-size: 0.7rem; margin: 2px 0 2px 0; }
    .work-item { display: flex; align-items: center; gap: 4px; padding: 2px 0; border-bottom: 1px solid #333; }
    .work-item:last-child { border-bottom: none; }
    .work-item.done { text-decoration: line-through; color: #666; }
    .work-item .work-text { flex: 1; word-break: break-word; }
    .work-item .work-text a { color: #4fc3f7; text-decoration: none; }
    
    .add-btn { 
      background: transparent; 
      border: 1px dashed #444; 
      color: #666; 
      width: 100%; 
      padding: 4px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.7rem; 
      margin-top: 4px;
    }
    .add-btn:hover { border-color: #e94560; color: #e94560; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1f1f3a; border-radius: 10px; padding: 24px; width: 400px; max-width: 90vw; }
    .modal h3 { color: #fff; margin-bottom: 16px; }
    .modal input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; background: #252540; border: 1px solid #333; border-radius: 6px; color: #fff; font-family: inherit; box-sizing: border-box; }
    .modal label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.85rem; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .modal-buttons button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
    .modal-buttons .cancel-btn { background: #333; color: #fff; }
    .modal-buttons .save-btn { background: #e94560; color: #fff; }
  </style>
</head>
<body>
  <h1>📋 Fiona Team To-Do Dashboard v2</h1>
  <p class="subtitle">每個日期：7個 RM 位置，每個 RM 可輸入工作 + ✅完成 / ✕清除</p>

  <div class="date-controls">
    <div class="date-nav">
      <button onclick="navigateWeek(-1)">◀ 上一週</button>
      <span class="current-date" id="currentDateLabel">-</span>
      <button onclick="navigateWeek(1)">下一週 ▶</button>
    </div>
    <div class="week-chips" id="weekChips"></div>
  </div>

  <div class="main-grid" id="mainGrid"></div>

  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <h3>編輯工作</h3>
      <input type="hidden" id="editDateIdx">
      <input type="hidden" id="editRmIdx">
      <input type="hidden" id="editWorkIdx">
      <label>工作描述</label>
      <input type="text" id="taskInput" placeholder="輸入工作內容...">
      <label>URL 連結（可選）</label>
      <input type="text" id="urlInput" placeholder="https://...">
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeTaskModal()">取消</button>
        <button class="save-btn" onclick="saveTask()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    var MAX_RMS = 7;
    var RM_COLORS = ['#e94560', '#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#e74c3c', '#2ecc71'];
    var DAY_NAMES = ['日', '一', '二', '三', '四', '五', '六'];
    var currentWeekStart = getMonday(new Date());
    var data = {};
    var RMS = ['', '', '', '', '', '', ''];

    function getMonday(d) {
      var date = new Date(d);
      var day = date.getDay();
      var diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function loadData() {
      var saved = localStorage.getItem('todo_dashboard_v7');
      if (saved) {
        var parsed = JSON.parse(saved);
        data = parsed.data || {};
        RMS = parsed.rms || ['', '', '', '', '', '', ''];
      } else {
        data = { tasks: {} };
        RMS = ['', '', '', '', '', '', ''];
      }
    }

    function saveData() {
      localStorage.setItem('todo_dashboard_v7', JSON.stringify({ data: data, rms: RMS }));
    }

    function navigateWeek(direction) {
      currentWeekStart.setDate(currentWeekStart.getDate() + (direction * 7));
      renderGrid();
    }

    function jumpToWeek(dateStr) {
      currentWeekStart = getMonday(new Date(dateStr));
      renderGrid();
    }

    function getWeekDates() {
      var dates = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(currentWeekStart.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    function getDateKey(date) {
      return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    }

    function formatDateLabel() {
      var weekEnd = new Date(currentWeekStart);
      weekEnd.setDate(currentWeekStart.getDate() + 6);
      return (currentWeekStart.getMonth() + 1) + '/' + currentWeekStart.getDate() + ' - ' + (weekEnd.getMonth() + 1) + '/' + weekEnd.getDate();
    }

    function initDateData(dateKey) {
      if (!data.tasks[dateKey]) {
        data.tasks[dateKey] = [];
        for (var i = 0; i < MAX_RMS; i++) {
          data.tasks[dateKey].push({ work: '', done: false, works: [] });
        }
      }
    }

    function renderWeekChips() {
      var container = document.getElementById('weekChips');
      var today = new Date();
      var todayMonday = getMonday(today);
      var html = '';
      for (var w = -4; w <= 4; w++) {
        var monday = new Date(todayMonday);
        monday.setDate(todayMonday.getDate() + (w * 7));
        var isActive = monday.getTime() === currentWeekStart.getTime();
        html += '<div class="week-chip ' + (isActive ? 'active' : '') + '" onclick="jumpToWeek(\'' + monday.toISOString() + '\')">' + (monday.getMonth() + 1) + '/' + monday.getDate() + '</div>';
      }
      container.innerHTML = html;
    }

    function renderGrid() {
      var grid = document.getElementById('mainGrid');
      var dates = getWeekDates();
      document.getElementById('currentDateLabel').textContent = formatDateLabel();
      renderWeekChips();

      // Header row
      var html = '<div class="header-cell rm-header">RM</div>';
      dates.forEach(function(date) {
        var isWeekend = date.getDay() === 0 || date.getDay() === 6;
        var dayName = DAY_NAMES[date.getDay()];
        html += '<div class="header-cell date-header ' + (isWeekend ? 'weekend' : '') + '">' + 
          (date.getMonth() + 1) + '/' + date.getDate() + 
          '<div class="day-name">星期' + dayName + '</div></div>';
      });

      // For each RM slot
      for (var rmIdx = 0; rmIdx < MAX_RMS; rmIdx++) {
        var rmColor = RM_COLORS[rmIdx];
        
        // RM label cell
        html += '<div class="rm-header" style="color:' + rmColor + ';border-top:3px solid ' + rmColor + ';">';
        html += '<span style="cursor:pointer;" onclick="setRmName(' + rmIdx + ')">' + (RMS[rmIdx] ? escapeHtml(RMS[rmIdx]) : '設定') + '</span>';
        html += '</div>';
        
        // For each date
        dates.forEach(function(date, dateIdx) {
          var dateKey = getDateKey(date);
          var isWeekend = date.getDay() === 0 || date.getDay() === 6;
          initDateData(dateKey);
          
          var slotData = data.tasks[dateKey][rmIdx];
          var isDone = slotData ? slotData.done : false;
          var work = slotData ? slotData.work : '';
          var works = slotData ? slotData.works : [];
          var hasName = RMS[rmIdx] ? true : false;
          
          html += '<div class="date-cell ' + (isWeekend ? 'weekend' : '') + '">';
          html += '<div class="rm-row ' + (hasName ? 'has-name' : '') + '" style="border-left-color:' + (hasName ? rmColor : '#555') + '">';
          
          // RM name
          html += '<span class="rm-name ' + (hasName ? '' : 'empty') + '" onclick="setRmName(' + rmIdx + ')">' + 
            (hasName ? escapeHtml(RMS[rmIdx]) : '點此設定 RM') + '</span>';
          
          // Work input row
          html += '<div class="work-row">';
          html += '<input type="text" class="work-input" id="input_' + dateIdx + '_' + rmIdx + '" ' +
            'placeholder="輸入工作..." value="' + escapeHtml(work) + '" ' +
            'onkeypress="if(event.key===\'Enter\'){saveQuickWork(' + dateIdx + ',' + rmIdx + ');}">';
          html += '<span class="btn-done" onclick="toggleQuickDone(' + dateIdx + ',' + rmIdx + ')">' + (isDone ? '✅' : '☐') + '</span>';
          html += '<span class="btn-delete" onclick="clearQuickWork(' + dateIdx + ',' + rmIdx + ')">✕</span>';
          html += '</div>';
          
          // Work list
          if (works.length > 0) {
            html += '<div class="work-list">';
            works.forEach(function(w, wIdx) {
              html += '<div class="work-item ' + (w.done ? 'done' : '') + '">';
              html += '<span class="btn-done" onclick="toggleWorkDone(' + dateIdx + ',' + rmIdx + ',' + wIdx + ')">' + (w.done ? '✅' : '☐') + '</span>';
              html += '<span class="work-text" onclick="editWork(' + dateIdx + ',' + rmIdx + ',' + wIdx + ')">' + escapeHtml(w.text) + (w.url ? ' <a href="' + escapeHtml(w.url) + '" target="_blank">🔗</a>' : '') + '</span>';
              html += '<span class="btn-delete" onclick="deleteWork(' + dateIdx + ',' + rmIdx + ',' + wIdx + ')">✕</span>';
              html += '</div>';
            });
            html += '</div>';
          }
          
          // Add work button
          html += '<button class="add-btn" onclick="editWork(' + dateIdx + ',' + rmIdx + ',-1)">+ 加入工作</button>';
          html += '</div></div>';
        });
      }
      
      grid.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setRmName(rmIdx) {
      var name = prompt('請輸入 RM 名稱（第 ' + (rmIdx + 1) + ' 行）：', RMS[rmIdx] || '');
      if (name !== null) {
        RMS[rmIdx] = name.trim();
        saveData();
        renderGrid();
      }
    }

    function saveQuickWork(dateIdx, rmIdx) {
      var input = document.getElementById('input_' + dateIdx + '_' + rmIdx);
      if (!input) return;
      var text = input.value.trim();
      if (!text) return;
      
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      initDateData(dateKey);
      data.tasks[dateKey][rmIdx].work = text;
      saveData();
      renderGrid();
    }

    function toggleQuickDone(dateIdx, rmIdx) {
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      initDateData(dateKey);
      data.tasks[dateKey][rmIdx].done = !data.tasks[dateKey][rmIdx].done;
      saveData();
      renderGrid();
    }

    function clearQuickWork(dateIdx, rmIdx) {
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      initDateData(dateKey);
      data.tasks[dateKey][rmIdx].work = '';
      data.tasks[dateKey][rmIdx].done = false;
      saveData();
      renderGrid();
    }

    function editWork(dateIdx, rmIdx, workIdx) {
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      initDateData(dateKey);
      
      document.getElementById('editDateIdx').value = dateIdx;
      document.getElementById('editRmIdx').value = rmIdx;
      document.getElementById('editWorkIdx').value = workIdx;
      
      if (workIdx >= 0) {
        var work = data.tasks[dateKey][rmIdx].works[workIdx];
        document.getElementById('taskInput').value = work ? work.text : '';
        document.getElementById('urlInput').value = work ? (work.url || '') : '';
      } else {
        document.getElementById('taskInput').value = '';
        document.getElementById('urlInput').value = '';
      }
      
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    function saveTask() {
      var dateIdx = parseInt(document.getElementById('editDateIdx').value);
      var rmIdx = parseInt(document.getElementById('editRmIdx').value);
      var workIdx = parseInt(document.getElementById('editWorkIdx').value);
      var text = document.getElementById('taskInput').value.trim();
      var url = document.getElementById('urlInput').value.trim();
      
      if (!text) { alert('請輸入工作描述'); return; }
      
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      initDateData(dateKey);
      
      if (workIdx >= 0) {
        data.tasks[dateKey][rmIdx].works[workIdx].text = text;
        data.tasks[dateKey][rmIdx].works[workIdx].url = url;
      } else {
        data.tasks[dateKey][rmIdx].works.push({ text: text, url: url, done: false });
      }
      
      saveData();
      closeTaskModal();
      renderGrid();
    }

    function deleteWork(dateIdx, rmIdx, workIdx) {
      if (!confirm('確定刪除呢项工作？')) return;
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      data.tasks[dateKey][rmIdx].works.splice(workIdx, 1);
      saveData();
      renderGrid();
    }

    function toggleWorkDone(dateIdx, rmIdx, workIdx) {
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      data.tasks[dateKey][rmIdx].works[workIdx].done = !data.tasks[dateKey][rmIdx].works[workIdx].done;
      saveData();
      renderGrid();
    }

    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('active');
    }

    document.getElementById('taskModal').addEventListener('click', function(e) {
      if (e.target.classList.contains('modal-overlay')) closeTaskModal();
    });

    loadData();
    renderGrid();
  </script>
</body>
</html>
