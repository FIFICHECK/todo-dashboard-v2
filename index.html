<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona Team SKU To-Do Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    /* View Controls */
    .view-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .view-btn-group {
      display: flex;
      gap: 2px;
      background: #16213e;
      border-radius: 6px;
      overflow: hidden;
    }

    .view-btn {
      background: #16213e;
      color: #aaa;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .view-btn:hover {
      background: #0f3460;
      color: #fff;
    }

    .view-btn.active {
      background: #e94560;
      color: #fff;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-nav button {
      background: #16213e;
      color: #fff;
      border: 1px solid #0f3460;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .date-nav button:hover {
      background: #0f3460;
    }

    .date-nav .current-date {
      color: #e94560;
      font-weight: bold;
      min-width: 180px;
      text-align: center;
    }

    /* SKU Controls */
    .sku-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
      justify-content: center;
    }

    .sku-controls button {
      background: #0f3460;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .sku-controls button:hover {
      background: #e94560;
    }

    .sku-list {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .sku-chip {
      background: #252540;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .sku-chip:hover {
      border-color: #e94560;
    }

    .sku-chip.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    /* Main Grid - SKU on left */
    .main-grid {
      display: grid;
      grid-template-columns: 100px repeat(auto-fit, minmax(100px, 1fr));
      gap: 1px;
      background: #333;
      border-radius: 8px;
      overflow: hidden;
      max-width: 100%;
      overflow-x: auto;
    }

    .header-cell {
      background: #16213e;
      padding: 12px 8px;
      text-align: center;
      font-weight: bold;
      color: #fff;
      font-size: 0.8rem;
      min-width: 100px;
    }

    .header-cell.date-header {
      background: #0f3460;
      color: #e94560;
    }

    .sku-row {
      display: contents;
    }

    .sku-label {
      background: #16213e;
      padding: 12px 8px;
      text-align: center;
      font-weight: bold;
      color: #e94560;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: horizontal-tb;
      min-width: 100px;
    }

    .task-cell {
      background: #1f1f3a;
      padding: 6px;
      min-height: 100px;
      vertical-align: top;
    }

    /* Task Items */
    .task-item {
      background: #252540;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 4px;
      border-left: 3px solid #0f3460;
      position: relative;
    }

    .task-item.done {
      border-left-color: #4ecca3;
      opacity: 0.7;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #888;
    }

    .task-text {
      font-size: 0.8rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .task-text a {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 0.75rem;
    }

    .task-actions {
      display: flex;
      gap: 2px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    .task-actions button {
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .task-actions button:hover {
      background: #333;
      color: #fff;
    }

    .checkbox {
      cursor: pointer;
      margin-right: 2px;
      font-size: 0.85rem;
    }

    /* Add Task Button */
    .add-task-btn {
      background: transparent;
      border: 1px dashed #444;
      color: #666;
      width: 100%;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      margin-top: 4px;
    }

    .add-task-btn:hover {
      border-color: #0f3460;
      color: #4fc3f7;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1f1f3a;
      border-radius: 10px;
      padding: 24px;
      width: 450px;
      max-width: 90vw;
    }

    .modal h3 {
      color: #fff;
      margin-bottom: 16px;
    }

    .modal input[type="text"],
    .modal input[type="date"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      box-sizing: border-box;
    }

    .modal select {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      box-sizing: border-box;
    }

    .modal label {
      display: block;
      margin-bottom: 6px;
      color: #aaa;
      font-size: 0.85rem;
    }

    .schedule-options {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .schedule-option {
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #aaa;
      transition: all 0.2s;
    }

    .schedule-option:hover {
      border-color: #0f3460;
    }

    .schedule-option.selected {
      background: #0f3460;
      border-color: #e94560;
      color: #fff;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .modal-buttons button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .modal-buttons .cancel-btn {
      background: #333;
      color: #fff;
    }

    .modal-buttons .save-btn {
      background: #e94560;
      color: #fff;
    }

    .modal-buttons .delete-btn {
      background: #c0392b;
      color: #fff;
      margin-right: auto;
    }

    /* SKU color dots */
    .sku-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 6px;
    }
  </style>
</head>
<body>
  <h1>📋 SKU To-Do Dashboard</h1>
  <p class="subtitle">左方：SKU 級別 | 頂部：日期篩選（週/月/年）</p>

  <div class="view-controls">
    <div class="view-btn-group">
      <button class="view-btn active" data-view="week" onclick="setView('week')">週</button>
      <button class="view-btn" data-view="month" onclick="setView('month')">月</button>
      <button class="view-btn" data-view="year" onclick="setView('year')">年</button>
    </div>
    
    <div class="date-nav">
      <button onclick="navigateDate(-1)">◀</button>
      <span class="current-date" id="currentDateLabel">-</span>
      <button onclick="navigateDate(1)">▶</button>
    </div>
  </div>

  <div class="sku-controls">
    <button onclick="openAddSkuModal()">+ 新增 SKU</button>
    <div class="sku-list" id="skuList">
      <!-- SKU chips rendered here -->
    </div>
  </div>

  <div class="main-grid" id="mainGrid">
    <!-- Grid will be rendered here -->
  </div>

  <!-- Add/Edit Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <h3 id="taskModalTitle">加入工作</h3>
      <input type="hidden" id="editTaskId">
      <input type="hidden" id="editSku">
      <input type="hidden" id="editDate">
      <input type="hidden" id="editIndex">
      
      <label>SKU 級別</label>
      <select id="skuSelect">
        <!-- Options populated dynamically -->
      </select>
      
      <label>工作描述</label>
      <input type="text" id="taskInput" placeholder="輸入工作內容...">
      
      <label>URL 連結（可選）</label>
      <input type="text" id="urlInput" placeholder="https://...">
      
      <label>重複週期</label>
      <div class="schedule-options">
        <div class="schedule-option selected" data-value="once" onclick="selectSchedule(this)">一次</div>
        <div class="schedule-option" data-value="daily" onclick="selectSchedule(this)">每日（除週六日）</div>
        <div class="schedule-option" data-value="weekly" onclick="selectSchedule(this)">每週</div>
        <div class="schedule-option" data-value="yearly" onclick="selectSchedule(this)">每年</div>
      </div>
      
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeTaskModal()">取消</button>
        <button class="save-btn" onclick="saveTask()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Add SKU Modal -->
  <div class="modal-overlay" id="skuModal">
    <div class="modal">
      <h3 id="skuModalTitle">新增 SKU</h3>
      <input type="hidden" id="editSkuId">
      
      <label>SKU 名稱</label>
      <input type="text" id="skuNameInput" placeholder="例如：H000001">
      
      <label>顏色</label>
      <select id="skuColorSelect">
        <option value="#e94560">紅色</option>
        <option value="#f39c12">橙色</option>
        <option value="#3498db">藍色</option>
        <option value="#9b59b6">紫色</option>
        <option value="#1abc9c">青色</option>
        <option value="#e74c3c">深紅</option>
        <option value="#2ecc71">綠色</option>
        <option value="#e91e63">粉紅</option>
      </select>
      
      <div class="modal-buttons">
        <button class="delete-btn" id="deleteSkuBtn" style="display:none;" onclick="deleteSku()">刪除</button>
        <button class="cancel-btn" onclick="closeSkuModal()">取消</button>
        <button class="save-btn" onclick="saveSku()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const COLORS = ['#e94560', '#f39c12', '#3498db', '#9b59b6', '#1abc9c', '#e74c3c', '#2ecc71', '#e91e63'];
    
    let currentView = 'week';
    let currentDate = new Date();
    let data = {};
    let selectedSchedule = 'once';
    let skus = [];

    // Load data from localStorage
    function loadData() {
      const saved = localStorage.getItem('sku_todo_dashboard');
      if (saved) {
        const parsed = JSON.parse(saved);
        data = parsed.data || {};
        skus = parsed.skus || [];
      } else {
        data = { tasks: {} };
        skus = [];
      }
    }

    // Save data to localStorage
    function saveData() {
      localStorage.setItem('sku_todo_dashboard', JSON.stringify({ data, skus }));
    }

    // Set view type
    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === view);
      });
      renderGrid();
    }

    // Navigate dates
    function navigateDate(direction) {
      if (currentView === 'week') {
        currentDate.setDate(currentDate.getDate() + (direction * 7));
      } else if (currentView === 'month') {
        currentDate.setMonth(currentDate.getMonth() + direction);
      } else {
        currentDate.setFullYear(currentDate.getFullYear() + direction);
      }
      renderGrid();
    }

    // Get dates to display
    function getDisplayDates() {
      const dates = [];
      const today = new Date(currentDate);
      
      if (currentView === 'week') {
        const day = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
        
        for (let i = 0; i < 7; i++) {
          const d = new Date(monday);
          d.setDate(monday.getDate() + i);
          dates.push(d);
        }
      } else if (currentView === 'month') {
        const year = today.getFullYear();
        const month = today.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
          dates.push(new Date(year, month, i));
        }
      } else {
        for (let m = 0; m < 12; m++) {
          dates.push(new Date(today.getFullYear(), m, 1));
        }
      }
      
      return dates;
    }

    // Get date key
    function getDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    // Format date header
    function formatDateHeader(date) {
      if (currentView === 'year') {
        const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        return months[date.getMonth()];
      } else if (currentView === 'month') {
        return `${date.getMonth() + 1}/${date.getDate()}`;
      } else {
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        return `${date.getMonth() + 1}/${date.getDate()}${days[date.getDay()]}`;
      }
    }

    // Format date label
    function formatDateLabel() {
      if (currentView === 'week') {
        const day = currentDate.getDay();
        const monday = new Date(currentDate);
        monday.setDate(currentDate.getDate() - (day === 0 ? 6 : day - 1));
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        return `${monday.getMonth() + 1}/${monday.getDate()} - ${sunday.getMonth() + 1}/${sunday.getDate()}`;
      } else if (currentView === 'month') {
        return `${currentDate.getFullYear()}年 ${currentDate.getMonth() + 1}月`;
      } else {
        return `${currentDate.getFullYear()}年`;
      }
    }

    // Select schedule option
    function selectSchedule(el) {
      document.querySelectorAll('.schedule-option').forEach(opt => opt.classList.remove('selected'));
      el.classList.add('selected');
      selectedSchedule = el.dataset.value;
    }

    // Get schedule badge
    function getScheduleBadge(schedule) {
      const badges = {
        once: '',
        daily: '<span class="schedule-badge badge-daily">日</span>',
        weekly: '<span class="schedule-badge badge-weekly">週</span>',
        yearly: '<span class="schedule-badge badge-yearly">年</span>'
      };
      return badges[schedule] || '';
    }

    // Check if task should show
    function shouldShowTask(task, date) {
      if (currentView === 'year') {
        const taskDate = new Date(task.date);
        return date.getMonth() === taskDate.getMonth() && date.getDate() === taskDate.getDate();
      } else if (currentView === 'month') {
        if (task.schedule === 'daily') {
          return date.getDay() >= 1 && date.getDay() <= 5;
        } else if (task.schedule === 'weekly') {
          return date.getDay() === 1;
        } else if (task.schedule === 'yearly') {
          const taskDate = new Date(task.date);
          return date.getMonth() === taskDate.getMonth() && date.getDate() === taskDate.getDate();
        } else {
          const taskDate = new Date(task.date);
          return date.toDateString() === taskDate.toDateString();
        }
      }
      return true;
    }

    // Init date data
    function initDateData(dateKey) {
      if (!data.tasks[dateKey]) {
        data.tasks[dateKey] = {};
        skus.forEach(sku => data.tasks[dateKey][sku.id] = []);
      }
    }

    // Render SKU chips
    function renderSkuChips() {
      const container = document.getElementById('skuList');
      container.innerHTML = skus.map(sku => `
        <div class="sku-chip" onclick="openEditSkuModal('${sku.id}')">
          <span class="sku-dot" style="background:${sku.color}"></span>${sku.name}
        </div>
      `).join('');
    }

    // Render the grid
    function renderGrid() {
      const grid = document.getElementById('mainGrid');
      const dates = getDisplayDates();
      
      document.getElementById('currentDateLabel').textContent = formatDateLabel();

      // Build header row
      let html = '<div class="header-cell">SKU</div>';
      dates.forEach(date => {
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        html += `<div class="header-cell date-header" style="${isWeekend ? 'background:#1a1a2e;color:#666;' : ''}">${formatDateHeader(date)}</div>`;
      });

      // Build SKU rows
      skus.forEach(sku => {
        html += `<div class="sku-row">`;
        html += `<div class="sku-label"><span class="sku-dot" style="background:${sku.color}"></span>${sku.name}</div>`;
        
        dates.forEach(date => {
          const dateKey = getDateKey(date);
          const isWeekend = date.getDay() === 0 || date.getDay() === 6;
          initDateData(dateKey);
          
          const tasks = data.tasks[dateKey][sku.id] || [];
          let cellHtml = '';
          
          tasks.forEach((task, idx) => {
            if (shouldShowTask(task, date)) {
              cellHtml += `
                <div class="task-item ${task.done ? 'done' : ''}">
                  <span class="checkbox" onclick="toggleTask('${dateKey}', '${sku.id}', ${idx})">
                    ${task.done ? '✅' : '☐'}
                  </span>
                  <span class="task-text">
                    ${getScheduleBadge(task.schedule)}
                    ${escapeHtml(task.text)}
                    ${task.url ? `<br><a href="${escapeHtml(task.url)}" target="_blank">🔗</a>` : ''}
                  </span>
                  <div class="task-actions">
                    <button onclick="editTask('${dateKey}', '${sku.id}', ${idx})">✏️</button>
                    <button onclick="deleteTask('${dateKey}', '${sku.id}', ${idx})">🗑️</button>
                  </div>
                </div>
              `;
            }
          });
          
          const bgStyle = isWeekend ? 'background:#181828;' : '';
          cellHtml += `<button class="add-task-btn" onclick="openAddTaskModal('${dateKey}', '${sku.id}')">+</button>`;
          
          html += `<div class="task-cell" style="${bgStyle}">${cellHtml}</div>`;
        });
        
        html += `</div>`;
      });

      if (skus.length === 0) {
        html = '<div style="padding:40px;text-align:center;color:#666;">請先點擊「+ 新增 SKU」新增 SKU 級別</div>';
      }

      grid.innerHTML = html;
      renderSkuChips();
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Open add task modal
    function openAddTaskModal(dateKey, skuId) {
      document.getElementById('taskModalTitle').textContent = '加入工作';
      document.getElementById('editTaskId').value = '';
      document.getElementById('editSku').value = skuId;
      document.getElementById('editDate').value = dateKey;
      document.getElementById('editIndex').value = '';
      document.getElementById('taskInput').value = '';
      document.getElementById('urlInput').value = '';
      
      // Populate SKU select
      const select = document.getElementById('skuSelect');
      select.innerHTML = skus.map(s => `<option value="${s.id}" ${s.id === skuId ? 'selected' : ''}>${s.name}</option>`).join('');
      
      selectedSchedule = 'once';
      document.querySelectorAll('.schedule-option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === 'once');
      });
      
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Open edit task modal
    function editTask(dateKey, skuId, idx) {
      const task = data.tasks[dateKey][skuId][idx];
      if (!task) return;
      
      document.getElementById('taskModalTitle').textContent = '編輯工作';
      document.getElementById('editTaskId').value = task.id;
      document.getElementById('editSku').value = skuId;
      document.getElementById('editDate').value = dateKey;
      document.getElementById('editIndex').value = idx;
      document.getElementById('taskInput').value = task.text;
      document.getElementById('urlInput').value = task.url || '';
      
      const select = document.getElementById('skuSelect');
      select.innerHTML = skus.map(s => `<option value="${s.id}" ${s.id === skuId ? 'selected' : ''}>${s.name}</option>`).join('');
      
      selectedSchedule = task.schedule || 'once';
      document.querySelectorAll('.schedule-option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === selectedSchedule);
      });
      
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Save task
    function saveTask() {
      const id = document.getElementById('editTaskId').value;
      const skuId = document.getElementById('skuSelect').value;
      const dateKey = document.getElementById('editDate').value;
      const text = document.getElementById('taskInput').value.trim();
      const url = document.getElementById('urlInput').value.trim();

      if (!text) {
        alert('請輸入工作描述');
        return;
      }

      initDateData(dateKey);

      if (id) {
        const taskIdx = data.tasks[dateKey][skuId].findIndex(t => t.id === id);
        if (taskIdx !== -1) {
          data.tasks[dateKey][skuId][taskIdx].text = text;
          data.tasks[dateKey][skuId][taskIdx].url = url;
          data.tasks[dateKey][skuId][taskIdx].schedule = selectedSchedule;
        }
      } else {
        data.tasks[dateKey][skuId].push({
          id: Date.now().toString(),
          text: text,
          url: url,
          done: false,
          schedule: selectedSchedule,
          date: dateKey
        });
      }

      saveData();
      closeTaskModal();
      renderGrid();
    }

    // Delete task
    function deleteTask(dateKey, skuId, idx) {
      if (!confirm('確定刪除呢项工作？')) return;
      data.tasks[dateKey][skuId].splice(idx, 1);
      saveData();
      renderGrid();
    }

    // Toggle task done
    function toggleTask(dateKey, skuId, idx) {
      data.tasks[dateKey][skuId][idx].done = !data.tasks[dateKey][skuId][idx].done;
      saveData();
      renderGrid();
    }

    // Close task modal
    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('active');
    }

    // Open add SKU modal
    function openAddSkuModal() {
      document.getElementById('skuModalTitle').textContent = '新增 SKU';
      document.getElementById('editSkuId').value = '';
      document.getElementById('skuNameInput').value = '';
      document.getElementById('skuColorSelect').value = COLORS[skus.length % COLORS.length];
      document.getElementById('deleteSkuBtn').style.display = 'none';
      document.getElementById('skuModal').classList.add('active');
      document.getElementById('skuNameInput').focus();
    }

    // Open edit SKU modal
    function openEditSkuModal(skuId) {
      const sku = skus.find(s => s.id === skuId);
      if (!sku) return;
      
      document.getElementById('skuModalTitle').textContent = '編輯 SKU';
      document.getElementById('editSkuId').value = skuId;
      document.getElementById('skuNameInput').value = sku.name;
      document.getElementById('skuColorSelect').value = sku.color;
      document.getElementById('deleteSkuBtn').style.display = 'block';
      document.getElementById('skuModal').classList.add('active');
      document.getElementById('skuNameInput').focus();
    }

    // Save SKU
    function saveSku() {
      const id = document.getElementById('editSkuId').value;
      const name = document.getElementById('skuNameInput').value.trim();
      const color = document.getElementById('skuColorSelect').value;

      if (!name) {
        alert('請輸入 SKU 名稱');
        return;
      }

      if (id) {
        const sku = skus.find(s => s.id === id);
        if (sku) {
          sku.name = name;
          sku.color = color;
        }
      } else {
        skus.push({
          id: Date.now().toString(),
          name: name,
          color: color
        });
      }

      saveData();
      closeSkuModal();
      renderGrid();
    }

    // Delete SKU
    function deleteSku() {
      const id = document.getElementById('editSkuId').value;
      if (!confirm('確定刪除呢個 SKU？所有相關工作都會被刪除！')) return;
      
      skus = skus.filter(s => s.id !== id);
      
      // Clean up tasks for this SKU
      Object.keys(data.tasks).forEach(dateKey => {
        if (data.tasks[dateKey][id]) {
          delete data.tasks[dateKey][id];
        }
      });
      
      saveData();
      closeSkuModal();
      renderGrid();
    }

    // Close SKU modal
    function closeSkuModal() {
      document.getElementById('skuModal').classList.remove('active');
    }

    // Close modals on outside click
    document.getElementById('taskModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) closeTaskModal();
    });

    document.getElementById('skuModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) closeSkuModal();
    });

    // Initialize
    loadData();
    renderGrid();
  </script>
</body>
</html>
