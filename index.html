<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>(Fiona Team) To-Do-List Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e0e0e0; 
      min-height: 100vh; 
      padding: 20px; 
    }
    h1 {
      text-align: center;
      color: #ffd700;
      margin-bottom: 10px;
      font-size: 1.8rem;
      font-weight: 700;
      text-shadow:
        0 1px 0 #b8860b,
        0 2px 0 #8b7500,
        0 3px 0 #6b5500,
        0 4px 0 #4a3a00,
        0 5px 0 #2a2000,
        0 6px 10px rgba(0,0,0,0.5);
      animation: float 3s ease-in-out infinite, shimmer 2s linear infinite, rainbow-glow 4s linear infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes shimmer {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.3) drop-shadow(0 0 8px #fff); }
      100% { filter: brightness(1); }
    }

    @keyframes rainbow-glow {
      0% { text-shadow: 0 1px 0 #b8860b, 0 2px 0 #8b7500, 0 3px 0 #6b5500, 0 4px 0 #4a3a00, 0 5px 0 #2a2000, 0 0 20px #ff0000, 0 6px 10px rgba(0,0,0,0.5); }
      25% { text-shadow: 0 1px 0 #b8860b, 0 2px 0 #8b7500, 0 3px 0 #6b5500, 0 4px 0 #4a3a00, 0 5px 0 #2a2000, 0 0 20px #ff8800, 0 6px 10px rgba(0,0,0,0.5); }
      50% { text-shadow: 0 1px 0 #b8860b, 0 2px 0 #8b7500, 0 3px 0 #6b5500, 0 4px 0 #4a3a00, 0 5px 0 #2a2000, 0 0 20px #00ff00, 0 6px 10px rgba(0,0,0,0.5); }
      75% { text-shadow: 0 1px 0 #b8860b, 0 2px 0 #8b7500, 0 3px 0 #6b5500, 0 4px 0 #4a3a00, 0 5px 0 #2a2000, 0 0 20px #0088ff, 0 6px 10px rgba(0,0,0,0.5); }
      100% { text-shadow: 0 1px 0 #b8860b, 0 2px 0 #8b7500, 0 3px 0 #6b5500, 0 4px 0 #4a3a00, 0 5px 0 #2a2000, 0 0 20px #ff0000, 0 6px 10px rgba(0,0,0,0.5); }
    }
    .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; font-weight: 600; }
    .loading { text-align: center; color: #4fc3f7; font-size: 1.2rem; padding: 40px; }
    .setup-container { max-width: 500px; background: #1a1a2e; border-radius: 20px; padding: 30px; border: 1px solid #333; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .setup-container h2 { color: #4fc3f7; margin-bottom: 20px; font-weight: 700; }
    .setup-container p { color: #888; margin-bottom: 15px; line-height: 1.6; }
    .setup-container input { width: 100%; padding: 12px; margin-bottom: 15px; background: #151525; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 1rem; box-sizing: border-box; }
    .setup-container input:focus { outline: none; border-color: #4fc3f7; box-shadow: 0 0 0 2px rgba(79,195,247,0.3); }
    .setup-container button { width: 100%; padding: 14px; background: #4fc3f7; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .setup-container button:hover { background: #3db8e8; transform: translateY(-1px); }
    .setup-container button:active { transform: translateY(0); background: #2da8d8; }
    .date-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-nav { display: flex; align-items: center; gap: 10px; }
    .date-nav button { background: #1a1a2e; color: #fff; border: 1px solid #333; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.3s; font-weight: 700; }
    .date-nav button:hover { background: #252545; box-shadow: 0 0 15px rgba(79,195,247,0.3); border-color: #4fc3f7; }
    .date-nav .current-date { color: #4fc3f7; font-weight: 700; min-width: 200px; text-align: center; font-size: 1.1rem; text-shadow: 0 0 10px rgba(79,195,247,0.5); }
    .week-chips { display: flex; gap: 8px; background: #1a1a2e; border-radius: 10px; padding: 8px; border: 1px solid #333; }
    .week-chip { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; color: #888; background: transparent; font-weight: 600; }
    .week-chip:hover { background: #252545; color: #fff; }
    .week-chip.active { background: linear-gradient(135deg, #4fc3f7 0%, #4fc3f7 100%); color: #fff; box-shadow: 0 0 15px rgba(79,195,247,0.4); }
    .reminder-btn { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.9rem; font-weight: 700; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255,107,107,0.3); }
    .reminder-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,107,0.4); }
    .reminder-btn:active { transform: translateY(0); }
    .reminder-btn:disabled { background: #666; cursor: not-allowed; transform: none; box-shadow: none; }

    
    .table-wrapper {
      border-radius: 16px;
      overflow: hidden;
    }
    @media (max-width: 768px) {
      .table-wrapper { border-radius: 10px; }
    }
    .main-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #1a1a2e; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333; }
    
    .header-row th { background: linear-gradient(135deg, #1a1a2e 0%, #252545 100%); padding: 14px 12px; text-align: center; font-weight: 700; color: #fff; font-size: 0.85rem; border-bottom: 1px solid #333; }
    .header-row th.date-col { min-width: 120px; }
    .header-row th.work-col { min-width: 200px; background: linear-gradient(135deg, #4fc3f7 0%, #4fc3f7 100%); color: #fff; text-align: left; padding-left: 16px; border-bottom: none; }
    .header-row th.rm-col { min-width: 400px; }
    
    .data-row td { background: #1f1f3a; padding: 12px; vertical-align: middle; border-bottom: 1px solid #2a2a40; transition: all 0.2s; }
    .data-row:hover td { background: #252545; }
    .data-row:last-child td { border-bottom: none; }
    .data-row td.date-col { background: #1f1f3a; text-align: center; font-weight: 700; color: #4fc3f7; min-width: 120px; border-left: 4px solid #333; }
    .data-row td.work-col { background: #1f1f3a; text-align: left; cursor: pointer; min-width: 200px; color: #ddd; transition: all 0.2s; font-weight: 600; }
    .data-row td.work-col:hover { color: #4fc3f7; }
    .data-row td.work-col.urgent { background: linear-gradient(135deg, #3a3520 0%, #4a4530 100%); border-left: 4px solid #ffcc00; }
    .data-row td.work-col.urgent:hover { color: #ffcc00; }
    .data-row td.work-col.serious { background: linear-gradient(135deg, #4a1a1a 0%, #6a2020 100%); border-left: 4px solid #ff1744; }
    .data-row td.work-col.serious:hover { color: #ff4444; }
    .data-row td.rm-col { background: #1f1f3a; text-align: center; }
    
    .add-work-row td { background: #151525; padding: 10px 12px; border-bottom: none; }
    .add-work-row td.date-col { background: #151525; }
    .add-work-row td.work-col { background: #151525; text-align: left; cursor: pointer; color: #666; font-size: 0.9rem; transition: all 0.2s; font-weight: 600; }
    .add-work-row td.work-col:hover { color: #4fc3f7; background: #1a1a2e; }
    .add-work-row td.rm-col { background: #151525; }
    
    .section-separator td { background: linear-gradient(90deg, #4fc3f7, #4fc3f7, #4fc3f7); height: 3px !important; padding: 0 !important; border: none !important; }
    
    .work-name { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; color: #ccc; font-weight: 600; }
    .work-name .work-text { flex: 1; }
    .work-name .work-url { color: #4fc3f7; font-size: 0.85rem; text-decoration: none; }
    .work-name .work-url:hover { color: #81d4fa; }
    
    .rm-checkboxes { display: flex; gap: 8px; justify-content: center; flex-wrap: nowrap; overflow-x: auto; }
    
    .rm-check { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 4px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      background: #252545;
      min-width: 54px;
      flex-shrink: 0;
      transition: all 0.2s;
      border: 1px solid #333;
    }
    .rm-check:hover { background: #333; box-shadow: 0 0 15px rgba(79,195,247,0.3); transform: translateY(-2px); border-color: #4fc3f7; }
    .rm-check.checked { background: linear-gradient(135deg, #1a3a2a 0%, #2a4a3a 100%); border-color: #4ecca3; }
    .rm-check.checked:hover { box-shadow: 0 0 15px rgba(78,204,163,0.3); }
    .rm-check.crossed { background: linear-gradient(135deg, #3a1f1f 0%, #4a2a2a 100%); border-color: #e74c3c; }
    .rm-check.crossed:hover { box-shadow: 0 0 15px rgba(231,76,60,0.3); }
    .rm-check.locked { cursor: not-allowed; }
    .rm-check.locked:hover { box-shadow: none; transform: none; border-color: #e74c3c; }
    
    .rm-check .rm-label { font-size: 0.8rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; cursor: pointer; background: #333; color: #fff; transition: all 0.2s; }
    .rm-check .rm-label:hover { opacity: 0.8; background: #444; }
    .rm-check .check-icon { font-size: 1.4rem; }
    .rm-check.checked .check-icon { color: #4ecca3; text-shadow: 0 0 10px rgba(78,204,163,0.5); }
    .rm-check.crossed .check-icon { color: #e74c3c; text-shadow: 0 0 10px rgba(231,76,60,0.5); }
    .rm-check.unchecked .check-icon { color: #ffffff; }
    
    .rm-settings { margin-top: 24px; background: linear-gradient(135deg, #1a1a2e 0%, #252545 100%); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid #333; }
    .rm-settings h3 { color: #fff; margin-bottom: 12px; font-size: 1rem; font-weight: 700; }
    .rm-settings-list { display: flex; gap: 10px; flex-wrap: wrap; }
    .rm-name-btn { 
      padding: 10px 18px; 
      border-radius: 10px; 
      border: none; 
      cursor: pointer; 
      font-size: 0.85rem; 
      font-weight: 700;
      color: #fff;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .rm-name-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); filter: brightness(1.1); }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-overlay.active { display: flex; }
    .modal { background: linear-gradient(135deg, #1a1a2e 0%, #252545 100%); border-radius: 20px; padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #444; }
    .modal h3 { color: #fff; margin-bottom: 16px; font-weight: 700; }
    .modal input[type="text"] { width: 100%; padding: 12px 14px; margin-bottom: 10px; background: #151525; border: 1px solid #333; border-radius: 10px; color: #fff; font-family: inherit; box-sizing: border-box; transition: all 0.3s; font-weight: 600; }
    .modal input[type="text"]:focus { outline: none; border-color: #4fc3f7; box-shadow: 0 0 0 3px rgba(79,195,247,0.2); }
    .modal select { width: 100%; padding: 12px 14px; margin-bottom: 10px; background: #151525; border: 1px solid #333; border-radius: 10px; color: #fff; font-family: inherit; box-sizing: border-box; font-weight: 600; }
    .modal label { display: block; margin-bottom: 6px; color: #888; font-size: 0.85rem; font-weight: 600; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-buttons button { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 700; transition: all 0.3s; }
    .modal-buttons .cancel-btn { background: #333; color: #fff; }
    .modal-buttons .cancel-btn:hover { background: #444; }
    .modal-buttons .save-btn { background: linear-gradient(135deg, #4fc3f7 0%, #4fc3f7 100%); color: #fff; box-shadow: 0 4px 15px rgba(79,195,247,0.3); }
    .modal-buttons .save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,195,247,0.4); }
    .modal-buttons .delete-btn { background: linear-gradient(135deg, #c0392b 0%, #96281b 100%); color: #fff; margin-right: auto; }
    .modal-buttons .delete-btn:hover { background: #e74c3c; }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      z-index: 9999;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.success {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff;
      box-shadow: 0 4px 15px rgba(46,204,113,0.4);
    }
    .toast.error {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      box-shadow: 0 4px 15px rgba(231,76,60,0.4);
    }
  
  /* ===== Responsive Design - Mobile ===== */
  @media (max-width: 768px) {
    body { padding: 10px; }
    h1 { font-size: 1.3rem; }
    .subtitle { font-size: 0.75rem; margin-bottom: 10px; }
    .date-controls { flex-direction: column; gap: 10px; }
    .date-nav { flex-wrap: wrap; justify-content: center; }
    .date-nav button { padding: 6px 12px; font-size: 0.85rem; }
    .date-nav .current-date { min-width: auto; font-size: 0.9rem; }
    .week-chips { padding: 6px; gap: 4px; overflow-x: auto; flex-wrap: nowrap; }
    .week-chip { padding: 5px 10px; font-size: 0.75rem; white-space: nowrap; }
    .reminder-btn { padding: 6px 14px; font-size: 0.8rem; }
    .main-table { border-radius: 10px; font-size: 0.75rem; }
    .header-row th { padding: 8px 6px; font-size: 0.7rem; }
    .header-row th.date-col { min-width: 70px; }
    .header-row th.work-col { min-width: 100px; font-size: 0.7rem; padding-left: 8px; }
    .header-row th.rm-col { min-width: auto; }
    .data-row td { padding: 8px 6px; }
    .data-row td.date-col { min-width: 70px; font-size: 0.7rem; padding: 8px 4px; }
    .data-row td.work-col { min-width: 100px; font-size: 0.75rem; padding: 8px 6px; }
    .work-name { font-size: 0.75rem; gap: 4px; }
    .work-name .work-url img { height: 20px !important; }
    .rm-checkboxes { gap: 4px; }
    .rm-check { padding: 4px 6px; min-width: 38px; gap: 2px; border-radius: 6px; }
    .rm-check .rm-label { font-size: 0.6rem; padding: 2px 4px; }
    .rm-check .check-icon { font-size: 1rem; }
    .add-work-row td.work-col { font-size: 0.75rem; }
    .section-separator td { height: 2px !important; }
    .rm-settings { padding: 12px; }
    .rm-settings h3 { font-size: 0.85rem; }
    .rm-name-btn { padding: 6px 12px; font-size: 0.7rem; }
  }

  @media (max-width: 480px) {
    body { padding: 6px; }
    h1 { font-size: 1rem; margin-bottom: 5px; }
    .date-nav button { padding: 5px 8px; font-size: 0.75rem; }
    .date-nav .current-date { font-size: 0.8rem; }
    .week-chip { padding: 4px 7px; font-size: 0.65rem; }
    .main-table { border-radius: 8px; font-size: 0.65rem; }
    .header-row th { padding: 6px 4px; font-size: 0.6rem; }
    .header-row th.date-col { min-width: 55px; }
    .header-row th.work-col { min-width: 70px; font-size: 0.6rem; padding-left: 4px; }
    .data-row td { padding: 5px 3px; }
    .data-row td.date-col { min-width: 55px; font-size: 0.6rem; padding: 5px 2px; }
    .data-row td.work-col { min-width: 70px; font-size: 0.65rem; padding: 5px 4px; }
    .work-name { font-size: 0.65rem; gap: 2px; }
    .work-name .work-url img { height: 16px !important; }
    .rm-check { padding: 3px 4px; min-width: 30px; gap: 1px; border-radius: 4px; }
    .rm-check .rm-label { font-size: 0.5rem; padding: 1px 3px; }
    .rm-check .check-icon { font-size: 0.85rem; }
    .add-work-row td.work-col { font-size: 0.65rem; padding: 6px 4px !important; }
    .rm-settings { padding: 8px; }
    .rm-settings h3 { font-size: 0.75rem; }
    .rm-name-btn { padding: 4px 8px; font-size: 0.6rem; }
    .modal { width: 95vw; padding: 16px; }
    .modal h3 { font-size: 0.9rem; }
    .modal input[type="text"] { padding: 8px 10px; font-size: 0.85rem; }
    .modal select { padding: 8px 10px; font-size: 0.85rem; }
    .modal-buttons button { padding: 8px 14px; font-size: 0.8rem; }
    .toast { right: 10px; left: 10px; font-size: 0.8rem; padding: 10px 16px; }
  }


    /* ===== Incomplete Tasks Ticker ===== */

    /* ===== Auto-refresh Timer ===== */
    .auto-refresh-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 10px;
      padding: 4px 12px;
      background: #151525;
      border: 1px solid #2a2a40;
      border-radius: 20px;
      width: fit-content;
      margin-left: auto;
      margin-right: auto;
    }
    .refresh-label {
      font-size: 0.75rem;
      color: #666;
    }
    .refresh-countdown {
      font-size: 0.9rem;
      font-weight: 700;
      color: #4fc3f7;
      min-width: 18px;
      text-align: center;
    }
    .refresh-unit {
      font-size: 0.7rem;
      color: #666;
    }

    .ticker-container {
      width: 100%;
      background: linear-gradient(135deg, #2a1a1a 0%, #3a2020 100%);
      border: 1px solid #5a3030;
      border-radius: 12px;
      padding: 10px 0;
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(255,0,0,0.1);
    }
    .ticker-container.complete {
      background: linear-gradient(135deg, #1a2a1a 0%, #1a3a1a 100%);
      border-color: #2a5a2a;
      box-shadow: 0 4px 15px rgba(0,255,0,0.05);
    }
    .ticker-track {
      display: flex;
      white-space: nowrap;
      animation: ticker-scroll 60s linear infinite;
    }
    @keyframes ticker-scroll {
      0% { transform: translateX(100%); }
      100% { transform: translateX(-100%); }
    }
    .ticker-track:hover {
      animation-play-state: paused;
    }
    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #ff6b6b;
      flex-shrink: 0;
    }
    .ticker-item.complete-item {
      color: #4ecca3;
    }
    .ticker-item .rm-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      color: #fff;
    }
    .ticker-item .pending-count {
      background: #5a2020;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 1.1rem;
      color: #ff6b6b;
      font-weight: 700;
    }
    .ticker-icon { font-size: 1rem; margin-right: 4px; }
    .ticker-label { color: #ffcc00; font-size: 0.85rem; margin-right: 8px; }
    
    @media (max-width: 768px) {
      .ticker-container { padding: 6px 0; margin-bottom: 10px; border-radius: 8px; }
      .ticker-item { font-size: 0.75rem; padding: 0 10px; }
      .ticker-item .rm-badge { font-size: 0.65rem; padding: 1px 5px; }
      .ticker-item .pending-count { font-size: 0.9rem; }
      .ticker-label { font-size: 0.7rem; }
      @keyframes ticker-scroll {
        0% { transform: translateX(100%); }
        100% { transform: translateX(-200%); }
      }
    }
    @media (max-width: 480px) {
      .ticker-item { font-size: 0.65rem; padding: 0 6px; }
      .ticker-item .rm-badge { font-size: 0.55rem; padding: 1px 4px; }
      .ticker-label { font-size: 0.6rem; }.ticker-item .pending-count { font-size: 0.8rem; }
    }


    /* ===== Urgent/Serious Reminder Banner ===== */
    .urgent-banner {
      width: 100%;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(255,0,0,0.15);
      animation: urgent-pulse 2s ease-in-out infinite;
    }
    @keyframes urgent-pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(255,0,0,0.15); }
      50% { box-shadow: 0 4px 30px rgba(255,0,0,0.3); }
    }
    .urgent-banner .banner-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .urgent-banner .banner-items {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .urgent-banner .banner-item {
      display: flex;

  <script>
    var AIRTABLE_API_KEY = '';
    var AIRTABLE_BASE_ID = '';
    var AIRTABLE_BASE_URL = '';
    
    var MAX_RMS = 7;
    var RM_COLORS = ['#4fc3f7', '#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#e74c3c', '#2ecc71'];
    var currentWeekStart = getMonday(new Date());
    var currentModalDateKey = '';
    var works = [];
    var checks = {};
    var checkRecordIds = {}; // Cache: CheckKey → Airtable record ID
    var checkArchive = {}; // Archived old checks from Settings table
    var archiveRecordId = null; // Airtable record ID for CheckArchive
    var ARCHIVE_CUTOFF_DAYS = 14; // Auto-archive checks older than this
    var isSaving = false;
    var isSyncing = false;
    var lastSyncTime = null; // For delta sync: only fetch records modified after this time
    var lastWorksSyncTime = null; // For delta sync of Works table
    var RMS = ['', '', '', '', '', '', ''];
    var isLoading = true;

    var REPEAT_NONE = 'none';
    var REPEAT_DAY = 'day';
    var REPEAT_WEEK = 'week';
    var REPEAT_MONTH = 'month';

    function getMonday(d) {
      var date = new Date(d);
      var day = date.getDay();
      var diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function getDateKey(date) {
      return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    }

    // Build Airtable formula to filter Checks by date range (CheckKey starts with date)
    // e.g., LEFT({CheckKey}, 10) = '2026-06-01' OR LEFT({CheckKey}, 10) = '2026-06-02' ...
    function buildCheckKeyDateFilter(startDateKey, endDateKey) {
      var conditions = [];
      var current = new Date(startDateKey);
      var end = new Date(endDateKey);
      while (current <= end) {
        var dk = getDateKey(current);
        conditions.push("LEFT({CheckKey},10)='" + dk + "'");
        current.setDate(current.getDate() + 1);
      }
      return conditions.length > 0 ? 'OR(' + conditions.join(',') + ')' : null;
    }

    // Calculate date range for initial load: current week ± N weeks (separate before/after)
    function getInitialDateRange(weeksBefore, weeksAfter) {
      var start = new Date(currentWeekStart);
      start.setDate(start.getDate() - weeksBefore * 7);
      var end = new Date(currentWeekStart);
      end.setDate(end.getDate() + (weeksAfter + 1) * 7 - 1); // +6 for end of current week, +N weeks
      return {
        start: getDateKey(start),
        end: getDateKey(end)
      };
    }

    // URL Override functions (per work, per week) — stored in Airtable, synced to all computers
    function getUrlOverride(workId, dateKey) {
      try {
        var work = works.find(function(w) { return w.id === workId; });
        if (!work) return null;
        var overrides = work.urlOverrides || {};
        // For DAY repeat: use cell date directly
        // For WEEK/MONTH repeat: convert cell date to week-start date
        var lookupKey;
        if (work.repeat === 'day') {
          lookupKey = dateKey;
        } else {
          // WEEK/MONTH: convert dateKey to week-start (Monday)
          var parts = dateKey.split('-');
          var d = new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
          var monday = getMonday(d);
          lookupKey = getDateKey(monday);
        }
        var value = overrides[lookupKey] || null;
        console.log('GET URL OVERRIDE: workId =', workId, ', repeat =', work.repeat, ', dateKey =', dateKey, ', lookupKey =', lookupKey, ', value =', value);
        return value;
      } catch(e) { return null; }
    }

    // isPerWeekUrlMode: no longer needed — URL override presence determines behavior
    // (removed: was localStorage-based per_week_url_mode)

    function formatDateLabel() {
      var weekEnd = new Date(currentWeekStart);
      weekEnd.setDate(currentWeekStart.getDate() + 6);
      // Always show year prefix (e.g. "2026/6/8 - 2026/6/14")
      var year = currentWeekStart.getFullYear();
      return year + '/' + (currentWeekStart.getMonth() + 1) + '/' + currentWeekStart.getDate() + ' - ' + year + '/' + (weekEnd.getMonth() + 1) + '/' + weekEnd.getDate();
    }

    function getWeekDates() {
      var dates = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(currentWeekStart.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    async function fetchAirtable(table, filterByFormula) {
      var allRecords = [];
      var offset = null;
      do {
        var url = AIRTABLE_BASE_URL + '/' + encodeURIComponent(table);
        var params = [];
        if (filterByFormula) {
          params.push('filterByFormula=' + encodeURIComponent(filterByFormula));
        }
        if (offset) {
          params.push('offset=' + offset);
        }
        if (params.length > 0) {
          url += '?' + params.join('&');
        }
        var response = await fetch(url, {
          headers: { 'Authorization': 'Bearer ' + AIRTABLE_API_KEY }
        });
        var data = await response.json();
        if (data.records) {
          allRecords = allRecords.concat(data.records);
        }
        offset = data.offset || null;
        // Safety: limit to 15000 records (Airtable max is ~100k)
        if (allRecords.length >= 15000) break;
      } while (offset);
      return allRecords;
    }

    async function createAirtableRecord(table, fields) {
      var response = await fetch(AIRTABLE_BASE_URL + '/' + encodeURIComponent(table), {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + AIRTABLE_API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ fields: fields })
      });
      var data = await response.json();
      if (!response.ok) {
        var error = new Error(data.error?.message || 'Airtable API error');
        error.status = response.status;
        error.data = data;
        throw error;
      }
      return data;
    }

    async function updateAirtableRecord(table, recordId, fields) {
      var response = await fetch(AIRTABLE_BASE_URL + '/' + encodeURIComponent(table) + '/' + recordId, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + AIRTABLE_API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ fields: fields })
      });
      var data = await response.json();
      if (!response.ok) {
        var error = new Error(data.error?.message || 'Airtable API error');
        error.status = response.status;
        error.data = data;
        throw error;
      }
      return data;
    }

    async function deleteAirtableRecord(table, recordId) {
      var response = await fetch(AIRTABLE_BASE_URL + '/' + encodeURIComponent(table) + '/' + recordId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + AIRTABLE_API_KEY }
      });
      if (!response.ok) {
        console.warn('DELETE failed for', recordId, 'status:', response.status);
      }
    }

    // ===== CheckArchive Functions (auto-archive old checks) =====
    async function loadCheckArchive() {
      try {
        var records = await fetchAirtable('Settings', "Name='CheckArchive'");
        if (records.length > 0) {
          archiveRecordId = records[0].id;
          try {
            checkArchive = JSON.parse(records[0].fields.Value || '{}');
          } catch(e) {
            checkArchive = {};
          }
          console.log('ARCHIVE: Loaded', Object.keys(checkArchive).length, 'archived checks');
        }
      } catch(e) {
        console.error('ARCHIVE: Failed to load:', e);
        checkArchive = {};
      }
    }

    async function saveCheckArchive() {
      var archiveStr = JSON.stringify(checkArchive);
      // Truncate if too long (Airtable long text limit is ~100K)
      if (archiveStr.length > 90000) {
        console.warn('ARCHIVE: Archive too large (' + archiveStr.length + ' chars), truncating oldest entries');
        var keys = Object.keys(checkArchive).sort();
        while (archiveStr.length > 80000 && keys.length > 0) {
          delete checkArchive[keys.shift()];
          archiveStr = JSON.stringify(checkArchive);
        }
      }
      if (archiveRecordId) {
        await updateAirtableRecord('Settings', archiveRecordId, { 'Value': archiveStr });
      } else {
        var result = await createAirtableRecord('Settings', { 'Name': 'CheckArchive', 'Value': archiveStr });
        archiveRecordId = result.id;
      }
      console.log('ARCHIVE: Saved', Object.keys(checkArchive).length, 'archived checks');
    }

    async function archiveOldChecks() {
      var cutoff = new Date();
      cutoff.setDate(cutoff.getDate() - ARCHIVE_CUTOFF_DAYS);
      var cutoffKey = getDateKey(cutoff);
      
      var oldKeys = Object.keys(checks).filter(function(key) {
        var datePart = key.split('_')[0];
        return datePart < cutoffKey;
      });
      
      if (oldKeys.length === 0) {
        console.log('ARCHIVE: No old checks to archive');
        return;
      }
      
      console.log('ARCHIVE: Archiving ' + oldKeys.length + ' old checks (before ' + cutoffKey + ')');
      
      // Merge into archive
      oldKeys.forEach(function(key) {
        checkArchive[key] = checks[key];
        delete checks[key];
      });
      
      // Save archive to Settings
      try {
        await saveCheckArchive();
      } catch(e) {
        console.error('ARCHIVE: Failed to save archive:', e);
        // Rollback
        oldKeys.forEach(function(key) {
          checks[key] = checkArchive[key];
          delete checkArchive[key];
        });
        return;
      }
      
      // Delete old records from Checks table (best-effort)
      var deleted = 0;
      for (var i = 0; i < oldKeys.length; i++) {
        var key = oldKeys[i];
        var recordId = checkRecordIds[key];
        if (recordId) {
          try {
            await deleteAirtableRecord('Checks', recordId);
            delete checkRecordIds[key];
            deleted++;
            // Small delay to avoid rate limits
            if (i % 10 === 9) await new Promise(r => setTimeout(r, 100));
          } catch(e) {
            console.warn('ARCHIVE: Failed to delete record ' + key + ':', e);
          }
        }
      }
      
      // Update localStorage
      try {
        localStorage.setItem('checks_cache', JSON.stringify(checks));
        localStorage.setItem('check_archive_cache', JSON.stringify(checkArchive));
      } catch(e) {}
      
      console.log('ARCHIVE: Complete - archived ' + oldKeys.length + ', deleted ' + deleted + ' from Airtable');
    }

    // Calculate date range for smart loading: current week ± weeks
    function getDateRangeForLoading(baseWeekStart, weeksBefore, weeksAfter) {
      var start = new Date(baseWeekStart);
      start.setDate(start.getDate() - weeksBefore * 7);
      var end = new Date(baseWeekStart);
      end.setDate(end.getDate() + weeksAfter * 7);
      return {
        start: getDateKey(start),
        end: getDateKey(end)
      };
    }
    
    async function loadDataSmart() {
      console.log('LOAD SMART: Starting background sync...');
      if (isSyncing) {
        console.log('LOAD SMART: Skipped - already syncing');
        return;
      }
      isSyncing = true;
      
      // Capture sync start time BEFORE fetch (use as lower bound for changes)
      var syncStartTime = new Date().toISOString();
      
      try {
        var records;
        var fetchFilter;
        var isDelta = false;
        
        if (lastSyncTime) {
          // Delta sync: only fetch records modified since last sync
          // Uses our custom LastModifiedTime field (Airtable datetime type)
          fetchFilter = "IS_AFTER({LastModifiedTime}, '" + lastSyncTime + "')";
          console.log('LOAD SMART: Delta sync since', lastSyncTime);
          isDelta = true;
        } else {
          // No lastSyncTime: this is a fresh start, use date-based filter instead
          var range = getInitialDateRange(0, 12);
          fetchFilter = buildCheckKeyDateFilter(range.start, range.end);
          console.log('LOAD SMART: Date-range sync for', range.start, 'to', range.end);
        }
        
        try {
          records = await fetchAirtable('Checks', fetchFilter);
        } catch (fetchErr) {
          // If 422 (bad formula, e.g. lastModifiedTime field doesn't exist), fall back to date range
          if (fetchErr.status === 422 && isDelta) {
            console.log('LOAD SMART: Delta filter failed (422), falling back to date range sync');
            lastSyncTime = null; // Disable delta permanently
            try { localStorage.removeItem('checks_last_sync'); } catch(e) {}
            var range = getInitialDateRange(0, 12);
            fetchFilter = buildCheckKeyDateFilter(range.start, range.end);
            records = await fetchAirtable('Checks', fetchFilter);
          } else {
            throw fetchErr;
          }
        }
        console.log('LOAD SMART: Fetched', records.length, 'records from Airtable');

        // If delta returned 0 but we have a lastSyncTime, fall back to date-range (not full fetch)
        // This handles the case where LastModifiedTime is all set to backfill time (same for all records)
        if (records.length === 0 && lastSyncTime && isDelta) {
          console.log('LOAD SMART: Delta returned 0, falling back to date-range sync');
          lastSyncTime = null;
          try { localStorage.removeItem('checks_last_sync'); } catch(e) {}
          var range = getInitialDateRange(0, 12);
          fetchFilter = buildCheckKeyDateFilter(range.start, range.end);
          records = await fetchAirtable('Checks', fetchFilter);
          console.log('LOAD SMART: Date-range fetched', records.length, 'records');
        }

        // Update lastSyncTime AFTER the fetch (to the time RIGHT NOW, so next delta is from this point forward)
        // Only update if we got records (means there were changes to sync)
        if (records.length > 0) {
          // Set to current time - this is when the sync completed
          // Next delta will fetch records modified AFTER this time
          lastSyncTime = new Date().toISOString();
          try {
            localStorage.setItem('checks_last_sync', lastSyncTime);
          } catch(e) {}
          console.log('LOAD SMART: Updated lastSyncTime to', lastSyncTime);
        }

        // Update checks object with fetched records
        var updatedCount = 0;
        records.forEach(function(r) {
          if (r.fields.CheckKey && r.fields.State !== undefined) {
            checks[r.fields.CheckKey] = r.fields.State;
            checkRecordIds[r.fields.CheckKey] = r.id; // Cache record ID
            updatedCount++;
          }
        });

        // Update localStorage cache
        try {
          localStorage.setItem('checks_cache', JSON.stringify(checks));
          localStorage.setItem('checks_cache_timestamp', Date.now().toString());
          console.log('LOAD SMART: Cache updated');
        } catch(e) {
          console.log('LOAD SMART: Cache save failed (quota exceeded)');
        }

        // ─── SYNC WORKS ───
        // Sync Works table: detect URL/text/repeat/urgent changes from other computers
        var worksUpdatedCount = 0;
        try {
          var worksFilter = null;
          var worksIsDelta = false;
          if (lastWorksSyncTime) {
            worksFilter = "IS_AFTER({LastModifiedTime}, '" + lastWorksSyncTime + "')";
            worksIsDelta = true;
            console.log('LOAD SMART WORKS: Delta sync since', lastWorksSyncTime);
          }
          var worksRecords = await fetchAirtable('Works', worksFilter);
          console.log('LOAD SMART WORKS: Fetched', worksRecords.length, 'works records');

          if (worksRecords.length > 0) {
            worksRecords.forEach(function(rec) {
              var existingIndex = works.findIndex(function(w) { return w.id === rec.id; });
              var urlOverrides = {};
              try {
                if (rec.fields.URLOverrides) {
                  urlOverrides = JSON.parse(rec.fields.URLOverrides);
                }
              } catch(e) { urlOverrides = {}; }
              var workData = {
                id: rec.id,
                text: rec.fields.Name || '',
                url: rec.fields.URL || '',
                dateKey: rec.fields.DateKey || '',
                repeat: rec.fields.Repeat || 'none',
                urgent: (rec.fields.Urgent || '').toLowerCase(),
                urlOverrides: urlOverrides
              };
              if (existingIndex >= 0) {
                // Update existing work (preserve local-only fields if any)
                works[existingIndex] = workData;
                worksUpdatedCount++;
                console.log('LOAD SMART WORKS: Updated work:', workData.text, 'url:', workData.url);
              } else {
                // New work added from another computer
                works.push(workData);
                worksUpdatedCount++;
                console.log('LOAD SMART WORKS: Added new work:', workData.text);
              }
            });

            // Update lastWorksSyncTime
            lastWorksSyncTime = new Date().toISOString();
            try {
              localStorage.setItem('works_last_sync', lastWorksSyncTime);
            } catch(e) {}
            console.log('LOAD SMART WORKS: Updated lastWorksSyncTime to', lastWorksSyncTime);

            // Re-render grid to reflect Works changes (URL/text may have changed)
            renderGrid();
          }
        } catch(worksErr) {
          console.error('LOAD SMART WORKS: Failed to sync Works:', worksErr);
          // Don't throw - Works sync failure shouldn't break the whole sync
        }
        // ─── END WORKS SYNC ───

        renderGrid();
        if (updatedCount > 0 || worksUpdatedCount > 0) {
          var msg = '✅ 已同步';

    // Save a single work to Airtable (PATCH if exists, POST if new)
    async function saveSingleWorkToAirtable(work) {
      try {
        var fields = {
          'Name': work.text,
          'URL': work.url || '',
          'DateKey': work.dateKey,
          'Repeat': work.repeat || 'none',
          'URLOverrides': work.urlOverrides ? JSON.stringify(work.urlOverrides) : '{}'
        };
        // Only add Urgent field if it has a value (URGENT or SERIOUS)
        if (work.urgent === 'urgent') {
          fields['Urgent'] = 'URGENT';
        } else if (work.urgent === 'serious') {
          fields['Urgent'] = 'SERIOUS';
        } else {
          fields['Urgent'] = '';  // clear the field when set to none
        }
        
        if (work.id && work.id.startsWith('rec')) {
          // Existing record - PATCH
          try {
            var result = await updateAirtableRecord('Works', work.id, fields);
            console.log('Work PATCHED:', work.text);
          } catch(patchErr) {
            // If error is due to unknown field (e.g. URLOverrides not yet created in Airtable), retry without it
            if (patchErr.status === 422 || (patchErr.data && patchErr.data.error && patchErr.data.error.type === 'INVALID_PERMITTED_FIELD_OPTIONS')) {
              console.log('Work PATCH: URLOverrides field may not exist, retrying without it');
              delete fields['URLOverrides'];
              var result = await updateAirtableRecord('Works', work.id, fields);
              console.log('Work PATCHED (without URLOverrides):', work.text);
            } else {
              throw patchErr;
            }
          }
        } else {
          // New record - POST
          var result = await createAirtableRecord('Works', fields);
          work.id = result.id;
          console.log('Work POSTED:', work.text);
        }
        showToast(true, '✅ 工作已儲存');
      } catch (e) {
        console.error('Failed to save work:', e);
        showToast(false, '❌ 儲存失敗');
      }
    }

async function saveSingleCheckToAirtable(key) {
      // Optimized: Use checkRecordIds cache to PATCH directly when possible
      // No fetch needed for normal dashboard usage
      console.log('SAVE SINGLE: Saving key:', key, 'state:', checks[key]);
      var state = checks[key];
      var nowISO = new Date().toISOString();
      var cachedId = checkRecordIds[key];
      isSaving = true;
      try {
        if (cachedId) {
          // Fast path: we have the record ID, PATCH directly
          try {
            var result = await updateAirtableRecord('Checks', cachedId, { 'State': state, 'LastModifiedTime': nowISO });
            console.log('SAVE SINGLE: PATCH success (cached):', cachedId);
            return result;
          } catch (patchErr) {
            if (patchErr.status === 404) {
              // Record was deleted externally, clear cache and fall through to POST
              console.log('SAVE SINGLE: Cached ID is stale (404), creating new record');
              delete checkRecordIds[key];
              cachedId = null;
            } else {
              throw patchErr;
            }
          }
        }
        // No cached ID or 404: POST to create new record
        var result = await createAirtableRecord('Checks', { 'CheckKey': key, 'State': state, 'LastModifiedTime': nowISO });
        console.log('SAVE SINGLE: POST success:', result.id);
        checkRecordIds[key] = result.id; // Cache the new ID
        return result;
      } catch (e) {
        if (e.status === 409 || (e.data && e.data.error && e.data.error.type === 'INVALID_REQUEST')) {
          // Rare conflict: record exists but not in our cache (created externally)
          // Need to fetch to find the ID
          console.log('SAVE SINGLE: Unexpected conflict, fetching to find ID...');
          try {
            var existingChecks = await fetchAirtable('Checks');
            for (var i = 0; i < existingChecks.length; i++) {
              var rec = existingChecks[i];
              if (rec.fields.CheckKey === key) {
                checkRecordIds[key] = rec.id; // Update cache
                var result = await updateAirtableRecord('Checks', rec.id, { 'State': state, 'LastModifiedTime': nowISO });
                console.log('SAVE SINGLE: PATCH success after conflict fetch');
                return result;
              }
            }
            console.error('SAVE SINGLE: Record not found even after fetch');
            showToast(false, '❌ 儲存失敗');
          } catch (e2) {
            console.error('SAVE SINGLE: PATCH also failed:', e2);
            showToast(false, '❌ 儲存失敗');
          }
        } else {
          console.error('SAVE SINGLE: Error:', e);
          showToast(false, '❌ 儲存失敗: ' + (e.message || '未知錯誤'));
        }
      } finally {
        isSaving = false;
      }
    }

    async function saveChecksToAirtable() {
      if (isSaving) {
        console.log('SAVE: Skipped - already saving');
        return;
      }
      isSaving = true;
      console.log('SAVE: saveChecksToAirtable started');
      console.log('SAVE: checks to save:', JSON.stringify(checks));
      try {
        console.log('SAVE: Fetching existing checks from Airtable...');
        var existingChecks = await fetchAirtable('Checks');
        console.log('SAVE: Fetched', existingChecks.length, 'existing checks');
        
        // Build a map of existing records by CheckKey
        var existingMap = {};
        for (var i = 0; i < existingChecks.length; i++) {
          var rec = existingChecks[i];
          if (rec.fields.CheckKey) {
            existingMap[rec.fields.CheckKey] = rec.id;
          }
        }
        console.log('SAVE: existingMap has', Object.keys(existingMap).length, 'entries');
        
        // UPSERT: PATCH existing, POST new
        var checkKeys = Object.keys(checks);
        console.log('SAVE: Total checkKeys to save:', checkKeys.length);
        var delay = 300;
        var savedCount = 0;
        var errorCount = 0;
        
        for (var j = 0; j < checkKeys.length; j++) {
          var key = checkKeys[j];
          var state = checks[key];
          console.log('SAVE: Processing', key, '=', state, '(existing?', !!existingMap[key], ')');
          
          try {
            if (existingMap[key]) {
              // PATCH existing record
              console.log('SAVE: PATCH', existingMap[key], 'with State:', state);
              await updateAirtableRecord('Checks', existingMap[key], { 'State': state });
              console.log('SAVE: PATCH successful for', key);
            } else {
              // POST new record
              console.log('SAVE: POST new record for', key, 'with State:', state);
              await createAirtableRecord('Checks', { 'CheckKey': key, 'State': state });
              console.log('SAVE: POST successful for', key);
            }
            savedCount++;
          } catch (err) {
            console.error('SAVE ERROR for', key, ':', err.message || err);
            errorCount++;
            // Don't throw, continue with other records
          }
          
          // Delay between requests to avoid rate limit
          if (j < checkKeys.length - 1) {
            await new Promise(function(res) { setTimeout(res, delay); });
          }
        }
        
        console.log('SAVE: Done! Saved:', savedCount, 'Errors:', errorCount);
        if (errorCount === 0) {
          showToast(true, '✅ 狀態已儲存 (' + savedCount + ' 記錄)');
        } else {
          showToast(false, '⚠️ 部分儲存失敗 (' + errorCount + ' 錯誤)');
        }
      } catch (e) {
        console.error('SAVE: Fatal error:', e);
        showToast(false, '❌ 狀態儲存失敗: ' + (e.message || e));
      } finally {
        isSaving = false;
      }
    }

    function getAllowedWeekRange() {
      var today = getMonday(new Date());
      var minWeek = new Date(today);
      minWeek.setDate(today.getDate() - 14);
      var maxWeek = new Date(today);
      maxWeek.setDate(today.getDate() + 14);
      return { min: getMonday(minWeek), max: getMonday(maxWeek) };
    }

    function navigateWeek(direction) {
      var targetWeek = new Date(currentWeekStart);
      targetWeek.setDate(targetWeek.getDate() + (direction * 7));

      // Check if target week is beyond sync range
      checkAndExtendSyncRange(targetWeek);

      var currentYear = targetWeek.getFullYear();
      var firstMonday = getFirstMondayOfYear(currentYear);
      var lastMonday = getLastMondayOfYear(currentYear);

      var targetStr = targetWeek.toISOString().split('T')[0];
      var firstStr = firstMonday.toISOString().split('T')[0];
      var lastStr = lastMonday.toISOString().split('T')[0];

      if (targetStr < firstStr || targetStr > lastStr) {
        return; // Out of year range
      }

      currentWeekStart = targetWeek;
      updateYearSelectAndLabel(currentYear);
      renderGrid();
    }

    function getFirstMondayOfYear(year) {
      // RM Year: Dec 28 of previous year to Dec 27 of current year
      // Special case: 2026 starts from June 8 instead
      if (year === 2026) {
        // June 8, 2026 - find Monday of that week
        var june8 = new Date(2026, 5, 8); // June 8, 2026
        return getMonday(june8);
      }
      // Dec 28 of previous year
      var dec28 = new Date(year - 1, 11, 28);
      return getMonday(dec28);
    }

    function getLastMondayOfYear(year) {
      // RM Year: Dec 28 of previous year to Dec 27 of current year
      // Dec 27 of current year
      var dec27 = new Date(year, 11, 27);
      return getMonday(dec27);
    }

    function getYearDisplayRange() {
      var year = currentWeekStart.getFullYear();
      var first = getFirstMondayOfYear(year);
      var last = getLastMondayOfYear(year);
      var firstLabel = (first.getMonth() + 1) + '/' + first.getDate();
      var lastLabel = (last.getMonth() + 1) + '/' + last.getDate();
      return firstLabel + ' 至 ' + lastLabel;
    }

    function goToYearStart() {
      var year = currentWeekStart.getFullYear();
      currentWeekStart = getFirstMondayOfYear(year);
      updateYearSelectAndLabel(year);
      renderGrid();
    }

    function goToYearEnd() {
      var year = currentWeekStart.getFullYear();
      currentWeekStart = getLastMondayOfYear(year);
      updateYearSelectAndLabel(year);
      renderGrid();
    }

    function updateYearSelectAndLabel(year) {
      var select = document.getElementById('yearSelect');
      if (select) select.value = year;
      updateYearRangeLabel(year);
    }

    function jumpToYear(year) {
      if (!year) return;
      var y = parseInt(year);
      // Jump to first Monday of RM year (Dec 28 of previous year for most years)
      currentWeekStart = getFirstMondayOfYear(y);
      // Update year range label
      updateYearRangeLabel(y);
      renderGrid();
    }

    function initYearPicker() {
      var select = document.getElementById('yearSelect');
      if (!select) return;
      select.innerHTML = '<option value="">-- 選擇年份 --</option>';
      var currentYear = new Date().getFullYear();
      // Add years from 2026 to current year + 1
      for (var y = 2026; y <= currentYear + 1; y++) {
        var selected = y === currentYear ? ' selected' : '';
        select.innerHTML += '<option value="' + y + '"' + selected + '>' + y + ' 年</option>';
      }
      // Update range label for current year
      updateYearRangeLabel(currentYear);
    }

    function updateYearRangeLabel(year) {
      var label = document.getElementById('yearRangeLabel');
      if (!label) return;
      var first = getFirstMondayOfYear(year);
      var last = getLastMondayOfYear(year);
      label.textContent = '範圍：' + (first.getMonth() + 1) + '/' + first.getDate() + ' 至 ' + (last.getMonth() + 1) + '/' + last.getDate();
    }

    // Check if target week is beyond sync range, extend if needed
    function checkAndExtendSyncRange(targetWeek) {
      var today = new Date();
      today = getMonday(today);
      var currentSyncEnd = new Date(today);
      currentSyncEnd.setDate(today.getDate() + (4 + 1) * 7 - 1); // 4 weeks ahead
      
      if (targetWeek > currentSyncEnd) {
        // Need to extend sync range
        var weeksAhead = Math.ceil((targetWeek - today) / (7 * 24 * 60 * 60 * 1000));
        var newWeeksAfter = weeksAhead + 4; // Add 4 extra weeks buffer
        
        console.log('Extending sync range to', newWeeksAfter, 'weeks ahead');
        var range = getInitialDateRange(0, newWeeksAfter);
        var dateFilter = buildCheckKeyDateFilter(range.start, range.end);
        
        // Async fetch new data
        setTimeout(async function() {
          try {
            var records = await fetchAirtable('Checks', dateFilter);
            console.log('Extended sync fetched', records.length, 'records');
            records.forEach(function(r) {
              if (r.fields.CheckKey && r.fields.State !== undefined) {
                checks[r.fields.CheckKey] = r.fields.State;
                checkRecordIds[r.fields.CheckKey] = r.id;
              }
            });
            localStorage.setItem('checks_cache', JSON.stringify(checks));
            localStorage.setItem('checks_cache_timestamp', Date.now().toString());
            lastSyncTime = new Date().toISOString();
            localStorage.setItem('checks_last_sync', lastSyncTime);
            renderGrid();
            showToast(true, '✅ 已載入 ' + records.length + ' 記錄');
          } catch(e) {
            console.error('Extended sync failed:', e);
          }
        }, 100);
      }
    }

    function jumpToWeek(dateStr) {
      var targetWeek = getMonday(new Date(dateStr));
      var range = getAllowedWeekRange();
      if (targetWeek < range.min || targetWeek > range.max) {
        return;
      }
      checkAndExtendSyncRange(targetWeek);
      currentWeekStart = targetWeek;
      renderGrid();
    }

    function renderWeekChips() {
      var container = document.getElementById('weekChips');
      var baseMonday = new Date(currentWeekStart);
      var html = '';
      for (var w = -2; w <= 2; w++) {
        var monday = new Date(baseMonday);
        monday.setDate(baseMonday.getDate() + (w * 7));
        var isActive = monday.getTime() === currentWeekStart.getTime();
        html += '<div class="week-chip ' + (isActive ? 'active' : '') + '" onclick="jumpToWeek(\'' + monday.toISOString() + '\')">' + (monday.getMonth() + 1) + '/' + monday.getDate() + '</div>';
      }
      container.innerHTML = html;
    }

    var STATE_NAMES = ['☐', '✅', '❌'];
    
    function getCheckKey(dateKey, workId, rmIdx) {
      return dateKey + '_' + workId + '_' + rmIdx;
    }

    async function toggleCheck(dateKey, workId, rmIdx) {
      if (isSyncing) {
        console.log('TOGGLE: Skipped - sync in progress');
        showToast(false, '⚠️ 同步中，請稍後再試');
        return;
      }
      var key = getCheckKey(dateKey, workId, rmIdx);
      var current = checks[key] !== undefined ? checks[key] : (checkArchive[key] !== undefined ? checkArchive[key] : 0);
      
      // Special logic for "Add on Promotion" work
      var work = works.find(w => w.id === workId);
      if (work && work.text === 'Add on Promotion') {
        // X=2 (❌) is locked
        if (current === 2) {
          showToast(false, '🔒 此 RM 已鎖定，無法修改');
          return;
        }
        // Blank=0 can only go to ✅=1, ✅=1 goes back to blank=0
        if (current === 0) {
          checks[key] = 1; // 0 → 1 (only option)
        } else if (current === 1) {
          checks[key] = 0; // 1 → 0
        }
      } else {
        // Normal work: cycle 0 → 1 → 2 → 0
        var next = (current + 1) % 3;
        checks[key] = next;
      }
      renderGrid();
      // Update localStorage cache immediately
      try {
        localStorage.setItem('checks_cache', JSON.stringify(checks));
      } catch(e) {}

      // isSaving flag prevents polling from overwriting this save
      isSaving = true;
      try {
        await saveSingleCheckToAirtable(key);

        // Update LastModifiedTime using cached record ID (no fetch needed!)
        var recordId = checkRecordIds[key];
        if (recordId) {
          await updateAirtableRecord('Checks', recordId, { 'LastModifiedTime': new Date().toISOString() });
        }

        var work = works.find(w => w.id === workId);
        var rmName = RMS[rmIdx] || 'RM' + (rmIdx + 1);
        var stateName = ['', '✅', '❌'][next];
        showToast(true, '✅ ' + rmName + ' → ' + stateName);
      } catch (e) {
        console.error('Save check failed:', e);
        showToast(false, '❌ 保存失敗');
      } finally {
        isSaving = false;
      }
    }

    function renderRmChecks(dateKey, workId) {
      var work = works.find(w => w.id === workId);
      var isLockedWork = work && work.text === 'Add on Promotion';
      
      var html = '<div class="rm-checkboxes">';
      for (var rmIdx = 0; rmIdx < MAX_RMS; rmIdx++) {
        var checkKey = getCheckKey(dateKey, workId, rmIdx);
        var state = checks[checkKey] !== undefined ? checks[checkKey] : (checkArchive[checkKey] !== undefined ? checkArchive[checkKey] : 0);
        var rmColor = RM_COLORS[rmIdx];
        var rmName = RMS[rmIdx] || 'RM' + (rmIdx + 1);
        var icon = STATE_NAMES[state];
        
        // Only "Add on Promotion" has locked X=2
        var bgClass = state === 1 ? 'checked' : (state === 2 ? 'crossed' + (isLockedWork ? ' locked' : '') : 'unchecked');
        
        html += '<div class="rm-check ' + bgClass + '" onclick="toggleCheck(\'' + dateKey + '\',\'' + workId + '\',' + rmIdx + ')">';
        html += '<span class="rm-label" style="color:#fff;background:' + rmColor + ';border-radius:3px;white-space:nowrap;">' + escapeHtml(rmName) + '</span>';
        html += '<span class="check-icon">' + icon + '</span>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function getWorkDates(workDateKey, repeatType, weekDates) {
      if (repeatType === REPEAT_NONE) {
        return [workDateKey];
      }
      
      var dates = [];
      var workDate = new Date(workDateKey);
      var workDay = workDate.getDate();
      var workDayOfWeek = workDate.getDay();
      
      weekDates.forEach(function(date) {
        var dateKey = getDateKey(date);
        if (repeatType === REPEAT_DAY) {
          dates.push(dateKey);
        } else if (repeatType === REPEAT_WEEK) {
          if (date.getDay() === workDayOfWeek) {
            dates.push(dateKey);
          }
        } else if (repeatType === REPEAT_MONTH) {
          if (date.getDate() === workDay) {
            dates.push(dateKey);
          }
        }
      });
      
      return dates;
    }

          if (aP !== bP) return bP - aP; // higher priority first

        });

    function escapeHtml(text) {

    function renderUrgentBanner() {
      var dates = getWeekDates();
      var today = new Date();
      today.setHours(0,0,0,0);
      
      var urgentItems = [];
      var seriousItems = [];
      
      dates.forEach(function(date) {
        var dateKey = getDateKey(date);
        var dayOfWeek = date.getDay();
        // Skip weekends
        if (dayOfWeek === 0 || dayOfWeek === 6) return;
        // Only show past and today (not future)
        if (date > today) return;
        
        var dayWorks = works.filter(function(w) { 
          var workDates = getWorkDates(w.dateKey, w.repeat, dates);
          return workDates.indexOf(dateKey) !== -1;
        });
        
        dayWorks.forEach(function(work) {
          var dayNames = ['日', '一', '二', '三', '四', '五', '六'];
          var dayLabel = (date.getMonth() + 1) + '/' + date.getDate() + '(' + dayNames[dayOfWeek] + ')';
          
          if (work.urgent === 'serious') {
            seriousItems.push({ text: work.text, day: dayLabel, dateKey: dateKey });
          } else if (work.urgent === 'urgent') {
            urgentItems.push({ text: work.text, day: dayLabel, dateKey: dateKey });
          }
        });
      });
      
      var container = document.getElementById('urgentBanner');
      var itemsDiv = document.getElementById('urgentBannerItems');
      
      if (seriousItems.length === 0 && urgentItems.length === 0) {
        container.style.display = 'none';
        return;
      }
      
      // Deduplicate work names and aggregate days
      function aggregate(items) {
        var map = {};
        items.forEach(function(item) {
          if (!map[item.text]) map[item.text] = [];
          if (map[item.text].indexOf(item.day) === -1) map[item.text].push(item.day);
        });
        return map;
      }
      
      var seriousMap = aggregate(seriousItems);
      var urgentMap = aggregate(urgentItems);
      
      var html = '';
      
      // SERIOUS items first (red)
      Object.keys(seriousMap).forEach(function(name) {
        html += '<div class="banner-item serious-item">';
        html += '<span>🔴</span>';
        html += '<span class="work-name-urgent">' + escapeHtml(name) + '</span>';
        html += '<span class="urgent-days">' + seriousMap[name].join('、') + '</span>';
        html += '</div>';
      });
      
      // URGENT items (gold)
      Object.keys(urgentMap).forEach(function(name) {
        html += '<div class="banner-item urgent-item">';
        html += '<span>⚠️</span>';
        html += '<span class="work-name-urgent">' + escapeHtml(name) + '</span>';
        html += '<span class="urgent-days">' + urgentMap[name].join('、') + '</span>';
        html += '</div>';
      });
      
      itemsDiv.innerHTML = html;
      container.style.display = '';
    }

    function renderIncompleteTicker() {
      var dates = getWeekDates();
      var today = new Date();
      today.setHours(0,0,0,0);
      
      // Count pending items per RM for Mon-Fri dates that have passed (today or earlier)
      var rmPending = {};
      var rmColors = RM_COLORS;
      var hasAnyWork = false;
      
      dates.forEach(function(date) {
        var dateKey = getDateKey(date);
        var dayOfWeek = date.getDay();
        // Skip weekends
        if (dayOfWeek === 0 || dayOfWeek === 6) return;
        // Only count past or today dates (not future)
        if (date > today) return;
        
        var dayWorks = works.filter(function(w) { 
          var workDates = getWorkDates(w.dateKey, w.repeat, dates);
          return workDates.indexOf(dateKey) !== -1;
        });
        
        if (dayWorks.length > 0) hasAnyWork = true;
        
        dayWorks.forEach(function(work) {
          for (var rmIdx = 0; rmIdx < MAX_RMS; rmIdx++) {
            var key = getCheckKey(dateKey, work.id, rmIdx);
            var state = checks[key] !== undefined ? checks[key] : (checkArchive[key] !== undefined ? checkArchive[key] : 0);
            if (state === 0) {
              var rmName = RMS[rmIdx] || 'RM' + (rmIdx + 1);
              if (!rmPending[rmIdx]) rmPending[rmIdx] = 0;
              rmPending[rmIdx]++;
            }
          }
        });
      });
      
      var container = document.getElementById('tickerContainer');
      var track = document.getElementById('tickerTrack');
      
      if (!hasAnyWork || Object.keys(rmPending).length === 0) {
        // All complete or no works this week
        container.className = 'ticker-container complete';
        track.innerHTML = '<div class="ticker-item complete-item"><span class="ticker-icon">✅</span> 本星期所有工作已完成!</div>';
        container.style.display = '';
        return;
      }
      
      container.className = 'ticker-container';
      
      var html = '<div class="ticker-item">';
      html += '<span class="ticker-icon">⚠️</span>';
      html += '<span class="ticker-label">未完成</span>';
      html += '</div>';
      
      // Sort RMs by pending count (highest first)
      var sortedRMs = Object.keys(rmPending).sort(function(a, b) {
        return rmPending[b] - rmPending[a];
      });
      
      sortedRMs.forEach(function(rmIdx) {
        var rmName = RMS[parseInt(rmIdx)] || 'RM' + (parseInt(rmIdx) + 1);
        var color = rmColors[parseInt(rmIdx)];
        var count = rmPending[rmIdx];
        html += '<div class="ticker-item">';
        html += '<span class="rm-badge" style="background:' + color + ';">' + escapeHtml(rmName) + '</span>';
        html += '<span class="pending-count">' + count + '</span>';
        html += '</div>';
      });
      
      track.innerHTML = html;
      container.style.display = '';
    }

    var isSavingWork = false; // Prevent double-save on work modal
    async function saveWork() {
      if (isSavingWork) {
        console.log('SAVE WORK: Already saving, skipped');
        return;
      }
      isSavingWork = true;
      var id = document.getElementById('editWorkId').value;
      var text = document.getElementById('workNameInput').value.trim();
      var url = document.getElementById('workUrlInput').value.trim();
      var repeat = document.getElementById('workRepeatInput').value;
      // Get priority from radio buttons
      var urgent = '';
      var radios = document.getElementsByName('workPriority');
      for (var i = 0; i < radios.length; i++) {
        if (radios[i].checked) {
          urgent = radios[i].value;
          break;
        }
      }

      if (!text) { isSavingWork = false; alert('請輸入工作名稱'); return; }

      // Get URL override if applicable (per-week URL stored in Airtable, synced to all computers)
      var urlOverride = null;
      if (repeat === 'day' || repeat === 'week' || repeat === 'month') {
        var useOverride = document.getElementById('useUrlOverride').checked;
        console.log('SAVE: useOverride checked =', useOverride);
        if (useOverride) {
          urlOverride = document.getElementById('workUrlOverrideInput').value.trim();
          console.log('SAVE: urlOverride =', urlOverride);
        }
      }

      if (id) {
        var work = works.find(function(w) { return w.id === id; });
        if (work) {
          work.text = text;
          work.url = url;
          work.repeat = repeat;
          work.urgent = urgent;
          // Initialize urlOverrides if needed
          if (!work.urlOverrides) work.urlOverrides = {};
          // Save URL override: use currentModalDateKey (specific date for DAY), week-start for WEEK/MONTH
          var saveDateKey;
          if (repeat === 'day') {
            // DAY repeat: key by specific cell date
            saveDateKey = currentModalDateKey || getDateKey(currentWeekStart);
          } else {
            // WEEK/MONTH repeat: key by week start (Monday)
            saveDateKey = getDateKey(currentWeekStart);
          }
          console.log('SAVE: work.id =', work.id, ', repeat =', repeat, ', saveDateKey =', saveDateKey);
          if (urlOverride) {
            work.urlOverrides[saveDateKey] = urlOverride;
          } else {
            delete work.urlOverrides[saveDateKey];
          }
          await saveSingleWorkToAirtable(work);
        }
      } else {
        if (!currentModalDateKey) { isSavingWork = false; alert('請選擇日子'); return; }
        var newWork = {
          id: 'new_' + Date.now(),
          text: text,
          url: url,
          dateKey: currentModalDateKey,
          repeat: repeat,
          urgent: urgent,
          urlOverrides: {}
        };
        // Save URL override to Airtable-synced urlOverrides
        var newSaveDateKey;
        if (repeat === 'day') {
          newSaveDateKey = currentModalDateKey || getDateKey(currentWeekStart);
        } else {
          newSaveDateKey = getDateKey(currentWeekStart);
        }
        console.log('SAVE: new work id =', newWork.id, ', repeat =', repeat, ', newSaveDateKey =', newSaveDateKey);
        if (urlOverride) {
          newWork.urlOverrides[newSaveDateKey] = urlOverride;
        }
        works.push(newWork);
        await saveSingleWorkToAirtable(newWork);
      }
      closeWorkModal();
      renderGrid();
      isSavingWork = false;
    }

    async function deleteWork() {
      var id = document.getElementById('editWorkId').value;
      if (!confirm('確定刪除呢项工作？')) return;
      var work = works.find(function(w) { return w.id === id; });
      // Delete from Airtable if it has a record ID
      if (work && work.id && work.id.startsWith('rec')) {
        try {
          await deleteAirtableRecord('Works', work.id);
          console.log('Work deleted from Airtable:', work.text);
        } catch(e) {
          console.error('Failed to delete from Airtable:', e);
          showToast(false, '⚠️ Airtable 刪除失敗，但本地已刪除');
        }
      }
      works = works.filter(function(w) { return w.id !== id; });
      closeWorkModal();
      renderGrid();
      showToast(true, '✅ 工作已刪除');
    }

    // Force sync: clear cache and reload all data from Airtable
    function forceSync() {
      console.log('SYNC: Clearing cache and forcing full reload...');
      localStorage.removeItem('checks_cache');
      localStorage.removeItem('checks_cache_timestamp');
      // Reset works and checks
      works = [];
      checks = {};
      // Show loading
      isLoading = true;
      document.getElementById('loading').style.display = 'block';
      // Reload everything
      loadData();
      showToast(true, '🔄 正在同步...');
    }
    
    // Auto-sync when page becomes visible again (e.g., switch from another tab/app)
    document.addEventListener('visibilitychange', function() {
      if (document.visibilityState === 'visible' && !isLoading && !isSaving && !isSyncing) {
        console.log('SYNC: Page became visible, triggering background sync...');
        countdownValue = 10;
        updateCountdown();
        loadDataSmart();
      } else if (document.visibilityState === 'hidden') {
        console.log('SYNC: Page hidden, stopping polling...');
        stopPolling();
      }
    });
    
    // Poll for updates every 10 seconds with countdown timer
    var syncInterval = null;
    var countdownValue = 10;
    function updateCountdown() {
      var el = document.getElementById('refreshCountdown');
      if (el) el.textContent = countdownValue;
    }
    function startPolling() {
      if (syncInterval) clearInterval(syncInterval);
      countdownValue = 10;
      updateCountdown();
      // Countdown tick every 1 second
      syncInterval = setInterval(function() {
        countdownValue--;
        if (countdownValue <= 0) {
          countdownValue = 10;
          if (!isLoading && !isSaving && !isSyncing) {
            console.log('SYNC: Auto-refresh...');
            loadDataSmart();
          }
        }
        updateCountdown();
      }, 1000);
    }
    function stopPolling() {
      if (syncInterval) {
        clearInterval(syncInterval);
        syncInterval = null;
      }
    }
    
    // Protect: if user refreshes/closes during a save, wait for it to complete
    window.addEventListener('beforeunload', function(e) {
      if (isSaving) {
        // Show warning that save is in progress
        e.preventDefault();
        e.returnValue = '儲存中，請稍候...';
        // Don't return false - let the browser show its dialog
      }
    });

    // Initialize
    function init() {
      // 每次進入頁面自動去當日嗰週
      currentWeekStart = getMonday(new Date());
      // renderGrid() 會在 loadData() 完成後才調用，避免 race condition
      
      var savedApiKey = localStorage.getItem('airtable_api_key');
      var savedBaseId = localStorage.getItem('airtable_base_id');
      
      // Load last sync time for delta sync
      var savedLastSync = localStorage.getItem('checks_last_sync');
      if (savedLastSync) {
        lastSyncTime = savedLastSync;
        console.log('LOAD: Restored lastSyncTime:', lastSyncTime);
      }
      var savedLastWorksSync = localStorage.getItem('works_last_sync');
      if (savedLastWorksSync) {
        lastWorksSyncTime = savedLastWorksSync;
        console.log('LOAD: Restored lastWorksSyncTime:', lastWorksSyncTime);
      }
      
      if (savedApiKey && savedBaseId) {
        AIRTABLE_API_KEY = savedApiKey;
        AIRTABLE_BASE_ID = savedBaseId;
        AIRTABLE_BASE_URL = 'https://api.airtable.com/v0/' + AIRTABLE_BASE_ID;
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('setupOverlay').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        loadData();
      } else {
        document.getElementById('setupOverlay').style.display = 'flex';
        document.getElementById('loading').style.display = 'none';
      }
    }
    

    function showToast(success, message) {
      var toast = document.getElementById('toast');
      if (!toast) {
        // Fallback: show in current date label
        var label = document.getElementById('currentDateLabel');
        if (label) {
          label.textContent = message;
          label.style.color = success ? '#2ecc71' : '#e74c3c';
          setTimeout(function() {
            label.textContent = formatDateLabel();
            label.style.color = '#4fc3f7';
          }, 2500);
        }
        console.log('Toast fallback:', message);
        return;
      }
      toast.textContent = message;
      toast.className = 'toast ' + (success ? 'success' : 'error') + ' show';
      setTimeout(function() {
        toast.classList.remove('show');
      }, 2500);
    }

    // RM Slot to Name mapping
    var RM_SLOT_NAMES = ['Cat', 'Jerry', 'Gary', 'Suezette', 'PIPI', 'Alvis', 'Candy'];

    async function sendDiscordReminder() {
      var btn = document.getElementById('reminderBtn');
      if (!btn) return;

      var today = new Date();
      var todayStr = getDateKey(today);
      var dayOfWeek = today.getDay(); // 0=Sun, 1=Mon, ..., 5=Fri, 6=Sat

      // Calculate Friday 23:59:59 of current week
      var fridayEnd = new Date(currentWeekStart);
      fridayEnd.setDate(fridayEnd.getDate() + 4);
      fridayEnd.setHours(23, 59, 59, 999);

      var weekKey = getDateKey(currentWeekStart); // YYYY-MM-DD of Monday

      // Check if we should reset (after Friday 23:59 and it's Saturday or Sunday)
      if (today > fridayEnd && (dayOfWeek === 0 || dayOfWeek === 6)) {
        localStorage.removeItem('reminder_sent_' + weekKey);
      }

      // Only send on weekdays (Mon-Fri), and not if already sent today
      if (dayOfWeek === 0 || dayOfWeek === 6) {
        showToast(false, '⚠️ 週末休息，下週一再見');
        return;
      }

      var sentTodayKey = 'reminder_sent_' + weekKey + '_' + todayStr;
      if (localStorage.getItem(sentTodayKey)) {
        showToast(false, '⚠️ 今日已發送過提醒');
        return;
      }

      // Disable button during sending
      btn.disabled = true;
      btn.textContent = '發送中...';

      var DISCORD_WEBHOOK = 'https://discord.com/api/webhooks/1516150028006195360/BeHlUKU9hwVnDp_c26-PszpTWZnpPM_85eRqpTZKSIYU1x0nDzYwhh8cvo7Xdsr8fv_2';

      // Get current week dates (Mon to Fri only for this logic)
      var weekDates = [];
      var monday = new Date(currentWeekStart);
      for (var i = 0; i < 5; i++) { // Mon to Fri
        var d = new Date(monday);
        d.setDate(monday.getDate() + i);
        weekDates.push(getDateKey(d));
      }

      // Find unchecked (State=0) for current week up to today, group by slot
      var uncheckedBySlot = {};
      for (var slot = 0; slot < 7; slot++) {
        uncheckedBySlot[slot] = [];
      }

      for (var key in checks) {
        if (!checks.hasOwnProperty(key)) continue;
        if (checks[key] !== 0) continue; // Only unchecked

        // Parse CheckKey: YYYY-MM-DD_workId_slot
        var parts = key.split('_');
        if (parts.length < 3) continue;
        var datePart = parts[0];
        var slotIndex = parseInt(parts[parts.length - 1], 10);

        // Only include dates up to today in current week
        if (weekDates.indexOf(datePart) === -1) continue;
        if (datePart > todayStr) continue; // Don't include future dates
        if (slotIndex >= 0 && slotIndex <= 6) {
          uncheckedBySlot[slotIndex].push(datePart);
        }
      }

      // Count total unchecked
      var totalUnchecked = 0;
      for (var s = 0; s < 7; s++) {
        totalUnchecked += uncheckedBySlot[s].length;
      }

      if (totalUnchecked === 0) {
        showToast(true, '✅ 所有 RM 已完成，無需提醒！');
        btn.disabled = false;
        btn.textContent = '🔔 發送提醒';
        return;
      }

      // Send ONE notification per RM (consolidate all days from Mon to today)
      var dateStr = today.getFullYear() + '/' + String(today.getMonth() + 1).padStart(2, '0') + '/' + String(today.getDate()).padStart(2, '0');

      var sentCount = 0;
      var failedCount = 0;

      for (var slotIdx = 0; slotIdx < 7; slotIdx++) {
        if (uncheckedBySlot[slotIdx].length === 0) continue;

        var rmName = RM_SLOT_NAMES[slotIdx];
        var count = uncheckedBySlot[slotIdx].length;
        var daysList = uncheckedBySlot[slotIdx].join('、').replace(/-/g, '/');

        var message = '⏰⏰快D做 TO DO LIST 呀 ⏰⏰\n日期: ' + dateStr + ' 提醒\nRM Name: ' + rmName + '\n未完成工作: ' + count + ' 項（' + daysList + '）\n\n👉 https://fificheck.github.io/todo-dashboard-v2/';

        try {
          var response = await fetch(DISCORD_WEBHOOK, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content: message })
          });

          if (response.ok) {
            sentCount++;
            console.log('Sent reminder for', rmName, ':', count, 'items');
          } else {
            failedCount++;
            console.error('Failed to send for', rmName, ':', response.status);
          }
        } catch (e) {
          failedCount++;
          console.error('Error sending for', rmName, ':', e);
        }

        // Small delay between messages
        await new Promise(function(resolve) { setTimeout(resolve, 500); });
      }

      // Mark as sent today
      localStorage.setItem(sentTodayKey, 'true');

      if (sentCount > 0) {
        showToast(true, '✅ 已發送 ' + sentCount + ' 個提醒（明日可再發）');
      } else {
        showToast(false, '❌ 發送失敗');
      }

      btn.disabled = false;
      btn.textContent = '🔔 發送提醒';
    }
    init();
  </script>
