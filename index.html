<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona Team To-Do Dashboard v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
    h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 1.8rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.9rem; }
    .date-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-nav { display: flex; align-items: center; gap: 10px; }
    .date-nav button { background: #16213e; color: #fff; border: 1px solid #0f3460; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .date-nav button:hover { background: #0f3460; }
    .date-nav .current-date { color: #e94560; font-weight: bold; min-width: 200px; text-align: center; font-size: 1.1rem; }
    .week-chips { display: flex; gap: 5px; background: #16213e; border-radius: 6px; padding: 4px; }
    .week-chip { padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; color: #aaa; }
    .week-chip:hover { background: #0f3460; color: #fff; }
    .week-chip.active { background: #e94560; color: #fff; }

    .main-grid { display: grid; gap: 1px; background: #333; border-radius: 8px; overflow: auto; max-width: 100%; }
    
    .header-cell { background: #16213e; padding: 12px 8px; text-align: center; font-weight: bold; color: #fff; font-size: 0.8rem; min-width: 100px; }
    .header-cell.date-header { background: #0f3460; color: #e94560; }
    .header-cell.work-pool-header { background: #e94560; color: #fff; min-width: 120px; }
    .header-cell.weekend { background: #1a1a2e; color: #666; }
    
    .work-pool-col { background: #1f1f3a; padding: 8px; min-width: 120px; vertical-align: top; }
    
    .date-col { background: #1f1f3a; padding: 4px; min-width: 100px; vertical-align: top; }
    .date-col.weekend { background: #181828; }
    
    .rm-block { 
      background: #252540; 
      border-radius: 6px; 
      margin-bottom: 4px; 
      border-left: 3px solid #555;
      padding: 6px 8px;
      min-height: 60px;
    }
    .rm-block.has-name { border-left-color: #e94560; }
    
    .rm-name { 
      font-weight: bold; 
      font-size: 0.7rem; 
      color: #e94560; 
      cursor: pointer;
      margin-bottom: 4px;
      display: block;
    }
    .rm-name:hover { text-decoration: underline; }
    .rm-name.empty { color: #888; font-style: italic; }
    
    .work-pool-item {
      background: #252540;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      border: 1px solid transparent;
    }
    .work-pool-item:hover { border-color: #e94560; }
    .work-pool-item.selected { border-color: #4ecca3; background: #1f3a2e; }
    
    .work-item { display: flex; align-items: center; gap: 4px; margin-bottom: 2px; padding: 2px 4px; background: #1a1a2e; border-radius: 4px; }
    .work-item.done { opacity: 0.5; }
    .work-item .work-text { flex: 1; font-size: 0.7rem; word-break: break-word; }
    .work-item .work-text a { color: #4fc3f7; text-decoration: none; }
    .work-item .btn { cursor: pointer; font-size: 0.8rem; padding: 1px; }
    .work-item .btn:hover { transform: scale(1.2); }
    .work-item .btn-clear { color: #666; font-size: 0.7rem; }
    .work-item .btn-clear:hover { color: #e94560; }
    
    .add-work-btn { 
      background: transparent; 
      border: 1px dashed #444; 
      color: #666; 
      width: 100%; 
      padding: 4px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.7rem; 
      margin-top: 4px;
    }
    .add-work-btn:hover { border-color: #e94560; color: #e94560; }
    
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1f1f3a; border-radius: 10px; padding: 24px; width: 400px; max-width: 90vw; }
    .modal h3 { color: #fff; margin-bottom: 16px; }
    .modal input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; background: #252540; border: 1px solid #333; border-radius: 6px; color: #fff; font-family: inherit; box-sizing: border-box; }
    .modal label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.85rem; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .modal-buttons button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
    .modal-buttons .cancel-btn { background: #333; color: #fff; }
    .modal-buttons .save-btn { background: #e94560; color: #fff; }
  </style>
</head>
<body>
  <h1>📋 Fiona Team To-Do Dashboard v2</h1>
  <p class="subtitle">左方：工作池（剔選工作）| 頂部：日期 | 每個日期：7個 RM 空格</p>

  <div class="date-controls">
    <div class="date-nav">
      <button onclick="navigateWeek(-1)">◀ 上一週</button>
      <span class="current-date" id="currentDateLabel">-</span>
      <button onclick="navigateWeek(1)">下一週 ▶</button>
    </div>
    <div class="week-chips" id="weekChips"></div>
  </div>

  <div class="main-grid" id="mainGrid"></div>

  <div class="modal-overlay" id="workModal">
    <div class="modal">
      <h3 id="workModalTitle">加入工作</h3>
      <input type="hidden" id="editWorkId">
      <label>工作名稱</label>
      <input type="text" id="workNameInput" placeholder="輸入工作名稱...">
      <label>URL 連結（可選）</label>
      <input type="text" id="workUrlInput" placeholder="https://...">
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeWorkModal()">取消</button>
        <button class="save-btn" onclick="saveWork()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    var MAX_RMS = 7;
    var RM_COLORS = ['#e94560', '#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#e74c3c', '#2ecc71'];
    var currentWeekStart = getMonday(new Date());
    var data = {};
    var RMS = ['', '', '', '', '', '', ''];

    function getMonday(d) {
      var date = new Date(d);
      var day = date.getDay();
      var diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function loadData() {
      var saved = localStorage.getItem('todo_dashboard_v10');
      if (saved) {
        var parsed = JSON.parse(saved);
        data = parsed.data || { works: [], assignments: {} };
        RMS = parsed.rms || ['', '', '', '', '', '', ''];
      } else {
        data = { works: [], assignments: {} };
        RMS = ['', '', '', '', '', '', ''];
      }
    }

    function saveData() {
      localStorage.setItem('todo_dashboard_v10', JSON.stringify({ data: data, rms: RMS }));
    }

    function navigateWeek(direction) {
      currentWeekStart.setDate(currentWeekStart.getDate() + (direction * 7));
      renderGrid();
    }

    function jumpToWeek(dateStr) {
      currentWeekStart = getMonday(new Date(dateStr));
      renderGrid();
    }

    function getWeekDates() {
      var dates = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(currentWeekStart.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    function getDateKey(date) {
      return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    }

    function formatDateLabel() {
      var weekEnd = new Date(currentWeekStart);
      weekEnd.setDate(currentWeekStart.getDate() + 6);
      return (currentWeekStart.getMonth() + 1) + '/' + currentWeekStart.getDate() + ' - ' + (weekEnd.getMonth() + 1) + '/' + weekEnd.getDate();
    }

    function renderWeekChips() {
      var container = document.getElementById('weekChips');
      var today = new Date();
      var todayMonday = getMonday(today);
      var html = '';
      for (var w = -4; w <= 4; w++) {
        var monday = new Date(todayMonday);
        monday.setDate(todayMonday.getDate() + (w * 7));
        var isActive = monday.getTime() === currentWeekStart.getTime();
        html += '<div class="week-chip ' + (isActive ? 'active' : '') + '" onclick="jumpToWeek(\'' + monday.toISOString() + '\')">' + (monday.getMonth() + 1) + '/' + monday.getDate() + '</div>';
      }
      container.innerHTML = html;
    }

    function getAssignmentKey(dateKey, rmIdx) {
      return dateKey + '_' + rmIdx;
    }

    function toggleWorkDone(dateKey, rmIdx, workId) {
      var key = getAssignmentKey(dateKey, rmIdx);
      if (!data.assignments[key]) return;
      var work = data.assignments[key].find(function(w) { return w.id === workId; });
      if (work) {
        work.done = !work.done;
        saveData();
        renderGrid();
      }
    }

    function removeWorkFromCell(dateKey, rmIdx, workId) {
      var key = getAssignmentKey(dateKey, rmIdx);
      if (!data.assignments[key]) return;
      data.assignments[key] = data.assignments[key].filter(function(w) { return w.id !== workId; });
      saveData();
      renderGrid();
    }

    function addWorkToCell(dateKey, rmIdx, work) {
      var key = getAssignmentKey(dateKey, rmIdx);
      if (!data.assignments[key]) data.assignments[key] = [];
      // Check if already added
      var exists = data.assignments[key].some(function(w) { return w.id === work.id; });
      if (!exists) {
        data.assignments[key].push({ id: work.id, text: work.text, url: work.url, done: false });
        saveData();
        renderGrid();
      }
    }

    function renderGrid() {
      var grid = document.getElementById('mainGrid');
      var dates = getWeekDates();
      document.getElementById('currentDateLabel').textContent = formatDateLabel();
      renderWeekChips();

      // Header row: Work Pool + date columns
      var html = '<div class="header-cell work-pool-header">工作池</div>';
      dates.forEach(function(date) {
        html += '<div class="header-cell date-header">' + (date.getMonth() + 1) + '/' + date.getDate() + '</div>';
      });

      // Work pool column
      html += '<div class="work-pool-col">';
      data.works.forEach(function(work) {
        html += '<div class="work-pool-item" onclick="openEditWork(\'' + work.id + '\')">' + escapeHtml(work.text) + '</div>';
      });
      html += '<button class="add-work-btn" onclick="openAddWork()">+ 新增工作</button>';
      html += '</div>';

      // RM rows
      for (var rmIdx = 0; rmIdx < MAX_RMS; rmIdx++) {
        var rmColor = RM_COLORS[rmIdx];
        var rmName = RMS[rmIdx] || 'RM' + (rmIdx + 1);
        
        // RM header cell
        html += '<div class="header-cell" style="background:#16213e;color:' + rmColor + ';border-top:3px solid ' + rmColor + ';cursor:pointer;" onclick="setRmName(' + rmIdx + ')">' + escapeHtml(rmName) + '</div>';
        
        // For each date
        dates.forEach(function(date) {
          var dateKey = getDateKey(date);
          var key = getAssignmentKey(dateKey, rmIdx);
          var assignedWorks = data.assignments[key] || [];
          
          html += '<div class="date-col">';
          html += '<div class="rm-block ' + (RMS[rmIdx] ? 'has-name' : '') + '" style="border-left-color:' + (RMS[rmIdx] ? rmColor : '#555') + '">';
          
          // Show assigned works
          assignedWorks.forEach(function(w) {
            html += '<div class="work-item ' + (w.done ? 'done' : '') + '">';
            html += '<span class="btn" onclick="toggleWorkDone(\'' + dateKey + '\',' + rmIdx + ',\'' + w.id + '\')">' + (w.done ? '✅' : '☐') + '</span>';
            html += '<span class="work-text">' + escapeHtml(w.text) + (w.url ? ' <a href="' + escapeHtml(w.url) + '" target="_blank">🔗</a>' : '') + '</span>';
            html += '<span class="btn-clear" onclick="removeWorkFromCell(\'' + dateKey + '\',' + rmIdx + ',\'' + w.id + '\')">✕</span>';
            html += '</div>';
          });
          
          // Work pool selector
          html += '<div style="margin-top:4px;">';
          data.works.forEach(function(work) {
            var isAssigned = assignedWorks.some(function(w) { return w.id === work.id; });
            html += '<div class="work-pool-item ' + (isAssigned ? 'selected' : '') + '" style="font-size:0.65rem;padding:4px 6px;margin-bottom:2px;" onclick="addWorkToCell(\'' + dateKey + '\',' + rmIdx + ',' + JSON.stringify(work).replace(/"/g, '&quot;') + ')">' + (isAssigned ? '✓ ' : '+ ') + escapeHtml(work.text) + '</div>';
          });
          html += '</div>';
          
          html += '</div></div>';
        });
      }
      
      grid.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setRmName(rmIdx) {
      var name = prompt('請輸入 RM 名稱（第 ' + (rmIdx + 1) + ' 行）：', RMS[rmIdx] || '');
      if (name !== null) {
        RMS[rmIdx] = name.trim();
        saveData();
        renderGrid();
      }
    }

    function openAddWork() {
      document.getElementById('workModalTitle').textContent = '新增工作';
      document.getElementById('editWorkId').value = '';
      document.getElementById('workNameInput').value = '';
      document.getElementById('workUrlInput').value = '';
      document.getElementById('workModal').classList.add('active');
      document.getElementById('workNameInput').focus();
    }

    function openEditWork(workId) {
      var work = data.works.find(function(w) { return w.id === workId; });
      if (!work) return;
      document.getElementById('workModalTitle').textContent = '編輯工作';
      document.getElementById('editWorkId').value = workId;
      document.getElementById('workNameInput').value = work.text;
      document.getElementById('workUrlInput').value = work.url || '';
      document.getElementById('workModal').classList.add('active');
      document.getElementById('workNameInput').focus();
    }

    function saveWork() {
      var id = document.getElementById('editWorkId').value;
      var text = document.getElementById('workNameInput').value.trim();
      var url = document.getElementById('workUrlInput').value.trim();
      
      if (!text) { alert('請輸入工作名稱'); return; }
      
      if (id) {
        var work = data.works.find(function(w) { return w.id === id; });
        if (work) {
          work.text = text;
          work.url = url;
        }
      } else {
        data.works.push({ id: Date.now().toString(), text: text, url: url });
      }
      
      saveData();
      closeWorkModal();
      renderGrid();
    }

    function closeWorkModal() {
      document.getElementById('workModal').classList.remove('active');
    }

    document.getElementById('workModal').addEventListener('click', function(e) {
      if (e.target.classList.contains('modal-overlay')) closeWorkModal();
    });

    loadData();
    renderGrid();
  </script>
</body>
</html>
