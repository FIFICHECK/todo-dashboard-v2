<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona Team To-Do Dashboard v2</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    /* Week Navigation */
    .week-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .week-nav button {
      background: #16213e;
      color: #fff;
      border: 1px solid #0f3460;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .week-nav button:hover {
      background: #0f3460;
    }

    .week-nav .current-week {
      color: #e94560;
      font-weight: bold;
      min-width: 200px;
      text-align: center;
    }

    /* Main Grid */
    .main-grid {
      display: grid;
      grid-template-columns: 100px repeat(7, 1fr);
      gap: 1px;
      background: #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .header-cell {
      background: #16213e;
      padding: 12px 8px;
      text-align: center;
      font-weight: bold;
      color: #fff;
    }

    .header-cell.rm-header {
      background: #0f3460;
      color: #e94560;
    }

    .week-row {
      display: contents;
    }

    .week-label {
      background: #16213e;
      padding: 15px 8px;
      text-align: center;
      font-weight: bold;
      color: #e94560;
      writing-mode: horizontal-tb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
    }

    .task-cell {
      background: #1f1f3a;
      padding: 8px;
      min-height: 120px;
      vertical-align: top;
    }

    /* Task Items */
    .task-item {
      background: #252540;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      border-left: 3px solid #0f3460;
      position: relative;
    }

    .task-item.done {
      border-left-color: #4ecca3;
      opacity: 0.7;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #888;
    }

    .task-text {
      font-size: 0.85rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .task-text a {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 0.8rem;
    }

    .task-text a:hover {
      text-decoration: underline;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    .task-actions button {
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .task-actions button:hover {
      background: #333;
      color: #fff;
    }

    .checkbox {
      cursor: pointer;
      margin-right: 4px;
      font-size: 0.9rem;
    }

    /* Add Task Button */
    .add-task-btn {
      background: transparent;
      border: 1px dashed #444;
      color: #666;
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .add-task-btn:hover {
      border-color: #0f3460;
      color: #4fc3f7;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1f1f3a;
      border-radius: 10px;
      padding: 24px;
      width: 400px;
      max-width: 90vw;
    }

    .modal h3 {
      color: #fff;
      margin-bottom: 16px;
    }

    .modal input,
    .modal textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
    }

    .modal textarea {
      min-height: 80px;
      resize: vertical;
    }

    .modal input::placeholder,
    .modal textarea::placeholder {
      color: #666;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .modal-buttons button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .modal-buttons .cancel-btn {
      background: #333;
      color: #fff;
    }

    .modal-buttons .save-btn {
      background: #e94560;
      color: #fff;
    }

    .modal-buttons button:hover {
      opacity: 0.9;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.cat { background: #e94560; }
    .dot.gary { background: #4ecca3; }
    .dot.fifi { background: #f39c12; }
    .dot.jerry { background: #3498db; }
    .dot.moses { background: #9b59b6; }
    .dot.alvis { background: #1abc9c; }
    .dot.knald { background: #e74c3c; }
  </style>
</head>
<body>
  <h1>📋 Fiona Team To-Do Dashboard v2</h1>
  <p class="subtitle">橫向：RM 排列 | 縱向：每週工作</p>

  <div class="week-nav">
    <button onclick="navigateWeek(-1)">◀ 上一組</button>
    <span class="current-week" id="currentWeekLabel">-</span>
    <button onclick="navigateWeek(1)">下一組 ▶</button>
  </div>

  <div class="main-grid" id="mainGrid">
    <!-- Grid will be rendered here -->
  </div>

  <div class="legend">
    <span><span class="dot cat"></span>Cat</span>
    <span><span class="dot gary"></span>Gary</span>
    <span><span class="dot fififi"></span>Fi Fi</span>
    <span><span class="dot jerry"></span>Jerry</span>
    <span><span class="dot moses"></span>Moses</span>
    <span><span class="dot alvis"></span>Alvis</span>
    <span><span class="dot knald"></span>Knald</span>
  </div>

  <!-- Add/Edit Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <h3 id="modalTitle">加入工作</h3>
      <input type="hidden" id="editTaskId">
      <input type="hidden" id="editRm">
      <input type="hidden" id="editWeek">
      <input type="hidden" id="editIndex">
      <input type="text" id="taskInput" placeholder="工作描述">
      <input type="text" id="urlInput" placeholder="URL 連結（可選）">
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal()">取消</button>
        <button class="save-btn" onclick="saveTask()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const RMS = ['cat', 'gary', 'fifi', 'jerry', 'moses', 'alvis', 'knald'];
    const RM_NAMES = {
      cat: 'Cat',
      gary: 'Gary',
      fififi: 'Fi Fi',
      jerry: 'Jerry',
      moses: 'Moses',
      alvis: 'Alvis',
      knald: 'Knald'
    };

    let currentWeekOffset = 0;
    let data = {};

    // Load data from localStorage
    function loadData() {
      const saved = localStorage.getItem('todo_dashboard_v2');
      if (saved) {
        data = JSON.parse(saved);
      } else {
        data = { tasks: {} };
      }
    }

    // Save data to localStorage
    function saveData() {
      localStorage.setItem('todo_dashboard_v2', JSON.stringify(data));
    }

    // Get ISO week key for a date
    function getWeekKey(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
      const week1 = new Date(d.getFullYear(), 0, 4);
      const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
      return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
    }

    // Get week date range string
    function getWeekRange(weekKey) {
      const [year, week] = weekKey.split('-W').map(Number);
      const simple = new Date(year, 0, 1 + (week - 1) * 7);
      const dow = simple.getDay();
      const isoWeekStart = simple;
      if (dow <= 4) isoWeekStart.setDate(simple.getDate() - simple.getDay() + 1);
      else isoWeekStart.setDate(simple.getDate() + 8 - simple.getDay());
      const isoWeekEnd = new Date(isoWeekStart);
      isoWeekEnd.setDate(isoWeekStart.getDate() + 6);
      const formatDate = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
      return `${formatDate(isoWeekStart)} - ${formatDate(isoWeekEnd)}`;
    }

    // Get the 3 weeks to display
    function getDisplayWeeks() {
      const today = new Date();
      const currentWeekKey = getWeekKey(today);
      const [year, week] = currentWeekKey.split('-W').map(Number);
      
      const weeks = [];
      for (let i = -1; i <= 1; i++) {
        let w = week + i;
        let y = year;
        if (w < 1) {
          y--;
          w = 52 + w;
        } else if (w > 52) {
          y++;
          w = w - 52;
        }
        const key = `${y}-W${String(w).padStart(2, '0')}`;
        weeks.push(key);
      }
      return weeks;
    }

    // Initialize week data
    function initWeekData(weekKey) {
      if (!data.tasks[weekKey]) {
        data.tasks[weekKey] = {};
        RMS.forEach(rm => data.tasks[weekKey][rm] = []);
      }
    }

    // Navigate weeks
    function navigateWeek(direction) {
      currentWeekOffset += direction;
      renderGrid();
    }

    // Render the grid
    function renderGrid() {
      const displayWeeks = getDisplayWeeks();
      const grid = document.getElementById('mainGrid');
      
      // Calculate actual weeks based on offset
      const weeks = displayWeeks.map((wk, i) => {
        const offset = currentWeekOffset * 3;
        const [year, week] = wk.split('-W').map(Number);
        let w = week + offset;
        let y = year;
        if (w < 1) {
          y--;
          w = 52 + w;
        } else if (w > 52) {
          y++;
          w = w - 52;
        }
        return `${y}-W${String(w).padStart(2, '0')}`;
      });

      // Update label
      const centralWeek = weeks[1];
      const centralDate = new Date();
      document.getElementById('currentWeekLabel').textContent = 
        `${getWeekRange(weeks[0]).split(' - ')[0]} / ${getWeekRange(centralWeek)} / ${getWeekRange(weeks[2]).split(' - ')[1]}`;

      // Build header row
      let html = '<div class="header-cell">工作週</div>';
      RMS.forEach(rm => {
        html += `<div class="header-cell rm-header">${RM_NAMES[rm]}</div>`;
      });

      // Build week rows
      weeks.forEach(weekKey => {
        initWeekData(weekKey);
        const weekRange = getWeekRange(weekKey);
        html += `<div class="week-row">`;
        html += `<div class="week-label">${weekRange}</div>`;
        
        RMS.forEach(rm => {
          const tasks = data.tasks[weekKey][rm] || [];
          let tasksHtml = tasks.map((task, idx) => `
            <div class="task-item ${task.done ? 'done' : ''}" data-task-id="${task.id}">
              <span class="checkbox" onclick="toggleTask('${weekKey}', '${rm}', ${idx})">
                ${task.done ? '✅' : '☐'}
              </span>
              <span class="task-text">
                ${escapeHtml(task.text)}
                ${task.url ? `<br><a href="${escapeHtml(task.url)}" target="_blank">🔗 連結</a>` : ''}
              </span>
              <div class="task-actions">
                <button onclick="editTask('${weekKey}', '${rm}', ${idx})">✏️ 編輯</button>
                <button onclick="deleteTask('${weekKey}', '${rm}', ${idx})">🗑️ 刪除</button>
              </div>
            </div>
          `).join('');
          
          tasksHtml += `<button class="add-task-btn" onclick="openAddModal('${weekKey}', '${rm}')">+ 加入工作</button>`;
          
          html += `<div class="task-cell">${tasksHtml}</div>`;
        });
        
        html += `</div>`;
      });

      grid.innerHTML = html;
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Open add modal
    function openAddModal(weekKey, rm) {
      document.getElementById('modalTitle').textContent = '加入工作';
      document.getElementById('editTaskId').value = '';
      document.getElementById('editRm').value = rm;
      document.getElementById('editWeek').value = weekKey;
      document.getElementById('editIndex').value = '';
      document.getElementById('taskInput').value = '';
      document.getElementById('urlInput').value = '';
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Open edit modal
    function editTask(weekKey, rm, idx) {
      const task = data.tasks[weekKey][rm][idx];
      document.getElementById('modalTitle').textContent = '編輯工作';
      document.getElementById('editTaskId').value = task.id;
      document.getElementById('editRm').value = rm;
      document.getElementById('editWeek').value = weekKey;
      document.getElementById('editIndex').value = idx;
      document.getElementById('taskInput').value = task.text;
      document.getElementById('urlInput').value = task.url || '';
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Save task
    function saveTask() {
      const id = document.getElementById('editTaskId').value;
      const rm = document.getElementById('editRm').value;
      const week = document.getElementById('editWeek').value;
      const idx = document.getElementById('editIndex').value;
      const text = document.getElementById('taskInput').value.trim();
      const url = document.getElementById('urlInput').value.trim();

      if (!text) {
        alert('請輸入工作描述');
        return;
      }

      initWeekData(week);

      if (id) {
        // Edit existing
        const taskIdx = data.tasks[week][rm].findIndex(t => t.id === id);
        if (taskIdx !== -1) {
          data.tasks[week][rm][taskIdx].text = text;
          data.tasks[week][rm][taskIdx].url = url;
        }
      } else {
        // Add new
        data.tasks[week][rm].push({
          id: Date.now().toString(),
          text: text,
          url: url,
          done: false
        });
      }

      saveData();
      closeModal();
      renderGrid();
    }

    // Delete task
    function deleteTask(weekKey, rm, idx) {
      if (confirm('確定刪除呢项工作？')) {
        data.tasks[weekKey][rm].splice(idx, 1);
        saveData();
        renderGrid();
      }
    }

    // Toggle task done
    function toggleTask(weekKey, rm, idx) {
      data.tasks[weekKey][rm][idx].done = !data.tasks[weekKey][rm][idx].done;
      saveData();
      renderGrid();
    }

    // Close modal
    function closeModal() {
      document.getElementById('taskModal').classList.remove('active');
    }

    // Close modal on outside click
    document.getElementById('taskModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) {
        closeModal();
      }
    });

    // Initialize
    loadData();
    renderGrid();
  </script>
</body>
</html>
