<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona Team To-Do Dashboard v2</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    /* Week Navigation */
    .week-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
    }

    .week-nav button {
      background: #16213e;
      color: #fff;
      border: 1px solid #0f3460;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }

    .week-nav button:hover {
      background: #0f3460;
    }

    .week-nav .current-week {
      color: #e94560;
      font-weight: bold;
      min-width: 300px;
      text-align: center;
    }

    /* Main Grid */
    .main-grid {
      display: grid;
      grid-template-columns: 100px repeat(6, 1fr);
      gap: 1px;
      background: #333;
      border-radius: 8px;
      overflow: hidden;
    }

    .header-cell {
      background: #16213e;
      padding: 12px 8px;
      text-align: center;
      font-weight: bold;
      color: #fff;
      font-size: 0.9rem;
    }

    .header-cell.rm-header {
      background: #0f3460;
      color: #e94560;
    }

    .week-row {
      display: contents;
    }

    .week-label {
      background: #16213e;
      padding: 15px 8px;
      text-align: center;
      font-weight: bold;
      color: #e94560;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      writing-mode: horizontal-tb;
    }

    .task-cell {
      background: #1f1f3a;
      padding: 8px;
      min-height: 150px;
      vertical-align: top;
    }

    /* Date Badge */
    .date-badge {
      font-size: 0.7rem;
      color: #666;
      margin-bottom: 4px;
    }

    /* Task Items */
    .task-item {
      background: #252540;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 6px;
      border-left: 3px solid #0f3460;
      position: relative;
    }

    .task-item.done {
      border-left-color: #4ecca3;
      opacity: 0.7;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #888;
    }

    .task-text {
      font-size: 0.85rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .task-text a {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 0.8rem;
    }

    .task-text a:hover {
      text-decoration: underline;
    }

    .task-actions {
      display: flex;
      gap: 4px;
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    .task-actions button {
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .task-actions button:hover {
      background: #333;
      color: #fff;
    }

    .checkbox {
      cursor: pointer;
      margin-right: 4px;
      font-size: 0.9rem;
    }

    /* Add Task Button */
    .add-task-btn {
      background: transparent;
      border: 1px dashed #444;
      color: #666;
      width: 100%;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 4px;
    }

    .add-task-btn:hover {
      border-color: #0f3460;
      color: #4fc3f7;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1f1f3a;
      border-radius: 10px;
      padding: 24px;
      width: 450px;
      max-width: 90vw;
    }

    .modal h3 {
      color: #fff;
      margin-bottom: 16px;
    }

    .modal input[type="text"],
    .modal input[type="date"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      box-sizing: border-box;
    }

    .modal label {
      display: block;
      margin-bottom: 6px;
      color: #aaa;
      font-size: 0.85rem;
    }

    .schedule-options {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .schedule-option {
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      color: #aaa;
      transition: all 0.2s;
    }

    .schedule-option:hover {
      border-color: #0f3460;
    }

    .schedule-option.selected {
      background: #0f3460;
      border-color: #e94560;
      color: #fff;
    }

    .date-picker-wrapper {
      display: none;
      margin-bottom: 10px;
    }

    .date-picker-wrapper.visible {
      display: block;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .modal-buttons button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .modal-buttons .cancel-btn {
      background: #333;
      color: #fff;
    }

    .modal-buttons .save-btn {
      background: #e94560;
      color: #fff;
    }

    .modal-buttons button:hover {
      opacity: 0.9;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
      flex-wrap: wrap;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .dot.parco { background: #e94560; }
    .dot.fifi { background: #f39c12; }
    .dot.cat { background: #3498db; }
    .dot.jerry { background: #9b59b6; }
    .dot.moses { background: #1abc9c; }
    .dot.candy { background: #e74c3c; }

    /* Schedule type badges */
    .schedule-badge {
      font-size: 0.65rem;
      padding: 2px 5px;
      border-radius: 3px;
      margin-right: 4px;
      display: inline-block;
    }
    .badge-daily { background: #3498db; color: #fff; }
    .badge-weekly { background: #9b59b6; color: #fff; }
    .badge-yearly { background: #f39c12; color: #fff; }
    .badge-specific { background: #1abc9c; color: #fff; }
  </style>
</head>
<body>
  <h1>📋 Fiona Team To-Do Dashboard v2</h1>
  <p class="subtitle">橫向：RM 排列 | 縱向：每週工作 | 可自訂重複週期</p>

  <div class="week-nav">
    <button onclick="navigateWeek(-1)">◀ 上一組</button>
    <span class="current-week" id="currentWeekLabel">-</span>
    <button onclick="navigateWeek(1)">下一組 ▶</button>
  </div>

  <div class="main-grid" id="mainGrid">
    <!-- Grid will be rendered here -->
  </div>

  <div class="legend">
    <span><span class="dot parco"></span>Parco</span>
    <span><span class="dot fifi"></span>Fi Fi</span>
    <span><span class="dot cat"></span>Cat</span>
    <span><span class="dot jerry"></span>Jerry</span>
    <span><span class="dot moses"></span>Moses</span>
    <span><span class="dot candy"></span>Candy</span>
  </div>

  <!-- Add/Edit Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <h3 id="modalTitle">加入工作</h3>
      <input type="hidden" id="editTaskId">
      <input type="hidden" id="editRm">
      <input type="hidden" id="editWeek">
      <input type="hidden" id="editDayDate">
      <input type="hidden" id="editIndex">
      
      <label>工作描述</label>
      <input type="text" id="taskInput" placeholder="輸入工作內容...">
      
      <label>URL 連結（可選）</label>
      <input type="text" id="urlInput" placeholder="https://...">
      
      <label>重複週期</label>
      <div class="schedule-options">
        <div class="schedule-option selected" data-value="weekly" onclick="selectSchedule(this)">每週一次</div>
        <div class="schedule-option" data-value="daily" onclick="selectSchedule(this)">每日（除週六日）</div>
        <div class="schedule-option" data-value="yearly" onclick="selectSchedule(this)">每年</div>
        <div class="schedule-option" data-value="specific" onclick="selectSchedule(this)">指定日期</div>
      </div>
      
      <div class="date-picker-wrapper" id="datePickerWrapper">
        <label>指定日期</label>
        <input type="date" id="specificDateInput">
      </div>
      
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal()">取消</button>
        <button class="save-btn" onclick="saveTask()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const RMS = ['parco', 'fifi', 'cat', 'jerry', 'moses', 'candy'];
    const RM_NAMES = {
      parco: 'Parco',
      fififi: 'Fi Fi',
      cat: 'Cat',
      jerry: 'Jerry',
      moses: 'Moses',
      candy: 'Candy'
    };

    let currentWeekOffset = 0;
    let data = {};
    let selectedSchedule = 'weekly';

    // Load data from localStorage
    function loadData() {
      const saved = localStorage.getItem('todo_dashboard_v2');
      if (saved) {
        data = JSON.parse(saved);
      } else {
        data = { tasks: {} };
      }
    }

    // Save data to localStorage
    function saveData() {
      localStorage.setItem('todo_dashboard_v2', JSON.stringify(data));
    }

    // Select schedule option
    function selectSchedule(el) {
      document.querySelectorAll('.schedule-option').forEach(opt => opt.classList.remove('selected'));
      el.classList.add('selected');
      selectedSchedule = el.dataset.value;
      
      const datePicker = document.getElementById('datePickerWrapper');
      if (selectedSchedule === 'specific') {
        datePicker.classList.add('visible');
      } else {
        datePicker.classList.remove('visible');
      }
    }

    // Get ISO week key for a date
    function getWeekKey(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      d.setDate(d.getDate() + 3 - (d.getDay() + 6) % 7);
      const week1 = new Date(d.getFullYear(), 0, 4);
      const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + (week1.getDay() + 6) % 7) / 7);
      return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
    }

    // Get week date range string
    function getWeekRange(weekKey) {
      const [year, week] = weekKey.split('-W').map(Number);
      const simple = new Date(year, 0, 1 + (week - 1) * 7);
      const dow = simple.getDay();
      const isoWeekStart = simple;
      if (dow <= 4) isoWeekStart.setDate(simple.getDate() - simple.getDay() + 1);
      else isoWeekStart.setDate(simple.getDate() + 8 - simple.getDay());
      const isoWeekEnd = new Date(isoWeekStart);
      isoWeekEnd.setDate(isoWeekStart.getDate() + 6);
      const formatDate = (d) => `${d.getMonth() + 1}/${d.getDate()}`;
      return `${formatDate(isoWeekStart)} - ${formatDate(isoWeekEnd)}`;
    }

    // Get all dates in a week (Mon-Fri for daily tasks)
    function getWeekDates(weekKey) {
      const [year, week] = weekKey.split('-W').map(Number);
      const simple = new Date(year, 0, 1 + (week - 1) * 7);
      const dow = simple.getDay();
      let monday;
      if (dow <= 4) monday = new Date(simple.getDate() - simple.getDay() + 1);
      else monday = new Date(simple.getDate() + 8 - simple.getDay());
      
      const dates = [];
      for (let i = 0; i < 7; i++) {
        const d = new Date(monday);
        d.setDate(monday.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    // Check if task should show on this date
    function shouldShowTask(task, date) {
      const d = new Date(date);
      const dayOfWeek = d.getDay();
      
      if (task.schedule === 'daily') {
        // Show Mon-Fri only
        return dayOfWeek >= 1 && dayOfWeek <= 5;
      } else if (task.schedule === 'weekly') {
        // Show once per week (Monday)
        return dayOfWeek === 1;
      } else if (task.schedule === 'yearly') {
        // Show on same month/day as original
        const taskDate = new Date(task.createdDate);
        return d.getMonth() === taskDate.getMonth() && d.getDate() === taskDate.getDate();
      } else if (task.schedule === 'specific') {
        // Show only on specific date
        if (!task.specificDate) return false;
        const taskDate = new Date(task.specificDate);
        const checkDate = new Date(d);
        return checkDate.toDateString() === taskDate.toDateString();
      }
      return true;
    }

    // Get schedule badge HTML
    function getScheduleBadge(schedule) {
      const badges = {
        daily: '<span class="schedule-badge badge-daily">每日</span>',
        weekly: '<span class="schedule-badge badge-weekly">每週</span>',
        yearly: '<span class="schedule-badge badge-yearly">每年</span>',
        specific: '<span class="schedule-badge badge-specific">指定</span>'
      };
      return badges[schedule] || '';
    }

    // Initialize week data
    function initWeekData(weekKey) {
      if (!data.tasks[weekKey]) {
        data.tasks[weekKey] = {};
        RMS.forEach(rm => data.tasks[weekKey][rm] = {});
      }
    }

    // Navigate weeks
    function navigateWeek(direction) {
      currentWeekOffset += direction;
      renderGrid();
    }

    // Render the grid
    function renderGrid() {
      const grid = document.getElementById('mainGrid');
      
      // Calculate weeks
      const today = new Date();
      const currentWeekKey = getWeekKey(today);
      const [year, week] = currentWeekKey.split('-W').map(Number);
      
      const weeks = [];
      for (let i = -1; i <= 1; i++) {
        let w = week + (currentWeekOffset * 3) + i;
        let y = year;
        if (w < 1) {
          y--;
          w = 52 + w;
        } else if (w > 52) {
          y++;
          w = w - 52;
        }
        const key = `${y}-W${String(w).padStart(2, '0')}`;
        weeks.push(key);
      }

      // Update label
      document.getElementById('currentWeekLabel').textContent = 
        `${getWeekRange(weeks[0]).split(' - ')[0]} / ${getWeekRange(weeks[1])} / ${getWeekRange(weeks[2]).split(' - ')[1]}`;

      // Build header row
      let html = '<div class="header-cell">工作週</div>';
      RMS.forEach(rm => {
        html += `<div class="header-cell rm-header">${RM_NAMES[rm]}</div>`;
      });

      // Build week rows
      weeks.forEach(weekKey => {
        initWeekData(weekKey);
        const weekRange = getWeekRange(weekKey);
        const weekDates = getWeekDates(weekKey);
        
        // Group tasks by date within each RM cell
        RMS.forEach(rm => {
          const tasks = data.tasks[weekKey][rm] || {};
          
          // Collect all tasks that should show on each day
          weekDates.forEach((date, dayIdx) => {
            if (!tasks[dayIdx]) tasks[dayIdx] = [];
            
            // For each task in this RM's week data
            Object.values(tasks).forEach(dayTasks => {
              if (Array.isArray(dayTasks)) {
                dayTasks.forEach(task => {
                  if (shouldShowTask(task, date)) {
                    // Check if already shown today
                    const dateStr = date.toISOString().split('T')[0];
                    if (!task._shownDates) task._shownDates = [];
                    if (!task._shownDates.includes(dateStr)) {
                      task._shownDates.push(dateStr);
                    }
                  }
                });
              }
            });
          });
        });

        // Now render the grid
        html += `<div class="week-row">`;
        html += `<div class="week-label">${weekRange}</div>`;
        
        RMS.forEach(rm => {
          let cellHtml = '';
          const weekTasks = data.tasks[weekKey][rm] || {};
          
          // Get all unique tasks for this RM this week
          const allTasksThisWeek = [];
          const seenIds = new Set();
          
          weekDates.forEach((date, dayIdx) => {
            const dayTasks = weekTasks[dayIdx] || [];
            dayTasks.forEach(task => {
              if (!seenIds.has(task.id)) {
                seenIds.add(task.id);
                allTasksThisWeek.push({ task, date, dayIdx });
              }
            });
          });

          // Render each task once
          allTasksThisWeek.forEach(({ task, date, dayIdx }) => {
            const dateStr = `${date.getMonth() + 1}/${date.getDate()}`;
            cellHtml += `
              <div class="task-item ${task.done ? 'done' : ''}" data-task-id="${task.id}">
                <span class="checkbox" onclick="toggleTask('${weekKey}', '${rm}', ${dayIdx}, '${task.id}')">
                  ${task.done ? '✅' : '☐'}
                </span>
                <span class="task-text">
                  ${getScheduleBadge(task.schedule)}
                  ${escapeHtml(task.text)}
                  ${task.url ? `<br><a href="${escapeHtml(task.url)}" target="_blank">🔗 連結</a>` : ''}
                </span>
                <div class="task-actions">
                  <button onclick="editTask('${weekKey}', '${rm}', ${dayIdx}, '${task.id}')">✏️</button>
                  <button onclick="deleteTask('${weekKey}', '${rm}', ${dayIdx}, '${task.id}')">🗑️</button>
                </div>
              </div>
            `;
          });
          
          cellHtml += `<button class="add-task-btn" onclick="openAddModal('${weekKey}', '${rm}')">+ 加入工作</button>`;
          
          html += `<div class="task-cell">${cellHtml}</div>`;
        });
        
        html += `</div>`;
      });

      grid.innerHTML = html;
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Open add modal
    function openAddModal(weekKey, rm, dayIdx = 0) {
      document.getElementById('modalTitle').textContent = '加入工作';
      document.getElementById('editTaskId').value = '';
      document.getElementById('editRm').value = rm;
      document.getElementById('editWeek').value = weekKey;
      document.getElementById('editDayDate').value = dayIdx;
      document.getElementById('editIndex').value = '';
      document.getElementById('taskInput').value = '';
      document.getElementById('urlInput').value = '';
      document.getElementById('specificDateInput').value = '';
      
      // Reset schedule selection
      selectedSchedule = 'weekly';
      document.querySelectorAll('.schedule-option').forEach(opt => opt.classList.remove('selected'));
      document.querySelector('.schedule-option[data-value="weekly"]').classList.add('selected');
      document.getElementById('datePickerWrapper').classList.remove('visible');
      
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Open edit modal
    function editTask(weekKey, rm, dayIdx, taskId) {
      const tasks = data.tasks[weekKey][rm][dayIdx] || [];
      const task = tasks.find(t => t.id === taskId);
      if (!task) return;
      
      document.getElementById('modalTitle').textContent = '編輯工作';
      document.getElementById('editTaskId').value = task.id;
      document.getElementById('editRm').value = rm;
      document.getElementById('editWeek').value = weekKey;
      document.getElementById('editDayDate').value = dayIdx;
      document.getElementById('editIndex').value = tasks.indexOf(task);
      document.getElementById('taskInput').value = task.text;
      document.getElementById('urlInput').value = task.url || '';
      
      // Set schedule
      selectedSchedule = task.schedule || 'weekly';
      document.querySelectorAll('.schedule-option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === selectedSchedule);
      });
      
      const datePicker = document.getElementById('datePickerWrapper');
      if (selectedSchedule === 'specific') {
        datePicker.classList.add('visible');
        document.getElementById('specificDateInput').value = task.specificDate || '';
      } else {
        datePicker.classList.remove('visible');
      }
      
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Save task
    function saveTask() {
      const id = document.getElementById('editTaskId').value;
      const rm = document.getElementById('editRm').value;
      const week = document.getElementById('editWeek').value;
      const dayIdx = parseInt(document.getElementById('editDayDate').value) || 0;
      const text = document.getElementById('taskInput').value.trim();
      const url = document.getElementById('urlInput').value.trim();
      const schedule = selectedSchedule;
      const specificDate = document.getElementById('specificDateInput').value;

      if (!text) {
        alert('請輸入工作描述');
        return;
      }

      initWeekData(week);

      if (id) {
        // Edit existing - find and update
        for (let di = 0; di < 7; di++) {
          const dayTasks = data.tasks[week][rm][di] || [];
          const idx = dayTasks.findIndex(t => t.id === id);
          if (idx !== -1) {
            dayTasks[idx].text = text;
            dayTasks[idx].url = url;
            dayTasks[idx].schedule = schedule;
            dayTasks[idx].specificDate = schedule === 'specific' ? specificDate : '';
            break;
          }
        }
      } else {
        // Add new task
        const newTask = {
          id: Date.now().toString(),
          text: text,
          url: url,
          done: false,
          schedule: schedule,
          specificDate: schedule === 'specific' ? specificDate : '',
          createdDate: new Date().toISOString()
        };
        
        // Add to all applicable days based on schedule
        if (schedule === 'daily') {
          // Add to Mon-Fri of this week
          for (let di = 0; di < 5; di++) {
            if (!data.tasks[week][rm][di]) data.tasks[week][rm][di] = [];
            data.tasks[week][rm][di].push({...newTask, id: newTask.id + '_' + di});
          }
        } else {
          // Add to selected day only
          if (!data.tasks[week][rm][dayIdx]) data.tasks[week][rm][dayIdx] = [];
          data.tasks[week][rm][dayIdx].push(newTask);
        }
      }

      saveData();
      closeModal();
      renderGrid();
    }

    // Delete task
    function deleteTask(weekKey, rm, dayIdx, taskId) {
      if (!confirm('確定刪除呢项工作？')) return;
      
      // Remove from all days
      for (let di = 0; di < 7; di++) {
        const dayTasks = data.tasks[weekKey][rm][di] || [];
        const filtered = dayTasks.filter(t => t.id !== taskId);
        data.tasks[weekKey][rm][di] = filtered;
      }
      
      saveData();
      renderGrid();
    }

    // Toggle task done
    function toggleTask(weekKey, rm, dayIdx, taskId) {
      // Find the task across all days
      for (let di = 0; di < 7; di++) {
        const dayTasks = data.tasks[weekKey][rm][di] || [];
        const task = dayTasks.find(t => t.id === taskId);
        if (task) {
          task.done = !task.done;
          break;
        }
      }
      
      saveData();
      renderGrid();
    }

    // Close modal
    function closeModal() {
      document.getElementById('taskModal').classList.remove('active');
    }

    // Close modal on outside click
    document.getElementById('taskModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) {
        closeModal();
      }
    });

    // Initialize
    loadData();
    renderGrid();
  </script>
</body>
</html>
