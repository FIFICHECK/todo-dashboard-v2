<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona Team To-Do Dashboard v2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
    h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 1.8rem; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 20px; font-size: 0.9rem; }
    .date-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-nav { display: flex; align-items: center; gap: 10px; }
    .date-nav button { background: #16213e; color: #fff; border: 1px solid #0f3460; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    .date-nav button:hover { background: #0f3460; }
    .date-nav .current-date { color: #e94560; font-weight: bold; min-width: 200px; text-align: center; font-size: 1.1rem; }
    .week-chips { display: flex; gap: 5px; background: #16213e; border-radius: 6px; padding: 4px; }
    .week-chip { padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: all 0.2s; color: #aaa; }
    .week-chip:hover { background: #0f3460; color: #fff; }
    .week-chip.active { background: #e94560; color: #fff; }

    .main-grid { display: grid; gap: 1px; background: #333; border-radius: 8px; overflow: hidden; max-width: 100%; overflow-x: auto; }
    
    .header-cell { background: #16213e; padding: 10px 8px; text-align: center; font-weight: bold; color: #fff; font-size: 0.85rem; min-width: 120px; }
    .header-cell.date-header { background: #0f3460; color: #e94560; }
    .header-cell .day-name { font-size: 0.7rem; color: #888; margin-top: 2px; }
    .header-cell.weekend { background: #1a1a2e; color: #666; }
    
    .add-col { background: #16213e; padding: 8px; min-width: 60px; text-align: center; }
    
    .date-cell { background: #1f1f3a; padding: 4px; min-width: 120px; vertical-align: top; }
    .date-cell.weekend { background: #181828; }
    
    .rm-name-cell { 
      background: #252540; 
      border-radius: 6px; 
      padding: 6px 8px; 
      margin-bottom: 4px; 
      border-left: 3px solid #555;
      cursor: pointer;
    }
    .rm-name-cell:hover { border-left-color: #e94560; }
    .rm-name-cell.has-name { border-left-color: #e94560; }
    
    .rm-name-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .rm-name { font-weight: bold; font-size: 0.8rem; color: #e94560; flex: 1; }
    .rm-name.empty { color: #555; font-style: italic; }
    
    .slot-checkbox { cursor: pointer; font-size: 0.9rem; padding: 2px; }
    .slot-checkbox:hover { transform: scale(1.2); }
    
    .task-list { font-size: 0.75rem; color: #ccc; margin: 2px 0 2px 0; padding-left: 20px; }
    .task-item-row { display: flex; align-items: flex-start; gap: 4px; margin: 2px 0; }
    .task-item-row.done { text-decoration: line-through; color: #666; }
    .task-check { cursor: pointer; font-size: 0.8rem; }
    .task-check:hover { transform: scale(1.2); }
    .task-text { flex: 1; word-break: break-word; font-size: 0.75rem; }
    .task-text a { color: #4fc3f7; text-decoration: none; font-size: 0.7rem; }
    .task-delete { cursor: pointer; color: #666; font-size: 0.7rem; }
    .task-delete:hover { color: #e94560; }
    
    .add-task-btn { 
      background: transparent; 
      border: 1px dashed #444; 
      color: #666; 
      width: 100%; 
      padding: 4px; 
      border-radius: 4px; 
      cursor: pointer; 
      font-size: 0.7rem; 
      margin-top: 4px;
    }
    .add-task-btn:hover { border-color: #e94560; color: #e94560; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-overlay.active { display: flex; }
    .modal { background: #1f1f3a; border-radius: 10px; padding: 24px; width: 400px; max-width: 90vw; }
    .modal h3 { color: #fff; margin-bottom: 16px; }
    .modal input[type="text"] { width: 100%; padding: 10px; margin-bottom: 10px; background: #252540; border: 1px solid #333; border-radius: 6px; color: #fff; font-family: inherit; box-sizing: border-box; }
    .modal label { display: block; margin-bottom: 6px; color: #aaa; font-size: 0.85rem; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .modal-buttons button { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 0.9rem; }
    .modal-buttons .cancel-btn { background: #333; color: #fff; }
    .modal-buttons .save-btn { background: #e94560; color: #fff; }
  </style>
</head>
<body>
  <h1>📋 Fiona Team To-Do Dashboard v2</h1>
  <p class="subtitle">左方：[+] 加入工作 | 每格可點擊填入 RM 名稱 | ✅ 完成 | ✕ 清除</p>

  <div class="date-controls">
    <div class="date-nav">
      <button onclick="navigateWeek(-1)">◀ 上一週</button>
      <span class="current-date" id="currentDateLabel">-</span>
      <button onclick="navigateWeek(1)">下一週 ▶</button>
    </div>
    <div class="week-chips" id="weekChips"></div>
  </div>

  <div class="main-grid" id="mainGrid"></div>

  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <h3 id="taskModalTitle">加入工作</h3>
      <input type="hidden" id="editDateIdx">
      <input type="hidden" id="editRmRow">
      <input type="hidden" id="editTaskIdx">
      <label>工作描述</label>
      <input type="text" id="taskInput" placeholder="輸入工作內容...">
      <label>URL 連結（可選）</label>
      <input type="text" id="urlInput" placeholder="https://...">
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeTaskModal()">取消</button>
        <button class="save-btn" onclick="saveTask()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    var MAX_ROWS = 7;
    var RM_COLORS = ['#e94560', '#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#e74c3c', '#2ecc71'];
    var DAY_NAMES = ['日', '一', '二', '三', '四', '五', '六'];
    var currentWeekStart = getMonday(new Date());
    var data = {};
    var RMS = ['', '', '', '', '', '', ''];

    function getMonday(d) {
      var date = new Date(d);
      var day = date.getDay();
      var diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function loadData() {
      var saved = localStorage.getItem('todo_dashboard_v6');
      if (saved) {
        var parsed = JSON.parse(saved);
        data = parsed.data || {};
        RMS = parsed.rms || ['', '', '', '', '', '', ''];
      } else {
        data = { tasks: {} };
        RMS = ['', '', '', '', '', '', ''];
      }
    }

    function saveData() {
      localStorage.setItem('todo_dashboard_v6', JSON.stringify({ data: data, rms: RMS }));
    }

    function navigateWeek(direction) {
      currentWeekStart.setDate(currentWeekStart.getDate() + (direction * 7));
      renderGrid();
    }

    function jumpToWeek(dateStr) {
      currentWeekStart = getMonday(new Date(dateStr));
      renderGrid();
    }

    function getWeekDates() {
      var dates = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(currentWeekStart.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    function getDateKey(date) {
      return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    }

    function formatDateLabel() {
      var weekEnd = new Date(currentWeekStart);
      weekEnd.setDate(currentWeekStart.getDate() + 6);
      return (currentWeekStart.getMonth() + 1) + '/' + currentWeekStart.getDate() + ' - ' + (weekEnd.getMonth() + 1) + '/' + weekEnd.getDate();
    }

    function initDateData(dateKey) {
      if (!data.tasks[dateKey]) {
        data.tasks[dateKey] = [];
        for (var i = 0; i < MAX_ROWS; i++) {
          data.tasks[dateKey].push({ name: RMS[i], done: false, tasks: [] });
        }
      }
    }

    function renderWeekChips() {
      var container = document.getElementById('weekChips');
      var today = new Date();
      var todayMonday = getMonday(today);
      var html = '';
      for (var w = -4; w <= 4; w++) {
        var monday = new Date(todayMonday);
        monday.setDate(todayMonday.getDate() + (w * 7));
        var isActive = monday.getTime() === currentWeekStart.getTime();
        html += '<div class="week-chip ' + (isActive ? 'active' : '') + '" onclick="jumpToWeek(\'' + monday.toISOString() + '\')">' + (monday.getMonth() + 1) + '/' + monday.getDate() + '</div>';
      }
      container.innerHTML = html;
    }

    function renderGrid() {
      var grid = document.getElementById('mainGrid');
      var dates = getWeekDates();
      document.getElementById('currentDateLabel').textContent = formatDateLabel();
      renderWeekChips();

      // Header row
      var html = '<div class="header-cell" style="background:#16213e;">+ 工作</div>';
      dates.forEach(function(date) {
        var isWeekend = date.getDay() === 0 || date.getDay() === 6;
        var dayName = DAY_NAMES[date.getDay()];
        html += '<div class="header-cell date-header ' + (isWeekend ? 'weekend' : '') + '">' + 
          (date.getMonth() + 1) + '/' + date.getDate() + 
          '<div class="day-name">星期' + dayName + '</div></div>';
      });

      // For each row (RM slot)
      for (var rowIdx = 0; rowIdx < MAX_ROWS; rowIdx++) {
        var rowColor = RM_COLORS[rowIdx];
        
        // Left column: Add task button for this row
        html += '<div class="add-col">';
        html += '<button class="add-task-btn" style="margin-bottom:4px;" onclick="openAddTaskModal(0,' + rowIdx + ')">+</button>';
        html += '</div>';
        
        // For each date
        dates.forEach(function(date, dateIdx) {
          var dateKey = getDateKey(date);
          var isWeekend = date.getDay() === 0 || date.getDay() === 6;
          initDateData(dateKey);
          
          var slotData = data.tasks[dateKey][rowIdx];
          var isDone = slotData ? slotData.done : false;
          var tasks = slotData ? slotData.tasks : [];
          var rmName = RMS[rowIdx];
          var hasName = rmName ? true : false;
          
          html += '<div class="date-cell ' + (isWeekend ? 'weekend' : '') + '">';
          html += '<div class="rm-name-cell ' + (hasName ? 'has-name' : '') + '" style="border-left-color:' + (hasName ? rowColor : '#555') + '" onclick="setRmName(' + rowIdx + ')">';
          
          // RM name header
          html += '<div class="rm-name-header">';
          html += '<span class="rm-name ' + (hasName ? '' : 'empty') + '">' + (hasName ? escapeHtml(rmName) : '點此填入') + '</span>';
          html += '<span class="slot-checkbox" onclick="event.stopPropagation();toggleSlotDone(' + dateIdx + ',' + rowIdx + ')">' + (isDone ? '✅' : '☐') + '</span>';
          html += '</div>';
          
          // Tasks
          if (tasks.length > 0) {
            html += '<div class="task-list">';
            tasks.forEach(function(task, taskIdx) {
              html += '<div class="task-item-row ' + (task.done ? 'done' : '') + '">';
              html += '<span class="task-check" onclick="event.stopPropagation();toggleTaskDone(' + dateIdx + ',' + rowIdx + ',' + taskIdx + ')">' + (task.done ? '✅' : '☐') + '</span>';
              html += '<span class="task-text">' + escapeHtml(task.text) + (task.url ? ' <a href="' + escapeHtml(task.url) + '" target="_blank" onclick="event.stopPropagation();">🔗</a>' : '') + '</span>';
              html += '<span class="task-delete" onclick="event.stopPropagation();deleteTask(' + dateIdx + ',' + rowIdx + ',' + taskIdx + ')">✕</span>';
              html += '</div>';
            });
            html += '</div>';
          }
          
          // Add task button
          html += '<button class="add-task-btn" onclick="event.stopPropagation();openAddTaskModal(' + dateIdx + ',' + rowIdx + ')">+ 加入工作</button>';
          html += '</div></div>';
        });
      }
      
      grid.innerHTML = html;
    }

    function escapeHtml(text) {
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openAddTaskModal(dateIdx, rowIdx) {
      document.getElementById('taskModalTitle').textContent = '加入工作';
      document.getElementById('editDateIdx').value = dateIdx;
      document.getElementById('editRmRow').value = rowIdx;
      document.getElementById('editTaskIdx').value = '';
      document.getElementById('taskInput').value = '';
      document.getElementById('urlInput').value = '';
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    function saveTask() {
      var dateIdx = parseInt(document.getElementById('editDateIdx').value);
      var rowIdx = parseInt(document.getElementById('editRmRow').value);
      var taskIdx = document.getElementById('editTaskIdx').value;
      var text = document.getElementById('taskInput').value.trim();
      var url = document.getElementById('urlInput').value.trim();
      if (!text) { alert('請輸入工作描述'); return; }
      
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      initDateData(dateKey);
      
      if (taskIdx !== '') {
        data.tasks[dateKey][rowIdx].tasks[taskIdx].text = text;
        data.tasks[dateKey][rowIdx].tasks[taskIdx].url = url;
      } else {
        data.tasks[dateKey][rowIdx].tasks.push({ text: text, url: url, done: false });
      }
      
      saveData();
      closeTaskModal();
      renderGrid();
    }

    function deleteTask(dateIdx, rowIdx, taskIdx) {
      if (!confirm('確定刪除呢项工作？')) return;
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      data.tasks[dateKey][rowIdx].tasks.splice(taskIdx, 1);
      saveData();
      renderGrid();
    }

    function toggleTaskDone(dateIdx, rowIdx, taskIdx) {
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      data.tasks[dateKey][rowIdx].tasks[taskIdx].done = !data.tasks[dateKey][rowIdx].tasks[taskIdx].done;
      saveData();
      renderGrid();
    }

    function toggleSlotDone(dateIdx, rowIdx) {
      var dates = getWeekDates();
      var dateKey = getDateKey(dates[dateIdx]);
      initDateData(dateKey);
      data.tasks[dateKey][rowIdx].done = !data.tasks[dateKey][rowIdx].done;
      saveData();
      renderGrid();
    }

    function setRmName(rowIdx) {
      var name = prompt('請輸入 RM 名稱（第 ' + (rowIdx + 1) + ' 行）：', RMS[rowIdx] || '');
      if (name !== null) {
        RMS[rowIdx] = name.trim();
        saveData();
        renderGrid();
      }
    }

    function closeTaskModal() {
      document.getElementById('taskModal').classList.remove('active');
    }

    document.getElementById('taskModal').addEventListener('click', function(e) {
      if (e.target.classList.contains('modal-overlay')) closeTaskModal();
    });

    loadData();
    renderGrid();
  </script>
</body>
</html>
