<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiona Team To-Do Dashboard v2</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #fff;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }

    /* View Controls */
    .view-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .view-btn-group {
      display: flex;
      gap: 2px;
      background: #16213e;
      border-radius: 6px;
      overflow: hidden;
    }

    .view-btn {
      background: #16213e;
      color: #aaa;
      border: none;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .view-btn:hover {
      background: #0f3460;
      color: #fff;
    }

    .view-btn.active {
      background: #e94560;
      color: #fff;
    }

    .date-nav {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .date-nav button {
      background: #16213e;
      color: #fff;
      border: 1px solid #0f3460;
      padding: 8px 12px;
      border-radius: 6px;
      cursor: pointer;
    }

    .date-nav button:hover {
      background: #0f3460;
    }

    .date-nav .current-date {
      color: #e94560;
      font-weight: bold;
      min-width: 180px;
      text-align: center;
    }

    /* Main Grid - Transposed */
    .main-grid {
      display: grid;
      grid-template-columns: 90px repeat(auto-fit, minmax(120px, 1fr));
      gap: 1px;
      background: #333;
      border-radius: 8px;
      overflow: hidden;
      max-width: 100%;
      overflow-x: auto;
    }

    .header-cell {
      background: #16213e;
      padding: 12px 8px;
      text-align: center;
      font-weight: bold;
      color: #fff;
      font-size: 0.8rem;
      min-width: 120px;
    }

    .header-cell.date-header {
      background: #0f3460;
      color: #e94560;
    }

    .rm-row {
      display: contents;
    }

    .rm-label {
      background: #16213e;
      padding: 12px 8px;
      text-align: center;
      font-weight: bold;
      color: #e94560;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      writing-mode: horizontal-tb;
    }

    .task-cell {
      background: #1f1f3a;
      padding: 6px;
      min-height: 100px;
      vertical-align: top;
    }

    /* Task Items */
    .task-item {
      background: #252540;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 4px;
      border-left: 3px solid #0f3460;
      position: relative;
    }

    .task-item.done {
      border-left-color: #4ecca3;
      opacity: 0.7;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: #888;
    }

    .task-text {
      font-size: 0.8rem;
      line-height: 1.3;
      word-break: break-word;
    }

    .task-text a {
      color: #4fc3f7;
      text-decoration: none;
      font-size: 0.75rem;
    }

    .task-actions {
      display: flex;
      gap: 2px;
      margin-top: 4px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .task-item:hover .task-actions {
      opacity: 1;
    }

    .task-actions button {
      background: transparent;
      border: none;
      color: #888;
      cursor: pointer;
      font-size: 0.7rem;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .task-actions button:hover {
      background: #333;
      color: #fff;
    }

    .checkbox {
      cursor: pointer;
      margin-right: 2px;
      font-size: 0.85rem;
    }

    /* Add Task Button */
    .add-task-btn {
      background: transparent;
      border: 1px dashed #444;
      color: #666;
      width: 100%;
      padding: 6px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75rem;
      margin-top: 4px;
    }

    .add-task-btn:hover {
      border-color: #0f3460;
      color: #4fc3f7;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #1f1f3a;
      border-radius: 10px;
      padding: 24px;
      width: 450px;
      max-width: 90vw;
    }

    .modal h3 {
      color: #fff;
      margin-bottom: 16px;
    }

    .modal input[type="text"],
    .modal input[type="date"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
      box-sizing: border-box;
    }

    .modal label {
      display: block;
      margin-bottom: 6px;
      color: #aaa;
      font-size: 0.85rem;
    }

    .schedule-options {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .schedule-option {
      background: #252540;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.8rem;
      color: #aaa;
      transition: all 0.2s;
    }

    .schedule-option:hover {
      border-color: #0f3460;
    }

    .schedule-option.selected {
      background: #0f3460;
      border-color: #e94560;
      color: #fff;
    }

    .date-picker-wrapper {
      display: none;
      margin-bottom: 10px;
    }

    .date-picker-wrapper.visible {
      display: block;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    .modal-buttons button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .modal-buttons .cancel-btn {
      background: #333;
      color: #fff;
    }

    .modal-buttons .save-btn {
      background: #e94560;
      color: #fff;
    }

    /* Legend */
    .legend {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      font-size: 0.75rem;
      color: #888;
      flex-wrap: wrap;
    }

    .legend span {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .legend .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .dot.parco { background: #e94560; }
    .dot.fifi { background: #f39c12; }
    .dot.cat { background: #3498db; }
    .dot.jerry { background: #9b59b6; }
    .dot.moses { background: #1abc9c; }
    .dot.candy { background: #e74c3c; }

    /* Schedule badges */
    .schedule-badge {
      font-size: 0.6rem;
      padding: 1px 4px;
      border-radius: 3px;
      margin-right: 3px;
      display: inline-block;
    }
    .badge-daily { background: #3498db; color: #fff; }
    .badge-weekly { background: #9b59b6; color: #fff; }
    .badge-yearly { background: #f39c12; color: #fff; }
    .badge-specific { background: #1abc9c; color: #fff; }
  </style>
</head>
<body>
  <h1>📋 Fiona Team To-Do Dashboard v2</h1>
  <p class="subtitle">左方：RM 排列 | 頂部：日期篩選（週/月/年）</p>

  <div class="view-controls">
    <div class="view-btn-group">
      <button class="view-btn active" data-view="week" onclick="setView('week')">週</button>
      <button class="view-btn" data-view="month" onclick="setView('month')">月</button>
      <button class="view-btn" data-view="year" onclick="setView('year')">年</button>
    </div>
    
    <div class="date-nav">
      <button onclick="navigateDate(-1)">◀</button>
      <span class="current-date" id="currentDateLabel">-</span>
      <button onclick="navigateDate(1)">▶</button>
    </div>
  </div>

  <div class="main-grid" id="mainGrid">
    <!-- Grid will be rendered here -->
  </div>

  <div class="legend">
    <span><span class="dot parco"></span>Parco</span>
    <span><span class="dot fifi"></span>Fi Fi</span>
    <span><span class="dot cat"></span>Cat</span>
    <span><span class="dot jerry"></span>Jerry</span>
    <span><span class="dot moses"></span>Moses</span>
    <span><span class="dot candy"></span>Candy</span>
  </div>

  <!-- Add/Edit Task Modal -->
  <div class="modal-overlay" id="taskModal">
    <div class="modal">
      <h3 id="modalTitle">加入工作</h3>
      <input type="hidden" id="editTaskId">
      <input type="hidden" id="editRm">
      <input type="hidden" id="editDate">
      <input type="hidden" id="editIndex">
      
      <label>工作描述</label>
      <input type="text" id="taskInput" placeholder="輸入工作內容...">
      
      <label>URL 連結（可選）</label>
      <input type="text" id="urlInput" placeholder="https://...">
      
      <label>重複週期</label>
      <div class="schedule-options">
        <div class="schedule-option selected" data-value="once" onclick="selectSchedule(this)">一次</div>
        <div class="schedule-option" data-value="daily" onclick="selectSchedule(this)">每日（除週六日）</div>
        <div class="schedule-option" data-value="weekly" onclick="selectSchedule(this)">每週</div>
        <div class="schedule-option" data-value="yearly" onclick="selectSchedule(this)">每年</div>
      </div>
      
      <div class="date-picker-wrapper" id="datePickerWrapper">
        <label>指定日期</label>
        <input type="date" id="specificDateInput">
      </div>
      
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeModal()">取消</button>
        <button class="save-btn" onclick="saveTask()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    const RMS = ['parco', 'fifi', 'cat', 'jerry', 'moses', 'candy'];
    const RM_NAMES = {
      parco: 'Parco',
      fififi: 'Fi Fi',
      cat: 'Cat',
      jerry: 'Jerry',
      moses: 'Moses',
      candy: 'Candy'
    };

    let currentView = 'week'; // week, month, year
    let currentDate = new Date();
    let data = {};
    let selectedSchedule = 'once';

    // Load data from localStorage
    function loadData() {
      const saved = localStorage.getItem('todo_dashboard_v2');
      if (saved) {
        data = JSON.parse(saved);
      } else {
        data = { tasks: {} };
      }
    }

    // Save data to localStorage
    function saveData() {
      localStorage.setItem('todo_dashboard_v2', JSON.stringify(data));
    }

    // Set view type
    function setView(view) {
      currentView = view;
      document.querySelectorAll('.view-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.view === view);
      });
      renderGrid();
    }

    // Navigate dates
    function navigateDate(direction) {
      if (currentView === 'week') {
        currentDate.setDate(currentDate.getDate() + (direction * 7));
      } else if (currentView === 'month') {
        currentDate.setMonth(currentDate.getMonth() + direction);
      } else {
        currentDate.setFullYear(currentDate.getFullYear() + direction);
      }
      renderGrid();
    }

    // Get dates to display based on view
    function getDisplayDates() {
      const dates = [];
      const today = new Date(currentDate);
      
      if (currentView === 'week') {
        // Get Mon-Sun of current week
        const day = today.getDay();
        const monday = new Date(today);
        monday.setDate(today.getDate() - (day === 0 ? 6 : day - 1));
        
        for (let i = 0; i < 7; i++) {
          const d = new Date(monday);
          d.setDate(monday.getDate() + i);
          dates.push(d);
        }
      } else if (currentView === 'month') {
        // Get all days in current month
        const year = today.getFullYear();
        const month = today.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        for (let i = 1; i <= daysInMonth; i++) {
          dates.push(new Date(year, month, i));
        }
      } else {
        // Get all months in current year
        for (let m = 0; m < 12; m++) {
          dates.push(new Date(today.getFullYear(), m, 1));
        }
      }
      
      return dates;
    }

    // Get date key for storage
    function getDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    // Format date for header
    function formatDateHeader(date) {
      if (currentView === 'year') {
        const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];
        return months[date.getMonth()];
      } else if (currentView === 'month') {
        return `${date.getMonth() + 1}/${date.getDate()}`;
      } else {
        const days = ['日', '一', '二', '三', '四', '五', '六'];
        return `${date.getMonth() + 1}/${date.getDate()}\n${days[date.getDay()]}`;
      }
    }

    // Format current date label
    function formatDateLabel() {
      if (currentView === 'week') {
        const day = currentDate.getDay();
        const monday = new Date(currentDate);
        monday.setDate(currentDate.getDate() - (day === 0 ? 6 : day - 1));
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        return `${monday.getMonth() + 1}/${monday.getDate()} - ${sunday.getMonth() + 1}/${sunday.getDate()}`;
      } else if (currentView === 'month') {
        return `${currentDate.getFullYear()}年 ${currentDate.getMonth() + 1}月`;
      } else {
        return `${currentDate.getFullYear()}年`;
      }
    }

    // Select schedule option
    function selectSchedule(el) {
      document.querySelectorAll('.schedule-option').forEach(opt => opt.classList.remove('selected'));
      el.classList.add('selected');
      selectedSchedule = el.dataset.value;
      
      const datePicker = document.getElementById('datePickerWrapper');
      if (selectedSchedule === 'specific') {
        datePicker.classList.add('visible');
      } else {
        datePicker.classList.remove('visible');
      }
    }

    // Get schedule badge
    function getScheduleBadge(schedule) {
      const badges = {
        once: '',
        daily: '<span class="schedule-badge badge-daily">日</span>',
        weekly: '<span class="schedule-badge badge-weekly">週</span>',
        yearly: '<span class="schedule-badge badge-yearly">年</span>'
      };
      return badges[schedule] || '';
    }

    // Check if task should show on this date
    function shouldShowTask(task, date) {
      if (currentView === 'year') {
        // Show if same month/day
        const taskDate = new Date(task.date);
        return date.getMonth() === taskDate.getMonth() && date.getDate() === taskDate.getDate();
      } else if (currentView === 'month') {
        // Show if matching schedule for this day
        if (task.schedule === 'daily') {
          return date.getDay() >= 1 && date.getDay() <= 5;
        } else if (task.schedule === 'weekly') {
          return date.getDay() === 1; // Monday
        } else if (task.schedule === 'yearly') {
          const taskDate = new Date(task.date);
          return date.getMonth() === taskDate.getMonth() && date.getDate() === taskDate.getDate();
        } else {
          // Once - show only on the exact date
          const taskDate = new Date(task.date);
          return date.toDateString() === taskDate.toDateString();
        }
      } else {
        // Week view - show all
        return true;
      }
    }

    // Initialize data for a date
    function initDateData(dateKey) {
      if (!data.tasks[dateKey]) {
        data.tasks[dateKey] = {};
        RMS.forEach(rm => data.tasks[dateKey][rm] = []);
      }
    }

    // Render the grid
    function renderGrid() {
      const grid = document.getElementById('mainGrid');
      const dates = getDisplayDates();
      
      document.getElementById('currentDateLabel').textContent = formatDateLabel();

      // Build header row
      let html = '<div class="header-cell">RM</div>';
      dates.forEach(date => {
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        html += `<div class="header-cell date-header" style="${isWeekend ? 'background:#1a1a2e;color:#666;' : ''}">${formatDateHeader(date)}</div>`;
      });

      // Build RM rows
      RMS.forEach(rm => {
        html += `<div class="rm-row">`;
        html += `<div class="rm-label">${RM_NAMES[rm]}</div>`;
        
        dates.forEach(date => {
          const dateKey = getDateKey(date);
          const isWeekend = date.getDay() === 0 || date.getDay() === 6;
          initDateData(dateKey);
          
          const tasks = data.tasks[dateKey][rm] || [];
          let cellHtml = '';
          
          tasks.forEach((task, idx) => {
            if (shouldShowTask(task, date)) {
              cellHtml += `
                <div class="task-item ${task.done ? 'done' : ''}" data-task-id="${task.id}">
                  <span class="checkbox" onclick="toggleTask('${dateKey}', '${rm}', ${idx})">
                    ${task.done ? '✅' : '☐'}
                  </span>
                  <span class="task-text">
                    ${getScheduleBadge(task.schedule)}
                    ${escapeHtml(task.text)}
                    ${task.url ? `<br><a href="${escapeHtml(task.url)}" target="_blank">🔗</a>` : ''}
                  </span>
                  <div class="task-actions">
                    <button onclick="editTask('${dateKey}', '${rm}', ${idx})">✏️</button>
                    <button onclick="deleteTask('${dateKey}', '${rm}', ${idx})">🗑️</button>
                  </div>
                </div>
              `;
            }
          });
          
          const bgStyle = isWeekend ? 'background:#181828;' : '';
          cellHtml += `<button class="add-task-btn" onclick="openAddModal('${dateKey}', '${rm}')">+</button>`;
          
          html += `<div class="task-cell" style="${bgStyle}">${cellHtml}</div>`;
        });
        
        html += `</div>`;
      });

      grid.innerHTML = html;
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Open add modal
    function openAddModal(dateKey, rm) {
      document.getElementById('modalTitle').textContent = '加入工作';
      document.getElementById('editTaskId').value = '';
      document.getElementById('editRm').value = rm;
      document.getElementById('editDate').value = dateKey;
      document.getElementById('editIndex').value = '';
      document.getElementById('taskInput').value = '';
      document.getElementById('urlInput').value = '';
      document.getElementById('specificDateInput').value = '';
      
      selectedSchedule = 'once';
      document.querySelectorAll('.schedule-option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === 'once');
      });
      document.getElementById('datePickerWrapper').classList.remove('visible');
      
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Open edit modal
    function editTask(dateKey, rm, idx) {
      const task = data.tasks[dateKey][rm][idx];
      if (!task) return;
      
      document.getElementById('modalTitle').textContent = '編輯工作';
      document.getElementById('editTaskId').value = task.id;
      document.getElementById('editRm').value = rm;
      document.getElementById('editDate').value = dateKey;
      document.getElementById('editIndex').value = idx;
      document.getElementById('taskInput').value = task.text;
      document.getElementById('urlInput').value = task.url || '';
      
      selectedSchedule = task.schedule || 'once';
      document.querySelectorAll('.schedule-option').forEach(opt => {
        opt.classList.toggle('selected', opt.dataset.value === selectedSchedule);
      });
      
      if (selectedSchedule === 'specific') {
        document.getElementById('datePickerWrapper').classList.add('visible');
        document.getElementById('specificDateInput').value = task.specificDate || '';
      }
      
      document.getElementById('taskModal').classList.add('active');
      document.getElementById('taskInput').focus();
    }

    // Save task
    function saveTask() {
      const id = document.getElementById('editTaskId').value;
      const rm = document.getElementById('editRm').value;
      const dateKey = document.getElementById('editDate').value;
      const idx = document.getElementById('editIndex').value;
      const text = document.getElementById('taskInput').value.trim();
      const url = document.getElementById('urlInput').value.trim();

      if (!text) {
        alert('請輸入工作描述');
        return;
      }

      initDateData(dateKey);

      if (id) {
        // Edit existing
        const taskIdx = data.tasks[dateKey][rm].findIndex(t => t.id === id);
        if (taskIdx !== -1) {
          data.tasks[dateKey][rm][taskIdx].text = text;
          data.tasks[dateKey][rm][taskIdx].url = url;
          data.tasks[dateKey][rm][taskIdx].schedule = selectedSchedule;
        }
      } else {
        // Add new
        data.tasks[dateKey][rm].push({
          id: Date.now().toString(),
          text: text,
          url: url,
          done: false,
          schedule: selectedSchedule,
          date: dateKey
        });
      }

      saveData();
      closeModal();
      renderGrid();
    }

    // Delete task
    function deleteTask(dateKey, rm, idx) {
      if (!confirm('確定刪除呢项工作？')) return;
      data.tasks[dateKey][rm].splice(idx, 1);
      saveData();
      renderGrid();
    }

    // Toggle task done
    function toggleTask(dateKey, rm, idx) {
      data.tasks[dateKey][rm][idx].done = !data.tasks[dateKey][rm][idx].done;
      saveData();
      renderGrid();
    }

    // Close modal
    function closeModal() {
      document.getElementById('taskModal').classList.remove('active');
    }

    // Close modal on outside click
    document.getElementById('taskModal').addEventListener('click', (e) => {
      if (e.target.classList.contains('modal-overlay')) {
        closeModal();
      }
    });

    // Initialize
    loadData();
    renderGrid();
  </script>
</body>
</html>
