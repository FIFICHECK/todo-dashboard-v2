<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do-List Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; 
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #e0e0e0; 
      min-height: 100vh; 
      padding: 20px; 
    }
    h1 { text-align: center; color: #fff; margin-bottom: 10px; font-size: 1.8rem; font-weight: 700; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
    .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; font-weight: 600; }
    .loading { text-align: center; color: #4fc3f7; font-size: 1.2rem; padding: 40px; }
    .setup-container { max-width: 500px; margin: 50px auto; background: #1a1a2e; border-radius: 20px; padding: 30px; border: 1px solid #333; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
    .setup-container h2 { color: #4fc3f7; margin-bottom: 20px; font-weight: 700; }
    .setup-container p { color: #888; margin-bottom: 15px; line-height: 1.6; }
    .setup-container input { width: 100%; padding: 12px; margin-bottom: 15px; background: #151525; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 1rem; box-sizing: border-box; }
    .setup-container button { width: 100%; padding: 12px; background: #4fc3f7; color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .setup-container button:hover { background: #3db8e8; }
    .date-controls { display: flex; justify-content: center; align-items: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
    .date-nav { display: flex; align-items: center; gap: 10px; }
    .date-nav button { background: #1a1a2e; color: #fff; border: 1px solid #333; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.3s; font-weight: 700; }
    .date-nav button:hover { background: #252545; box-shadow: 0 0 15px rgba(79,195,247,0.3); border-color: #4fc3f7; }
    .date-nav .current-date { color: #4fc3f7; font-weight: 700; min-width: 200px; text-align: center; font-size: 1.1rem; text-shadow: 0 0 10px rgba(79,195,247,0.5); }
    .week-chips { display: flex; gap: 8px; background: #1a1a2e; border-radius: 10px; padding: 8px; border: 1px solid #333; }
    .week-chip { padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; color: #888; background: transparent; font-weight: 600; }
    .week-chip:hover { background: #252545; color: #fff; }
    .week-chip.active { background: linear-gradient(135deg, #4fc3f7 0%, #4fc3f7 100%); color: #fff; box-shadow: 0 0 15px rgba(79,195,247,0.4); }

    .main-table { width: 100%; border-collapse: separate; border-spacing: 0; background: #1a1a2e; border-radius: 16px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border: 1px solid #333; }
    
    .header-row th { background: linear-gradient(135deg, #1a1a2e 0%, #252545 100%); padding: 14px 12px; text-align: center; font-weight: 700; color: #fff; font-size: 0.85rem; border-bottom: 1px solid #333; }
    .header-row th.date-col { min-width: 120px; }
    .header-row th.work-col { min-width: 200px; background: linear-gradient(135deg, #4fc3f7 0%, #4fc3f7 100%); color: #fff; text-align: left; padding-left: 16px; border-bottom: none; }
    .header-row th.rm-col { min-width: 400px; }
    
    .data-row td { background: #1f1f3a; padding: 12px; vertical-align: middle; border-bottom: 1px solid #2a2a40; transition: all 0.2s; }
    .data-row:hover td { background: #252545; }
    .data-row:last-child td { border-bottom: none; }
    .data-row td.date-col { background: #1f1f3a; text-align: center; font-weight: 700; color: #4fc3f7; min-width: 120px; border-left: 4px solid #333; }
    .data-row td.work-col { background: #1f1f3a; text-align: left; cursor: pointer; min-width: 200px; color: #ddd; transition: all 0.2s; font-weight: 600; }
    .data-row td.work-col:hover { color: #4fc3f7; }
    .data-row td.work-col.urgent { background: linear-gradient(135deg, #3a3520 0%, #4a4530 100%); border-left: 4px solid #ffcc00; }
    .data-row td.work-col.urgent:hover { color: #ffcc00; }
    .data-row td.rm-col { background: #1f1f3a; text-align: center; }
    
    .add-work-row td { background: #151525; padding: 10px 12px; border-bottom: none; }
    .add-work-row td.date-col { background: #151525; }
    .add-work-row td.work-col { background: #151525; text-align: left; cursor: pointer; color: #666; font-size: 0.9rem; transition: all 0.2s; font-weight: 600; }
    .add-work-row td.work-col:hover { color: #4fc3f7; background: #1a1a2e; }
    .add-work-row td.rm-col { background: #151525; }
    
    .section-separator td { background: linear-gradient(90deg, #4fc3f7, #4fc3f7, #4fc3f7); height: 3px !important; padding: 0 !important; border: none !important; }
    
    .work-name { display: flex; align-items: center; gap: 8px; font-size: 0.95rem; color: #ccc; font-weight: 600; }
    .work-name .work-text { flex: 1; }
    .work-name .work-url { color: #4fc3f7; font-size: 0.85rem; text-decoration: none; }
    .work-name .work-url:hover { color: #81d4fa; }
    
    .rm-checkboxes { display: flex; gap: 8px; justify-content: center; flex-wrap: nowrap; overflow-x: auto; }
    
    .rm-check { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 4px;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 10px;
      background: #252545;
      min-width: 54px;
      flex-shrink: 0;
      transition: all 0.2s;
      border: 1px solid #333;
    }
    .rm-check:hover { background: #333; box-shadow: 0 0 15px rgba(79,195,247,0.3); transform: translateY(-2px); border-color: #4fc3f7; }
    .rm-check.checked { background: linear-gradient(135deg, #1f3a2e 0%, #2a4a3e 100%); border-color: #4ecca3; }
    .rm-check.checked:hover { box-shadow: 0 0 15px rgba(78,204,163,0.3); }
    .rm-check.crossed { background: linear-gradient(135deg, #3a1f1f 0%, #4a2a2a 100%); border-color: #e74c3c; }
    .rm-check.crossed:hover { box-shadow: 0 0 15px rgba(231,76,60,0.3); }
    
    .rm-check .rm-label { font-size: 0.8rem; font-weight: 700; padding: 4px 8px; border-radius: 6px; cursor: pointer; background: #333; color: #fff; transition: all 0.2s; }
    .rm-check .rm-label:hover { opacity: 0.8; background: #444; }
    .rm-check .check-icon { font-size: 1.4rem; }
    .rm-check.checked .check-icon { color: #4ecca3; text-shadow: 0 0 10px rgba(78,204,163,0.5); }
    .rm-check.crossed .check-icon { color: #e74c3c; text-shadow: 0 0 10px rgba(231,76,60,0.5); }
    .rm-check.unchecked .check-icon { color: #555; }
    
    .rm-settings { margin-top: 24px; background: linear-gradient(135deg, #1a1a2e 0%, #252545 100%); border-radius: 16px; padding: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); border: 1px solid #333; }
    .rm-settings h3 { color: #fff; margin-bottom: 12px; font-size: 1rem; font-weight: 700; }
    .rm-settings-list { display: flex; gap: 10px; flex-wrap: wrap; }
    .rm-name-btn { 
      padding: 10px 18px; 
      border-radius: 10px; 
      border: none; 
      cursor: pointer; 
      font-size: 0.85rem; 
      font-weight: 700;
      color: #fff;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }
    .rm-name-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); filter: brightness(1.1); }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
    .modal-overlay.active { display: flex; }
    .modal { background: linear-gradient(135deg, #1a1a2e 0%, #252545 100%); border-radius: 20px; padding: 28px; width: 420px; max-width: 90vw; box-shadow: 0 20px 60px rgba(0,0,0,0.5); border: 1px solid #444; }
    .modal h3 { color: #fff; margin-bottom: 16px; font-weight: 700; }
    .modal input[type="text"] { width: 100%; padding: 12px 14px; margin-bottom: 10px; background: #151525; border: 1px solid #333; border-radius: 10px; color: #fff; font-family: inherit; box-sizing: border-box; transition: all 0.3s; font-weight: 600; }
    .modal input[type="text"]:focus { outline: none; border-color: #4fc3f7; box-shadow: 0 0 0 3px rgba(79,195,247,0.2); }
    .modal select { width: 100%; padding: 12px 14px; margin-bottom: 10px; background: #151525; border: 1px solid #333; border-radius: 10px; color: #fff; font-family: inherit; box-sizing: border-box; font-weight: 600; }
    .modal label { display: block; margin-bottom: 6px; color: #888; font-size: 0.85rem; font-weight: 600; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .modal-buttons button { padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer; font-size: 0.9rem; font-weight: 700; transition: all 0.3s; }
    .modal-buttons .cancel-btn { background: #333; color: #fff; }
    .modal-buttons .cancel-btn:hover { background: #444; }
    .modal-buttons .save-btn { background: linear-gradient(135deg, #4fc3f7 0%, #4fc3f7 100%); color: #fff; box-shadow: 0 4px 15px rgba(79,195,247,0.3); }
    .modal-buttons .save-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(79,195,247,0.4); }
    .modal-buttons .delete-btn { background: linear-gradient(135deg, #c0392b 0%, #96281b 100%); color: #fff; margin-right: auto; }
    .modal-buttons .delete-btn:hover { background: #e74c3c; }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.95rem;
      z-index: 9999;
      opacity: 0;
      transform: translateY(-20px);
      transition: all 0.3s ease;
      pointer-events: none;
    }
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    .toast.success {
      background: linear-gradient(135deg, #2ecc71, #27ae60);
      color: #fff;
      box-shadow: 0 4px 15px rgba(46,204,113,0.4);
    }
    .toast.error {
      background: linear-gradient(135deg, #e74c3c, #c0392b);
      color: #fff;
      box-shadow: 0 4px 15px rgba(231,76,60,0.4);
    }
  </style>
</head>
<body>
  <h1>📋 To-Do-List Dashboard</h1>
  <p class="subtitle">每個日子獨立新增工作 | 點擊 RM 名稱可編輯 | 數據同步至 Airtable</p>
  
  <!-- Setup Screen -->
  <div id="setupScreen" class="setup-container">
    <h2>🔗 首次設定 Airtable 連接</h2>
    <p>請輸入你嘅 Airtable API Key 與 Base ID（只需設定一次）</p>
    <input type="text" id="setupApiKey" placeholder="API Key (pat...)">
    <input type="text" id="setupBaseId" placeholder="Base ID (app...)" value="appQrncWYHHMh1iXf">
    <p style="font-size:0.8rem;color:#666;">API Key 會安全地儲存喺你瀏覽器嘅 localStorage</p>
    <button onclick="saveSetup()">連接 Airtable</button>
  </div>

  <div id="loading" class="loading" style="display:none;">⏳ 載入數據中...</div>

  <div class="date-controls" id="dateControls" style="display:none;">
    <div class="date-nav">
      <button onclick="goToYearStart()">◀ 年初</button>
      <button onclick="navigateWeek(-1)">◀ 上一週</button>
      <span class="current-date" id="currentDateLabel">-</span>
      <button onclick="navigateWeek(1)">下一週 ▶</button>
      <button onclick="goToYearEnd()">年末 ▶</button>
    </div>
    <div class="week-chips" id="weekChips"></div>
    <div class="year-picker" style="margin-top:10px;">
      <label for="yearSelect" style="color:#4fc3f7;font-weight:bold;margin-right:8px;">年份：</label>
      <select id="yearSelect" onchange="jumpToYear(this.value)" style="padding:5px 10px;border-radius:5px;border:1px solid #4fc3f7;background:#1a1a2e;color:#fff;font-weight:bold;">
        <option value="">-- 選擇年份 --</option>
      </select>
    </div>
  </div>

  <table class="main-table" id="mainTable" style="display:none;">
  </table>

  <div class="rm-settings" id="rmSettings" style="display:none;">
    <h3>RM 名稱設定（點擊編輯）</h3>
    <div class="rm-settings-list" id="rmSettingsList"></div>
  </div>

  <div class="modal-overlay" id="workModal">
    <div class="modal">
      <h3 id="workModalTitle">新增工作</h3>
      <input type="hidden" id="editWorkId">
      <label>工作名稱</label>
      <input type="text" id="workNameInput" placeholder="輸入工作名稱...">
      <label>URL 連結（可選）</label>
      <input type="text" id="workUrlInput" placeholder="https://...">
      <label>重複頻率</label>
      <select id="workRepeatInput" style="width:100%;padding:10px;margin-bottom:10px;background:#151525;border:1px solid #333;border-radius:10px;color:#fff;font-family:inherit;font-weight:600;">
        <option value="none">不重複</option>
        <option value="day">每日重複 (DAY)</option>
        <option value="week">每週重複 (WEEK)</option>
        <option value="month">每月重複 (MONTH)</option>
      </select>
      <label style="display:flex;align-items:center;gap:10px;margin-top:10px;">
        <input type="checkbox" id="workUrgentInput" style="width:20px;height:20px;cursor:pointer;">
        <span style="color:#ffcc00;font-weight:600;">⚡ URGENT（重要/緊急）</span>
      </label>
      <div class="modal-buttons">
        <button class="delete-btn" id="deleteWorkBtn" style="display:none;" onclick="deleteWork()">刪除</button>
        <button class="cancel-btn" onclick="closeWorkModal()">取消</button>
        <button class="save-btn" onclick="saveWork()">儲存</button>
      </div>
    </div>
  </div>

  <script>
    var AIRTABLE_API_KEY = '';
    var AIRTABLE_BASE_ID = '';
    var AIRTABLE_BASE_URL = '';
    
    var MAX_RMS = 7;
    var RM_COLORS = ['#4fc3f7', '#f39c12', '#9b59b6', '#3498db', '#1abc9c', '#e74c3c', '#2ecc71'];
    var currentWeekStart = getMonday(new Date());
    var currentModalDateKey = '';
    var works = [];
    var checks = {};
    var isSaving = false;
    var RMS = ['', '', '', '', '', '', ''];
    var isLoading = true;

    var REPEAT_NONE = 'none';
    var REPEAT_DAY = 'day';
    var REPEAT_WEEK = 'week';
    var REPEAT_MONTH = 'month';

    function getMonday(d) {
      var date = new Date(d);
      var day = date.getDay();
      var diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function getDateKey(date) {
      return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0') + '-' + String(date.getDate()).padStart(2, '0');
    }

    function formatDateLabel() {
      var weekEnd = new Date(currentWeekStart);
      weekEnd.setDate(currentWeekStart.getDate() + 6);
      return (currentWeekStart.getMonth() + 1) + '/' + currentWeekStart.getDate() + ' - ' + (weekEnd.getMonth() + 1) + '/' + weekEnd.getDate();
    }

    function getWeekDates() {
      var dates = [];
      for (var i = 0; i < 7; i++) {
        var d = new Date(currentWeekStart);
        d.setDate(currentWeekStart.getDate() + i);
        dates.push(d);
      }
      return dates;
    }

    async function fetchAirtable(table, filterByFormula) {
      var allRecords = [];
      var offset = null;
      do {
        var url = AIRTABLE_BASE_URL + '/' + encodeURIComponent(table);
        var params = [];
        if (filterByFormula) {
          params.push('filterByFormula=' + encodeURIComponent(filterByFormula));
        }
        if (offset) {
          params.push('offset=' + offset);
        }
        if (params.length > 0) {
          url += '?' + params.join('&');
        }
        var response = await fetch(url, {
          headers: { 'Authorization': 'Bearer ' + AIRTABLE_API_KEY }
        });
        var data = await response.json();
        if (data.records) {
          allRecords = allRecords.concat(data.records);
        }
        offset = data.offset || null;
        // Safety: limit to 15000 records (Airtable max is ~100k)
        if (allRecords.length >= 15000) break;
      } while (offset);
      return allRecords;
    }

    async function createAirtableRecord(table, fields) {
      var response = await fetch(AIRTABLE_BASE_URL + '/' + encodeURIComponent(table), {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + AIRTABLE_API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ fields: fields })
      });
      var data = await response.json();
      if (!response.ok) {
        var error = new Error(data.error?.message || 'Airtable API error');
        error.status = response.status;
        error.data = data;
        throw error;
      }
      return data;
    }

    async function updateAirtableRecord(table, recordId, fields) {
      var response = await fetch(AIRTABLE_BASE_URL + '/' + encodeURIComponent(table) + '/' + recordId, {
        method: 'PATCH',
        headers: {
          'Authorization': 'Bearer ' + AIRTABLE_API_KEY,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ fields: fields })
      });
      var data = await response.json();
      if (!response.ok) {
        var error = new Error(data.error?.message || 'Airtable API error');
        error.status = response.status;
        error.data = data;
        throw error;
      }
      return data;
    }

    async function deleteAirtableRecord(table, recordId) {
      await fetch(AIRTABLE_BASE_URL + '/' + encodeURIComponent(table) + '/' + recordId, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + AIRTABLE_API_KEY }
      });
    }

    // Calculate date range for smart loading: current week ± weeks
    function getDateRangeForLoading(baseWeekStart, weeksBefore, weeksAfter) {
      var start = new Date(baseWeekStart);
      start.setDate(start.getDate() - weeksBefore * 7);
      var end = new Date(baseWeekStart);
      end.setDate(end.getDate() + weeksAfter * 7);
      return {
        start: getDateKey(start),
        end: getDateKey(end)
      };
    }
    
    async function loadDataSmart() {
      // Calculate date range: current week + 3 weeks before + 2 weeks after = 6 weeks total
      var range = getDateRangeForLoading(currentWeekStart, 3, 2);
      console.log('LOAD SMART: Fetching checks from', range.start, 'to', range.end);
      
      // Build Airtable filter formula for date range
      var formula = "AND(IS_AFTER(DateKey, '" + range.start + "'), IS_BEFORE(DateKey, '" + range.end + "'))";
      var records = await fetchAirtable('Checks', formula);
      console.log('LOAD SMART: Fetched', records.length, 'checks in date range');
      
      records.forEach(function(r) {
        if (r.fields.CheckKey && r.fields.State !== undefined) {
          checks[r.fields.CheckKey] = r.fields.State;
        }
      });
      
      // Update cache with new data
      try {
        localStorage.setItem('checks_cache', JSON.stringify(checks));
        localStorage.setItem('checks_cache_timestamp', Date.now().toString());
        console.log('LOAD SMART: Updated localStorage cache');
      } catch(e) {}
      
      renderGrid();
    }
    
    async function loadData() {
      console.log('LOAD: loadData started');
      
      // Step 1: Load works and settings (needed for UI)
      try {
        var worksRecords = await fetchAirtable('Works');
        console.log('LOAD: Fetched', worksRecords.length, 'works records');
        works = worksRecords.map(function(r) {
          return {
            id: r.id,
            text: r.fields.Name || '',
            url: r.fields.URL || '',
            dateKey: r.fields.DateKey || '',
            repeat: r.fields.Repeat || 'none',
            urgent: r.fields.Urgent || false
          };
        });

        var settingsRecords = await fetchAirtable('Settings');
        settingsRecords.forEach(function(r) {
          if (r.fields.Name && r.fields.Value) {
            if (r.fields.Name.startsWith('RM')) {
              var idx = parseInt(r.fields.Name.replace('RM', '')) - 1;
              if (idx >= 0 && idx < 7) {
                RMS[idx] = r.fields.Value;
              }
            }
          }
        });
      } catch (error) {
        console.error('LOAD: Error loading works/settings:', error);
      }
      
      // Step 2: Try localStorage cache first for instant UI
      var cachedChecks = localStorage.getItem('checks_cache');
      var cachedTimestamp = localStorage.getItem('checks_cache_timestamp');
      
      if (cachedChecks) {
        try {
          var parsed = JSON.parse(cachedChecks);
          checks = parsed;
          console.log('LOAD: Loaded', Object.keys(checks).length, 'checks from localStorage cache (instant)');
          isLoading = false;
          document.getElementById('loading').style.display = 'none';
          document.getElementById('dateControls').style.display = 'flex';
          document.getElementById('mainTable').style.display = 'table';
          document.getElementById('rmSettings').style.display = 'block';
          initYearPicker();
          renderGrid();
          renderRmSettings();
        } catch(e) {
          console.log('LOAD: Cache parse failed');
          checks = {};
        }
      } else {
        // No cache, need to load from Airtable
        isLoading = false;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('dateControls').style.display = 'flex';
        document.getElementById('mainTable').style.display = 'table';
        document.getElementById('rmSettings').style.display = 'block';
        initYearPicker();
        renderGrid();
        renderRmSettings();
      }
      
      // Step 3: Background load current ± 5 weeks checks from Airtable (非阻塞)
      setTimeout(function() {
        loadDataSmart();
      }, 100);
    }

    async function saveWorksToAirtable() {
      try {
        var existingWorks = await fetchAirtable('Works');
        // First, collect all existing records to potentially restore
        var existingIds = existingWorks.map(function(r) { return r.id; });
        
        // Delete all existing
        for (var i = 0; i < existingWorks.length; i++) {
          await deleteAirtableRecord('Works', existingWorks[i].id);
        }
        
        // Create all current works
        var newWorks = [];
        for (var j = 0; j < works.length; j++) {
          var result = await createAirtableRecord('Works', {
            'Name': works[j].text,
            'URL': works[j].url || '',
            'DateKey': works[j].dateKey,
            'Repeat': works[j].repeat || 'none',
            'Urgent': works[j].urgent || false
          });
          // Update local work.id to match the new Airtable record id
          works[j].id = result.id;
          newWorks.push(result);
        }
        
        // If we got here, all saves succeeded
        console.log('Works saved successfully:', works.length, 'records');
        showToast(true, '✅ 工作已儲存');
      } catch (e) {
        console.error('Failed to save works:', e);
        // Reload data to restore state
        await loadData();
        alert('儲存工作失敗，數據已恢復。請稍後再試。');
        showToast(false, '❌ 儲存失敗');
      }
    }

async function saveSingleCheckToAirtable(key) {
      console.log('SAVE SINGLE: Starting for key:', key);
      console.log('SAVE SINGLE: current checks[key]:', checks[key]);
      try {
        var existingChecks = await fetchAirtable('Checks');
        console.log('SAVE SINGLE: Fetched', existingChecks.length, 'existing checks');
        var existingMap = {};
        for (var i = 0; i < existingChecks.length; i++) {
          var rec = existingChecks[i];
          if (rec.fields.CheckKey) {
            existingMap[rec.fields.CheckKey] = rec.id;
          }
        }
        console.log('SAVE SINGLE: existingMap has', Object.keys(existingMap).length, 'entries');
        console.log('SAVE SINGLE: key in existingMap?', existingMap.hasOwnProperty(key));
        
        var state = checks[key];
        console.log('SAVE SINGLE: state to save:', state);
        
        var result;
        if (existingMap[key]) {
          console.log('SAVE SINGLE: PATCH existing record ID:', existingMap[key]);
          result = await updateAirtableRecord('Checks', existingMap[key], { 'State': state });
          console.log('SAVE SINGLE: PATCH result:', JSON.stringify(result));
        } else {
          console.log('SAVE SINGLE: POST new record with CheckKey:', key, 'State:', state);
          result = await createAirtableRecord('Checks', { 'CheckKey': key, 'State': state });
          console.log('SAVE SINGLE: POST result:', JSON.stringify(result));
          alert('DEBUG POST result:\n' + JSON.stringify(result, null, 2));
        }
        
        console.log('SAVE SINGLE: Done for', key);
        showToast(true, '✅ 已儲存');
      } catch (e) {
        console.error('SAVE SINGLE: Error:', e);
        console.error('SAVE SINGLE: Error status:', e.status);
        console.error('SAVE SINGLE: Error data:', JSON.stringify(e.data));
        showToast(false, '❌ 儲存失敗: ' + (e.message || '未知錯誤'));
        throw e; // Re-throw so toggleCheck knows save failed
      }
    }

    async function saveChecksToAirtable() {
      if (isSaving) {
        console.log('SAVE: Skipped - already saving');
        return;
      }
      isSaving = true;
      console.log('SAVE: saveChecksToAirtable started');
      console.log('SAVE: checks to save:', JSON.stringify(checks));
      try {
        console.log('SAVE: Fetching existing checks from Airtable...');
        var existingChecks = await fetchAirtable('Checks');
        console.log('SAVE: Fetched', existingChecks.length, 'existing checks');
        
        // Build a map of existing records by CheckKey
        var existingMap = {};
        for (var i = 0; i < existingChecks.length; i++) {
          var rec = existingChecks[i];
          if (rec.fields.CheckKey) {
            existingMap[rec.fields.CheckKey] = rec.id;
          }
        }
        console.log('SAVE: existingMap has', Object.keys(existingMap).length, 'entries');
        
        // UPSERT: PATCH existing, POST new
        var checkKeys = Object.keys(checks);
        console.log('SAVE: Total checkKeys to save:', checkKeys.length);
        var delay = 300;
        var savedCount = 0;
        var errorCount = 0;
        
        for (var j = 0; j < checkKeys.length; j++) {
          var key = checkKeys[j];
          var state = checks[key];
          console.log('SAVE: Processing', key, '=', state, '(existing?', !!existingMap[key], ')');
          
          try {
            if (existingMap[key]) {
              // PATCH existing record
              console.log('SAVE: PATCH', existingMap[key], 'with State:', state);
              await updateAirtableRecord('Checks', existingMap[key], { 'State': state });
              console.log('SAVE: PATCH successful for', key);
            } else {
              // POST new record
              console.log('SAVE: POST new record for', key, 'with State:', state);
              await createAirtableRecord('Checks', { 'CheckKey': key, 'State': state });
              console.log('SAVE: POST successful for', key);
            }
            savedCount++;
          } catch (err) {
            console.error('SAVE ERROR for', key, ':', err.message || err);
            errorCount++;
            // Don't throw, continue with other records
          }
          
          // Delay between requests to avoid rate limit
          if (j < checkKeys.length - 1) {
            await new Promise(function(res) { setTimeout(res, delay); });
          }
        }
        
        console.log('SAVE: Done! Saved:', savedCount, 'Errors:', errorCount);
        if (errorCount === 0) {
          showToast(true, '✅ 狀態已儲存 (' + savedCount + ' 記錄)');
        } else {
          showToast(false, '⚠️ 部分儲存失敗 (' + errorCount + ' 錯誤)');
        }
      } catch (e) {
        console.error('SAVE: Fatal error:', e);
        showToast(false, '❌ 狀態儲存失敗: ' + (e.message || e));
      } finally {
        isSaving = false;
      }
    }

async function saveRMStoAirtable() {
      var existingSettings = await fetchAirtable('Settings');
      for (var i = 0; i < existingSettings.length; i++) {
        await deleteAirtableRecord('Settings', existingSettings[i].id);
      }
      for (var j = 0; j < RMS.length; j++) {
        if (RMS[j]) {
          await createAirtableRecord('Settings', {
            'Name': 'RM' + (j + 1),
            'Value': RMS[j]
          });
        }
      }
    }

    function navigateWeek(direction) {
      var currentYear = currentWeekStart.getFullYear();
      var firstMonday = getFirstMondayOfYear(currentYear);
      var lastMonday = getLastMondayOfYear(currentYear);
      
      if (direction === -1) {
        // 上一週：檢查是否已經係該年第一週
        var currentMondayStr = currentWeekStart.toISOString().split('T')[0];
        var firstMondayStr = firstMonday.toISOString().split('T')[0];
        if (currentMondayStr === firstMondayStr) {
          return; // 已經係第一週，唔郁
        }
        currentWeekStart.setDate(currentWeekStart.getDate() - 7);
      } else if (direction === 1) {
        // 下一週：檢查是否已經係該年最後一週
        var currentMondayStr = currentWeekStart.toISOString().split('T')[0];
        var lastMondayStr = lastMonday.toISOString().split('T')[0];
        if (currentMondayStr === lastMondayStr) {
          return; // 已經係最後一週，唔郁
        }
        currentWeekStart.setDate(currentWeekStart.getDate() + 7);
      }
      
      renderGrid();
    }

    function getFirstMondayOfYear(year) {
      // Find the first Monday that falls within this year
      // January 4 is always in the first week of the year
      var jan4 = new Date(year, 0, 4);
      return getMonday(jan4);
    }

    function getLastMondayOfYear(year) {
      // Find the last Monday of this year
      var dec31 = new Date(year, 11, 31);
      var lastMonday = new Date(dec31);
      var day = lastMonday.getDay();
      // Subtract days to get to Monday (0=Sun, 1=Mon, ..., 6=Sat)
      // If already Monday (day=1), stay. Otherwise go back (day - 1) days for Mon or (7 - (1-day)) for Mon
      if (day === 0) {
        lastMonday.setDate(lastMonday.getDate() - 6); // Sun -> previous Monday
      } else if (day === 1) {
        // Already Monday
      } else {
        lastMonday.setDate(lastMonday.getDate() - (day - 1)); // Go back to Monday
      }
      return lastMonday;
    }

    function goToYearStart() {
      var year = currentWeekStart.getFullYear();
      currentWeekStart = getFirstMondayOfYear(year);
      renderGrid();
    }

    function goToYearEnd() {
      var year = currentWeekStart.getFullYear();
      currentWeekStart = getLastMondayOfYear(year);
      renderGrid();
    }

    function jumpToYear(year) {
      if (!year) return;
      var y = parseInt(year);
      // 計算 6月8日 喺邊個星期，跳去該星期嘅星期一
      var june8 = new Date(y, 5, 8); // month is 0-indexed, so 5 = June
      currentWeekStart = getMonday(june8);
      renderGrid();
    }

    function initYearPicker() {
      var select = document.getElementById('yearSelect');
      if (!select) return;
      select.innerHTML = '<option value="">-- 選擇年份 --</option>';
      var currentYear = new Date().getFullYear();
      for (var y = 2026; y <= 2036; y++) {
        var selected = y === currentYear ? ' selected' : '';
        select.innerHTML += '<option value="' + y + '"' + selected + '>' + y + ' 年</option>';
      }
    }

    function jumpToWeek(dateStr) {
      currentWeekStart = getMonday(new Date(dateStr));
      renderGrid();
    }

    function renderWeekChips() {
      var container = document.getElementById('weekChips');
      var baseMonday = new Date(currentWeekStart);
      var html = '';
      for (var w = -4; w <= 4; w++) {
        var monday = new Date(baseMonday);
        monday.setDate(baseMonday.getDate() + (w * 7));
        var isActive = monday.getTime() === currentWeekStart.getTime();
        html += '<div class="week-chip ' + (isActive ? 'active' : '') + '" onclick="jumpToWeek(\'' + monday.toISOString() + '\')">' + (monday.getMonth() + 1) + '/' + monday.getDate() + '</div>';
      }
      container.innerHTML = html;
    }

    function renderRmSettings() {
      var container = document.getElementById('rmSettingsList');
      var html = '';
      for (var i = 0; i < MAX_RMS; i++) {
        var rmName = RMS[i] || 'RM' + (i + 1);
        html += '<button class="rm-name-btn" style="background:' + RM_COLORS[i] + ';" onclick="setRmName(' + i + ')">' + escapeHtml(rmName) + '</button>';
      }
      container.innerHTML = html;
    }

    async function setRmName(rmIdx) {
      var name = prompt('請輸入 RM' + (rmIdx + 1) + ' 的名稱：', RMS[rmIdx] || '');
      if (name !== null) {
        RMS[rmIdx] = name.trim();
        await saveRMStoAirtable();
        renderGrid();
        renderRmSettings();
      }
    }

    var STATE_NAMES = ['☐', '✅', '✕'];
    
    function getCheckKey(dateKey, workId, rmIdx) {
      return dateKey + '_' + workId + '_' + rmIdx;
    }

    async function toggleCheck(dateKey, workId, rmIdx) {
      var key = getCheckKey(dateKey, workId, rmIdx);
      var current = checks[key] || 0;
      var next = (current + 1) % 3;
      checks[key] = next;
      renderGrid();
      // Update localStorage cache immediately
      try {
        localStorage.setItem('checks_cache', JSON.stringify(checks));
      } catch(e) {}
      try {
        await saveSingleCheckToAirtable(key);
        // Debug alert showing what was saved
        var work = works.find(w => w.id === workId);
        var rmName = RMS[rmIdx] || 'RM' + (rmIdx + 1);
        var stateName = ['', '✅', '❌'][next];
        var checkKeyExists = await fetchAirtable('Checks').then(records => {
          return records.some(r => r.fields.CheckKey === key);
        });
        alert('✅ 保存成功！\n\n工作: ' + (work ? work.text : workId) + '\nRM: ' + rmName + '\nState: ' + current + ' → ' + next + ' (' + stateName + ')\nKey: ' + key + '\n\n已在 Airtable 確認: ' + (checkKeyExists ? '是' : '否'));
      } catch (e) {
        console.error('Save check failed:', e);
        alert('❌ 保存失敗！\n\n工作: ' + (work ? work.text : workId) + '\nRM: ' + rmName + '\nState: ' + current + ' → ' + next + '\nKey: ' + key + '\n\n錯誤: ' + (e.message || '未知錯誤'));
      }
    }

    function renderRmChecks(dateKey, workId) {
      // Debug: log the checkKey for rmIdx=0
      var debugCheckKey = getCheckKey(dateKey, workId, 0);
      if (dateKey === '2026-06-08' && debugCheckKey.includes('recQ8Nxn606CD8GGS')) {
        console.log('RENDER DEBUG: dateKey=', dateKey, 'workId=', workId, 'checkKey=', debugCheckKey, 'checks[checkKey]=', checks[debugCheckKey]);
      }
      var html = '<div class="rm-checkboxes">';
      for (var rmIdx = 0; rmIdx < MAX_RMS; rmIdx++) {
        var checkKey = getCheckKey(dateKey, workId, rmIdx);
        var state = checks[checkKey] || 0;
        var rmColor = RM_COLORS[rmIdx];
        var rmName = RMS[rmIdx] || 'RM' + (rmIdx + 1);
        var icon = STATE_NAMES[state];
        var bgClass = state === 1 ? 'checked' : (state === 2 ? 'crossed' : 'unchecked');
        
        html += '<div class="rm-check ' + bgClass + '" onclick="toggleCheck(\'' + dateKey + '\',\'' + workId + '\',' + rmIdx + ')">';
        html += '<span class="rm-label" style="color:#fff;background:' + rmColor + ';border-radius:3px;white-space:nowrap;" title="點擊編輯名稱" onclick="event.stopPropagation();setRmName(' + rmIdx + ')">' + escapeHtml(rmName) + '</span>';
        html += '<span class="check-icon">' + icon + '</span>';
        html += '</div>';
      }
      html += '</div>';
      return html;
    }

    function getWorkDates(workDateKey, repeatType, weekDates) {
      if (repeatType === REPEAT_NONE) {
        return [workDateKey];
      }
      
      var dates = [];
      var workDate = new Date(workDateKey);
      var workDay = workDate.getDate();
      var workDayOfWeek = workDate.getDay();
      
      weekDates.forEach(function(date) {
        var dateKey = getDateKey(date);
        if (repeatType === REPEAT_DAY) {
          dates.push(dateKey);
        } else if (repeatType === REPEAT_WEEK) {
          if (date.getDay() === workDayOfWeek) {
            dates.push(dateKey);
          }
        } else if (repeatType === REPEAT_MONTH) {
          if (date.getDate() === workDay) {
            dates.push(dateKey);
          }
        }
      });
      
      return dates;
    }

    function renderGrid() {
      if (isLoading) return;
      
      var table = document.getElementById('mainTable');
      var dates = getWeekDates();
      document.getElementById('currentDateLabel').textContent = formatDateLabel();
      renderWeekChips();

      var html = '';

      dates.forEach(function(date, dateIdx) {
        var dateKey = getDateKey(date);
        var dayNames = ['日', '一', '二', '三', '四', '五', '六'];
        var dateLabel = (date.getMonth() + 1) + '/' + date.getDate() + ' 星期' + dayNames[date.getDay()];
        
        var dayWorks = works.filter(function(w) { 
          var workDates = getWorkDates(w.dateKey, w.repeat, dates);
          return workDates.indexOf(dateKey) !== -1;
        });
        
        var isWeekend = date.getDay() === 0 || date.getDay() === 6;
        
        // Skip weekends completely - do not render anything for Sat/Sun
        if (isWeekend) return;
        
        if (dateIdx > 0) {
          html += '<tr class="section-separator"><td colspan="3" style="background:#4fc3f7;height:4px;padding:0;"></td></tr>';
        }
        
        html += '<tr class="header-row">';
        html += '<th class="date-col" style="background:#4fc3f7;">' + dateLabel + '</th>';
        html += '<th class="work-col">工作名稱</th>';
        html += '<th class="rm-col">RM 工作清單</th>';
        html += '</tr>';
        
        if (dayWorks.length === 0) {
          var weekendTdClass = isWeekend ? ' weekend' : '';
          html += '<tr class="data-row">';
          html += '<td class="date-col' + weekendTdClass + '">' + dateLabel + '</td>';
          html += '<td class="work-col' + weekendTdClass + '" style="color:#555;font-style:italic;">（暫無工作）</td>';
          html += '<td class="rm-col' + weekendTdClass + '"></td>';
          html += '</tr>';
        } else {
          dayWorks.forEach(function(work) {
            var urgentClass = work.urgent ? ' urgent' : '';
            var urgentBadge = work.urgent ? ' <span style="background:#ffcc00;color:#000;padding:2px 6px;border-radius:4px;font-size:0.75rem;font-weight:bold;margin-left:5px;">⚡ URGENT</span>' : '';
            var weekendTdClass = isWeekend ? ' weekend' : '';
            html += '<tr class="data-row">';
            html += '<td class="date-col' + weekendTdClass + '">' + dateLabel + '</td>';
            html += '<td class="work-col' + urgentClass + weekendTdClass + '" onclick="openEditWork(\'' + work.id + '\')">';
            html += '<div class="work-name">';
            html += '<span class="work-text">' + escapeHtml(work.text) + urgentBadge + '</span>';
            if (work.url) {
              html += '<a href="' + escapeHtml(work.url) + '" class="work-url" target="_blank" onclick="event.stopPropagation();">🔗</a>';
            }
            html += '</div>';
            html += '</td>';
            html += '<td class="rm-col' + weekendTdClass + '">' + renderRmChecks(dateKey, work.id) + '</td>';
            html += '</tr>';
          });
        }
        
        var weekendAddClass = isWeekend ? ' weekend-add' : '';
        html += '<tr class="add-work-row">';
        html += '<td class="date-col' + weekendAddClass + '">' + dateLabel + '</td>';
        if (isWeekend) {
          html += '<td class="work-col' + weekendAddClass + '" style="color:#555;cursor:not-allowed;">（休息日）</td>';
        } else {
          html += '<td class="work-col' + weekendAddClass + '" onclick="openAddWorkForDate(\'' + dateKey + '\')">+ 新增工作（' + dateLabel + '）</td>';
        }
        html += '<td class="rm-col' + weekendAddClass + '"></td>';
        html += '</tr>';
      });

      table.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function openAddWork() {
      document.getElementById('workModalTitle').textContent = '新增工作';
      document.getElementById('editWorkId').value = '';
      currentModalDateKey = '';
      document.getElementById('workNameInput').value = '';
      document.getElementById('workUrlInput').value = '';
      document.getElementById('workRepeatInput').value = 'none';
      document.getElementById('workUrgentInput').checked = false;
      document.getElementById('deleteWorkBtn').style.display = 'none';
      document.getElementById('workModal').classList.add('active');
      document.getElementById('workNameInput').focus();
    }

    function openAddWorkForDate(dateKey) {
      document.getElementById('workModalTitle').textContent = '新增工作';
      document.getElementById('editWorkId').value = '';
      currentModalDateKey = dateKey;
      document.getElementById('workNameInput').value = '';
      document.getElementById('workUrlInput').value = '';
      document.getElementById('workRepeatInput').value = 'none';
      document.getElementById('workUrgentInput').checked = false;
      document.getElementById('deleteWorkBtn').style.display = 'none';
      document.getElementById('workModal').classList.add('active');
      document.getElementById('workNameInput').focus();
    }

    function openEditWork(workId) {
      var work = works.find(function(w) { return w.id === workId; });
      if (!work) return;
      document.getElementById('workModalTitle').textContent = '編輯工作';
      document.getElementById('editWorkId').value = workId;
      currentModalDateKey = work.dateKey || '';
      document.getElementById('workNameInput').value = work.text;
      document.getElementById('workUrlInput').value = work.url || '';
      document.getElementById('workRepeatInput').value = work.repeat || 'none';
      document.getElementById('workUrgentInput').checked = work.urgent || false;
      document.getElementById('deleteWorkBtn').style.display = 'block';
      document.getElementById('workModal').classList.add('active');
      document.getElementById('workNameInput').focus();
    }

    async function saveWork() {
      var id = document.getElementById('editWorkId').value;
      var text = document.getElementById('workNameInput').value.trim();
      var url = document.getElementById('workUrlInput').value.trim();
      var repeat = document.getElementById('workRepeatInput').value;
      var urgent = document.getElementById('workUrgentInput').checked;
      
      if (!text) { alert('請輸入工作名稱'); return; }
      
      if (id) {
        var work = works.find(function(w) { return w.id === id; });
        if (work) { 
          work.text = text; 
          work.url = url; 
          work.repeat = repeat; 
          work.urgent = urgent; 
        }
      } else {
        if (!currentModalDateKey) { alert('請選擇日子'); return; }
        works.push({ 
          id: 'new_' + Date.now(), 
          text: text, 
          url: url, 
          dateKey: currentModalDateKey, 
          repeat: repeat, 
          urgent: urgent 
        });
      }
      
      await saveWorksToAirtable();
      closeWorkModal();
      renderGrid();
    }

    async function deleteWork() {
      var id = document.getElementById('editWorkId').value;
      if (!confirm('確定刪除呢项工作？')) return;
      works = works.filter(function(w) { return w.id !== id; });
      await saveWorksToAirtable();
      closeWorkModal();
      renderGrid();
    }

    function closeWorkModal() {
      document.getElementById('workModal').classList.remove('active');
      currentModalDateKey = '';
    }

    document.getElementById('workModal').addEventListener('click', function(e) {
      if (e.target.classList.contains('modal-overlay')) closeWorkModal();
    });

    function saveSetup() {
      var apiKey = document.getElementById('setupApiKey').value.trim();
      var baseId = document.getElementById('setupBaseId').value.trim();
      
      if (!apiKey || !baseId) {
        alert('請輸入 API Key 和 Base ID');
        return;
      }
      
      localStorage.setItem('airtable_api_key', apiKey);
      localStorage.setItem('airtable_base_id', baseId);
      
      AIRTABLE_API_KEY = apiKey;
      AIRTABLE_BASE_ID = baseId;
      AIRTABLE_BASE_URL = 'https://api.airtable.com/v0/' + AIRTABLE_BASE_ID;
      
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      
      loadData();
    }

    // Initialize
    function init() {
      // 每次進入頁面自動去當日嗰週
      currentWeekStart = getMonday(new Date());
      // renderGrid() 會在 loadData() 完成後才調用，避免 race condition
      
      var savedApiKey = localStorage.getItem('airtable_api_key');
      var savedBaseId = localStorage.getItem('airtable_base_id');
      
      if (savedApiKey && savedBaseId) {
        AIRTABLE_API_KEY = savedApiKey;
        AIRTABLE_BASE_ID = savedBaseId;
        AIRTABLE_BASE_URL = 'https://api.airtable.com/v0/' + AIRTABLE_BASE_ID;
        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        loadData();
      } else {
        document.getElementById('setupScreen').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
      }
    }
    

    function showToast(success, message) {
      var toast = document.getElementById('toast');
      if (!toast) {
        // Fallback: show in current date label
        var label = document.getElementById('currentDateLabel');
        if (label) {
          label.textContent = message;
          label.style.color = success ? '#2ecc71' : '#e74c3c';
          setTimeout(function() {
            label.textContent = formatDateLabel();
            label.style.color = '#4fc3f7';
          }, 2500);
        }
        console.log('Toast fallback:', message);
        return;
      }
      toast.textContent = message;
      toast.className = 'toast ' + (success ? 'success' : 'error') + ' show';
      setTimeout(function() {
        toast.classList.remove('show');
      }, 2500);
    }
    init();
  </script>
